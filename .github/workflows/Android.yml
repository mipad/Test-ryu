name: Android CI - Best Branch

on:
  push:
    branches: [best]  # 仅监听 best 分支
  pull_request:
    branches: [best]  # 针对 best 分支的 PR

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      # ----------------------------------
      # 1. 检出代码（适配 best 分支）
      # ----------------------------------
      - name: Checkout best branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}  # 使用自定义令牌
          ref: best  # 显式指定分支
          path: 。    # 检出到根目录
          sparse-checkout: |
            /*                      # 包含所有根目录文件
            !app/src/main/jniLibs/arm64-v8a  # 排除目录
            src/RyujinxAndroid/gradlew*  # 显式包含 gradlew.bat
          sparse-checkout-cone-mode: false

      # ----------------------------------
      # 2. 路径校正（针对 best 分支结构）
      # ----------------------------------
      - name: Fix file structure
        run: |
          # 检查 gradlew.bat 位置
          if [ -f "src/RyujinxAndroid/gradlew.bat" ]; then
            mv src/RyujinxAndroid/gradlew.bat .
            echo "✔️ gradlew.bat 移动到根目录"
          fi

          # 创建必要目录（根据 best 分支结构）
          mkdir -p app/src/main/cpp

      # ----------------------------------
      # 3. 生成 Unix 兼容脚本
      # ----------------------------------
      - name: Create gradlew proxy
        run: |
          echo "#!/bin/bash" > gradlew
          echo './gradlew.bat "$@"' >> gradlew
          chmod +x gradlew
          echo "===== 脚本内容 ====="
          cat gradlew
          echo "===================="

      # ----------------------------------
      # 4. Android 环境配置
      # ----------------------------------
      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT="$HOME/android-sdk-best"  # 分支专用路径
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

          # 安装命令行工具
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip -d "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          
          # 配置环境变量
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          
          # 接受许可协议（带重试）
          for i in {1..3}; do
            yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses && break
            sleep 10
          done

          # 安装组件（best 分支专用版本）
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653"

      # ----------------------------------
      # 5. 构建执行（best 分支优化）
      # ----------------------------------
      - name: Build with Gradle
        env:
          BRANCH_NAME: best  # 注入分支名称
        run: |
          ./gradlew clean assembleDebug \
            -PbuildBranch=$BRANCH_NAME \
            --stacktrace \
            --no-daemon \
            -Dorg.gradle.java.home="$JAVA_HOME"

      # ----------------------------------
      # 6. 产物处理（分支区分）
      # ----------------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-apk-best
          path: app/build/outputs/apk/debug/*.apk
