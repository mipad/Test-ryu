name: Android CI

on:
  push:
    branches: [best]
  pull_request:
    branches: [best]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码（禁用子模块）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false  # 明确禁用子模块

      # 2. 清理残留路径（可选但推荐）
      - name: Clean residual paths
        run: |
          rm -rf src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools

      # 3. 后续步骤保持不变（设置 JDK、Android SDK、构建等）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"

      - name: Build with Gradle
        working-directory: src/RyujinxAndroid
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
