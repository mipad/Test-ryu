name: Android CI - Final Build

on:
  push:
    branches: [best]
  pull_request:
    branches: [best]

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ----------------------------------
      # 1. 检出代码（精准路径控制）
      # ----------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          path: src/RyujinxAndroid  # 直接检出到项目目录
          sparse-checkout: |
            /*
            !app/src/main/jniLibs/arm64-v8a  # 相对路径匹配.gitignore
          sparse-checkout-cone-mode: false

      # ----------------------------------
      # 2. 安装系统依赖
      # ----------------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libicu-dev \
            libssl-dev \
            zlib1g \
            libkrb5-dev \
            cmake \
            ninja-build

      # ----------------------------------
      # 3. 安装 .NET SDK
      # ----------------------------------
      - name: Install .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          dotnet-quality: preview

      # ----------------------------------
      # 4. 设置 JDK 环境
      # ----------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ----------------------------------
      # 5. 安装 Android SDK/NDK
      # ----------------------------------
      - name: Setup Android Tools
        run: |
          export ANDROID_SDK_ROOT="$HOME/android-sdk-custom"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=" >> $GITHUB_ENV  # 清除冲突变量

          # 创建自定义 SDK 目录
          mkdir -p "$ANDROID_SDK_ROOT"

          # 安装命令行工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"

          # 配置环境变量
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

          # 安装核心组件
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653" \
            "cmake;3.22.1"

          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      # ----------------------------------
      # 6. 配置构建环境
      # ----------------------------------
      - name: Prepare build environment
        working-directory: src/RyujinxAndroid
        run: |
          # 创建必要目录结构
          mkdir -p app/src/main/cpp/libraries

          # 生成 local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties
          echo "cmake.dir=$ANDROID_SDK_ROOT/cmake/3.22.1" >> local.properties

          # 验证目录结构
          echo "项目目录结构："
          ls -al
          echo "CPP 源代码目录："
          ls -al app/src/main/cpp

      # ----------------------------------
      # 7. 缓存优化
      # ----------------------------------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            src/RyujinxAndroid/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('src/RyujinxAndroid/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('src/RyujinxAndroid/local.properties') }}

      # ----------------------------------
      # 8. 构建项目
      # ----------------------------------
      - name: Build with Gradle
        working-directory: src/RyujinxAndroid
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug \
            --stacktrace \
            -Pandroid.debug.obsoleteApi=true \
            -Dorg.gradle.java.home=$JAVA_HOME \
            -Dorg.gradle.parallel=true

      # ----------------------------------
      # 9. 上传产物
      # ----------------------------------
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-debug-apk
          path: src/RyujinxAndroid/app/build/outputs/apk/debug/*.apk

      # ----------------------------------
      # 10. 构建验证
      # ----------------------------------
      - name: Verify Build Result
        run: |
          if [ ! -f "src/RyujinxAndroid/app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "::error::构建失败：APK 文件未生成"
            exit 1
          else
            echo "::notice::APK 文件已生成"
            ls -lh "src/RyujinxAndroid/app/build/outputs/apk/debug/"
          fi
