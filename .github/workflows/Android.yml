name: Android CI - Best Branch (Final Fix)

on:
  push:
    branches: [best]
  pull_request:
    branches: [best]

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # ----------------------------------
      # 1. 代码检出（适配 best 分支）
      # ----------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          ref: best
          path: .
          sparse-checkout: |
            /*
            !app/src/main/jniLibs/arm64-v8a
            src/RyujinxAndroid/gradlew*
          sparse-checkout-cone-mode: false

      # ----------------------------------
      # 2. 修复 gradlew.bat 路径
      # ----------------------------------
      - name: Fix gradlew.bat location
        run: |
          # 移动 gradlew.bat 到工作目录根
          if [ -f "src/RyujinxAndroid/gradlew.bat" ]; then
            mv src/RyujinxAndroid/gradlew.bat .
          fi

          # 创建 Unix 执行脚本
          echo -e '#!/bin/bash\n./gradlew.bat "$@"' > gradlew
          chmod +x gradlew
          echo "===== 生成代理脚本 ====="
          ls -l gradlew*

      # ----------------------------------
      # 3. Android SDK 安装（关键修复）
      # ----------------------------------
      - name: Setup Android SDK
        run: |
          # 设置专用 SDK 路径
          export ANDROID_SDK_ROOT="$HOME/android-sdk-best"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=" >> $GITHUB_ENV

          # 创建基础目录结构
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"

          # 带重试机制的下载
          for i in {1..3}; do
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip && break
            sleep 30
          done

          # 解压并修正目录结构
          unzip -q commandlinetools-linux-9477386_latest.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"

          # 验证核心文件存在
          echo "===== SDK 工具验证 ====="
          ls -l "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          # 配置环境变量
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

          # 接受许可协议（增强重试）
          for i in {1..5}; do
            yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses && break
            sleep 15
          done

          # 安装核心组件（带进度显示）
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653" 2>&1 | tee sdkmanager.log

      # ----------------------------------
      # 4. 生成 local.properties
      # ----------------------------------
      - name: Configure local.properties
        run: |
          {
            echo "sdk.dir=$ANDROID_SDK_ROOT"
            echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/25.2.9519653"
            echo "cmake.dir=$ANDROID_SDK_ROOT/cmake/3.22.1"
          } > local.properties
          echo "===== local.properties 内容 ====="
          cat local.properties

      # ----------------------------------
      # 5. 构建执行（带缓存优化）
      # ----------------------------------
      - name: Build with Gradle
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false
        run: |
          # 清理并构建
          ./gradlew clean assembleDebug \
            --stacktrace \
            --no-daemon \
            -Pandroid.debug.obsoleteApi=true \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.caching=true

          # 验证产物存在
          if [ ! -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "::error::APK 文件未生成！"
            exit 1
          fi

      # ----------------------------------
      # 6. 产物上传与清理
      # ----------------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-best-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Cleanup SDK
        if: always()
        run: |
          rm -rf "$ANDROID_SDK_ROOT/cmdline-tools"
          rm -rf "$ANDROID_SDK_ROOT/ndk/25.2.9519653/toolchains"
