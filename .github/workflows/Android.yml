name: Android CI - Best Branch (Permission Fix)

on:
  push:
    branches: [best]
  pull_request:
    branches: [best]

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # ----------------------------------
      # 1. 代码检出与路径修复（关键修正）
      # ----------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          ref: best
          path: .
          sparse-checkout: |
            /*
            !app/src/main/jniLibs/arm64-v8a
            src/RyujinxAndroid/gradlew*

      # ----------------------------------
      # 2. 文件权限综合修复
      # ----------------------------------
      - name: Fix file permissions
        run: |
          # 移动并修复 gradlew.bat
          if [ -f "src/RyujinxAndroid/gradlew.bat" ]; then
            mv src/RyujinxAndroid/gradlew.bat .
            echo "✔️ gradlew.bat 已移动到根目录"
          fi

          # 生成跨平台代理脚本（带 UTF-8 BOM 头）
          echo -e '#!/bin/bash\n./gradlew.bat "$@"' > gradlew
          
          # 设置双重权限保障
          chmod +x gradlew
          chmod +x gradlew.bat  # 关键修正：添加对 .bat 文件的执行权限
          
          # 验证权限设置
          echo "===== 文件权限验证 ====="
          ls -l gradlew*
          file gradlew.bat | grep "executable"

      # ----------------------------------
      # 3. Android SDK 安装（优化版）
      # ----------------------------------
      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT="$HOME/android-sdk-best"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

          # 带重试的下载安装
          for i in {1..3}; do
            mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools" && break
            sleep 5
          done

          wget -q --retry-connrefused https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"

          # 环境变量配置
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_PATH

          # 许可协议处理（增强兼容性）
          (yes || true) | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses

          # 组件安装（带进度条）
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653" 2>&1 | awk '{print strftime("[%Y-%m-%d %H:%M:%S]"), $0}'

      # ----------------------------------
      # 4. 构建执行（双重验证）
      # ----------------------------------
      - name: Build with Gradle
        env:
          BUILD_DEBUG: "true"
        run: |
          # 环境验证
          echo "===== 预检环境 ====="
          which sdkmanager
          ls -l "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          
          # 带权限验证的构建
          ./gradlew clean assembleDebug \
            --stacktrace \
            --no-daemon \
            -Pandroid.debug.obsoleteApi=$BUILD_DEBUG \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.caching=true

          # 产物验证（多级检查）
          echo "===== 产物验证 ====="
          apk_path="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$apk_path" ]; then
            echo "✅ APK 生成成功"
            ls -lh "$apk_path"
            file "$apk_path" | grep "Android package"
          else
            echo "::error::APK 文件未找到！"
            find app/build/outputs -name "*.apk"
            exit 1
          fi

      # ----------------------------------
      # 5. 产物处理（带元数据）
      # ----------------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-best-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: error

      # ----------------------------------
      # 6. 日志归档（调试用）
      # ----------------------------------
      - name: Archive build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/outputs/logs
            ${{ env.ANDROID_SDK_ROOT }}/cmdline-tools/latest/bin/sdkmanager.log
