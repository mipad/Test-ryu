name: Android CI - Final Build

on:
  push:
    branches: [best]
  pull_request:
    branches: [best]

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ----------------------------------
      # 1. 精准代码检出（关键修复）
      # ----------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          path: src/RyujinxAndroid  # 直接检出到项目目录
          sparse-checkout: |
            src/RyujinxAndroid/*    # 包含项目目录所有内容
            !src/RyujinxAndroid/app/src/main/jniLibs/arm64-v8a  # 排除指定目录
          sparse-checkout-cone-mode: false

      # ----------------------------------
      # 2. 文件系统验证（关键诊断）
      # ----------------------------------
      - name: Verify gradlew existence
        working-directory: src/RyujinxAndroid
        run: |
          echo "===== 文件检查 ====="
          # 检查 gradlew (Unix) 和 gradlew.bat (Windows)
          if [ ! -f "gradlew" ] && [ ! -f "gradlew.bat" ]; then
            echo "::error::致命错误：gradlew 或 gradlew.bat 文件缺失"
            exit 1
          fi
          
          # 显式设置 gradlew 权限（如果存在）
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            echo "✔️ gradlew 权限已修复"
          fi

          echo "===== 目录结构 ====="
          ls -al
          echo "===== Gradle 文件 ====="
          ls -al gradle/wrapper

      # ----------------------------------
      # 3. 系统依赖安装
      # ----------------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libicu-dev \
            libssl-dev \
            zlib1g \
            libkrb5-dev \
            cmake \
            ninja-build

      # ----------------------------------
      # 4. Android SDK/NDK 配置
      # ----------------------------------
      - name: Setup Android Tools
        run: |
          export ANDROID_SDK_ROOT="$HOME/android-sdk-custom"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=" >> $GITHUB_ENV

          mkdir -p "$ANDROID_SDK_ROOT"
          
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"

          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653" \
            "cmake;3.22.1"

          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      # ----------------------------------
      # 5. 构建执行（跨平台兼容）
      # ----------------------------------
      - name: Build with Gradle
        working-directory: src/RyujinxAndroid
        run: |
          # 优先使用 Unix 版 gradlew
          if [ -f "gradlew" ]; then
            ./gradlew clean assembleDebug \
              --stacktrace \
              -Pandroid.debug.obsoleteApi=true \
              -Dorg.gradle.java.home="$JAVA_HOME"
          elif [ -f "gradlew.bat" ]; then
            echo "::warning::使用 gradlew.bat 可能在 Linux 环境受限"
            ./gradlew.bat clean assembleDebug \
              --stacktrace \
              -Pandroid.debug.obsoleteApi=true \
              -Dorg.gradle.java.home="$JAVA_HOME"
          else
            echo "::error::未找到任何 Gradle Wrapper 文件"
            exit 1
          fi

      # ----------------------------------
      # 6. 产物处理
      # ----------------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-debug-apk
          path: src/RyujinxAndroid/app/build/outputs/apk/debug/*.apk
