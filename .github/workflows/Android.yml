name: Android CI - Final Solution

on:
  push:
    branches: [best]
  pull_request:
    branches: [best]

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      # ----------------------------------
      # 1. 精准代码检出（核心修复）
      # ----------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          path: src/RyujinxAndroid  # 直接检出到项目根目录
          sparse-checkout: |
            /*                      # 包含仓库根目录所有文件
            !app/src/main/jniLibs/arm64-v8a  # 排除指定目录
            gradle*                 # 显式包含 Gradle 文件
            gradlew                 # 显式包含 gradlew
          sparse-checkout-cone-mode: false  # 禁用 cone 模式

      # ----------------------------------
      # 2. 文件系统验证（关键诊断）
      # ----------------------------------
      - name: Verify project structure
        working-directory: src/RyujinxAndroid
        run: |
          echo "===== 核心文件检查 ====="
          required_files=(
            "gradlew"
            "app/src/main/cpp/CMakeLists.txt"
            "gradle/wrapper/gradle-wrapper.properties"
          )
          
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error::关键文件缺失: $file"
              exit 1
            else
              echo "✔️ 文件存在: $file"
            fi
          done

          echo "===== 目录结构 ====="
          ls -al
          echo "===== gradle/wrapper ====="
          ls -al gradle/wrapper

      # ----------------------------------
      # 3. 系统依赖安装
      # ----------------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libicu-dev \
            libssl-dev \
            zlib1g \
            libkrb5-dev \
            cmake \
            ninja-build

      # ----------------------------------
      # 4. .NET 环境配置
      # ----------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
          dotnet-quality: preview

      # ----------------------------------
      # 5. JDK 环境配置
      # ----------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ----------------------------------
      # 6. Android SDK/NDK 安装（精准控制）
      # ----------------------------------
      - name: Setup Android Tools
        run: |
          export ANDROID_SDK_ROOT="$HOME/android-sdk-custom"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=" >> $GITHUB_ENV

          # 创建干净的 SDK 目录
          mkdir -p "$ANDROID_SDK_ROOT"
          
          # 安装命令行工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"

          # 配置环境变量
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          
          # 接受许可协议（带重试机制）
          for i in {1..5}; do
            yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses && break
            sleep 10
          done

          # 安装核心组件
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653" \
            "cmake;3.22.1"

          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      # ----------------------------------
      # 7. 生成 local.properties（路径锁定）
      # ----------------------------------
      - name: Configure local.properties
        working-directory: src/RyujinxAndroid
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties
          echo "cmake.dir=$ANDROID_SDK_ROOT/cmake/3.22.1" >> local.properties
          echo "===== local.properties 内容 ====="
          cat local.properties

      # ----------------------------------
      # 8. 缓存优化（加速后续构建）
      # ----------------------------------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            src/RyujinxAndroid/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('src/RyujinxAndroid/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('src/RyujinxAndroid/local.properties') }}

      # ----------------------------------
      # 9. 构建执行（带故障保护）
      # ----------------------------------
      - name: Build with Gradle
        working-directory: src/RyujinxAndroid
        run: |
          # 权限修复
          chmod +x gradlew
          
          # 带重试机制的构建
          for attempt in {1..3}; do
            echo "尝试第 $attempt 次构建..."
            ./gradlew clean assembleDebug \
              --stacktrace \
              --no-daemon \
              -Pandroid.debug.obsoleteApi=true \
              -Dorg.gradle.java.home="$JAVA_HOME" \
              -Dorg.gradle.parallel=true && break
            sleep 15
          done

      # ----------------------------------
      # 10. 产物处理与验证
      # ----------------------------------
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-debug-apk
          path: src/RyujinxAndroid/app/build/outputs/apk/debug/*.apk

      - name: Verify APK
        run: |
          if [ ! -f "src/RyujinxAndroid/app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "::error::构建产物缺失！"
            exit 1
          else
            echo "::notice::APK 文件大小："
            ls -lh "src/RyujinxAndroid/app/build/outputs/apk/debug/app-debug.apk"
          fi
