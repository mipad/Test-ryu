name: Android CI - Best Branch (Final)

on:
  push:
    branches: [best]
  pull_request:
    branches: [best]

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ----------------------------------
      # 1. 精准代码检出（关键修复）
      # ----------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          ref: best
          path: .  # 直接检出到工作目录根
          sparse-checkout: |
            # 根目录所有文件（不含前导斜杠）
            /*
            
            # 排除指定目录（相对路径）
            !app/src/main/jniLibs/arm64-v8a
            
            # 包含 Gradle 相关文件（精确匹配）
            src/RyujinxAndroid/gradlew*
            src/RyujinxAndroid/gradle/wrapper/*
            
            # 包含 C++ 源代码
            src/RyujinxAndroid/app/src/main/cpp/*
          sparse-checkout-cone-mode: false  # 必须禁用 cone 模式
          filter: blob:none  # 提升检出速度

      # ----------------------------------
      # 2. 路径校正与权限修复
      # ----------------------------------
      - name: Fix build environment
        run: |
          # 移动 gradlew.bat 到项目根目录
          if [ -f "src/RyujinxAndroid/gradlew.bat" ]; then
            mv src/RyujinxAndroid/gradlew.bat .
            echo "✔️ gradlew.bat 移动到工作目录根"
          fi

          # 生成 Unix 代理脚本（处理 Windows 换行符）
          echo -e '#!/bin/bash\n./gradlew.bat "$@"' > gradlew
          sed -i 's/\r$//' gradlew.bat  # 移除 CRLF 换行符

          # 设置双重执行权限（关键！）
          chmod +x gradlew gradlew.bat
          
          # 验证权限设置
          echo "===== 权限验证 ====="
          ls -l gradlew*
          file gradlew.bat | grep "executable"

      # ----------------------------------
      # 3. Android SDK 安装（优化路径结构）
      # ----------------------------------
      - name: Setup Android Tools
        run: |
          export ANDROID_SDK_ROOT="$HOME/android-sdk-best"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=" >> $GITHUB_ENV

          # 创建干净的 SDK 目录结构
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"

          # 带重试机制的下载（应对网络问题）
          for i in {1..3}; do
            wget -q --retry-connrefused https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip && break
            sleep 30
          done

          # 解压并修正目录结构（关键步骤）
          unzip -q commandlinetools-linux-9477386_latest.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"

          # 配置环境变量
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

          # 接受许可协议（带增强重试）
          for i in {1..5}; do
            (yes || true) | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses && break
            sleep 15
          done

          # 安装核心组件（带进度显示）
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653" 2>&1 | awk '{print strftime("[%Y-%m-%d %H:%M:%S]"), $0}'

      # ----------------------------------
      # 4. 生成构建配置文件
      # ----------------------------------
      - name: Configure local.properties
        run: |
          {
            echo "sdk.dir=$ANDROID_SDK_ROOT"
            echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/25.2.9519653"
            echo "cmake.dir=$ANDROID_SDK_ROOT/cmake/3.22.1"
          } > local.properties
          echo "===== 生成配置文件 ====="
          cat local.properties

      # ----------------------------------
      # 5. 构建执行（带智能缓存）
      # ----------------------------------
      - name: Build with Gradle
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false
        run: |
          # 预检环境
          echo "===== 环境验证 ====="
          ./gradlew --version
          
          # 带缓存清理的构建
          ./gradlew clean assembleDebug \
            --stacktrace \
            --no-daemon \
            --build-cache \
            -Pandroid.debug.obsoleteApi=true \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.caching=true

          # 产物验证（三级检查）
          apk_path="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$apk_path" ]; then
            echo "✅ APK 生成成功 | 大小: $(du -h $apk_path | cut -f1)"
            file "$apk_path" | grep "Android package"
          else
            echo "::error::APK 文件未找到！"
            find . -name "*.apk"
            exit 1
          fi

      # ----------------------------------
      # 6. 产物处理与日志归档
      # ----------------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-best-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Archive logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            $GITHUB_WORKSPACE/**/build/reports
            $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager.log
