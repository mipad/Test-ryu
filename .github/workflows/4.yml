name: Android CI Fix

on:
  push:
    branches: [ "4" ]
  pull_request:
    branches: ["4"]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 延长超时时间

    env:
      JAVA_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=2g"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4"
      PROJECT_DIR: src/RyujinxAndroid
      ANDROID_NDK_VERSION: "27.2.12479018"
      DOTNET_VERSION: "9.0.203"
      ANDROID_API_LEVEL: "35"
      FFMPEG_VERSION: "6.1.1"  # 新增 FFmpeg 版本变量
      VULKAN_SDK_VERSION: "1.4.309.0"  # 新增 Vulkan SDK 版本变量

    steps:
    # ========== 1. 代码检出 ==========
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: 4
        path: Test-ryu

    # ========== 2. 环境配置 ==========
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        architecture: x64

    - name: Setup Android SDK/NDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: ${{ env.ANDROID_NDK_VERSION }}
        cmake-version: 3.22.1

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 安装 Vulkan SDK（直接指定目录）
      run: |
       # 1. 创建固定名称的目录
       mkdir -p vulkan-sdk-1.4.309.0

       # 2. 下载并解压到该目录（强制覆盖已有文件）
       wget -O vulkan-sdk.tar.xz "https://sdk.lunarg.com/sdk/download/1.4.309.0/linux/vulkansdk-linux-x86_64-1.4.309.0.tar.xz"
       tar -xJf vulkan-sdk.tar.xz -C vulkan-sdk-1.4.309.0 --strip-components=1

       # 3. 进入目录并执行安装脚本（如果存在）
       cd vulkan-sdk-1.4.309.0
       if [ -f "install.sh" ]; then
       chmod +x install.sh
       ./install.sh
       fi

       # 4. 设置环境变量（直接指向当前目录）
       echo "VULKAN_SDK=$PWD" >> $GITHUB_ENV
       echo "LD_LIBRARY_PATH=$PWD/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
       echo "PATH=$PWD/bin:$PATH" >> $GITHUB_PATH

    - name: 验证安装
      run: |
       # 直接检查关键文件和工具
       ls -l $VULKAN_SDK/lib/libvulkan.so
       vulkaninfo --summary
            
    - name: Install Build Dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y \
        nasm yasm pkg-config clang \
        libssl-dev zlib1g-dev \
        libx264-dev libx265-dev
      
    # ========== 4. 交叉编译 FFmpeg ==========
    - name: Build FFmpeg for Android
      run: |
       # 确保 NDK 路径正确（根据实际路径调整）
       export NDK_ROOT=/usr/local/lib/android/sdk/ndk/${{ env.ANDROID_NDK_VERSION }}
       export TOOLCHAIN=$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64
       export TARGET=aarch64-linux-android
       export API=${{ env.ANDROID_API_LEVEL }}

       # 添加关键环境变量
       export AR=$TOOLCHAIN/bin/llvm-ar
       export CC=$TOOLCHAIN/bin/$TARGET$API-clang
       export CXX=$TOOLCHAIN/bin/$TARGET$API-clang++
       export LD=$TOOLCHAIN/bin/ld
       export STRIP=$TOOLCHAIN/bin/llvm-strip
       export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
   
       # 验证编译器能否运行
       $CC --version || echo "Compiler check failed!"

        ./configure \
        --target-os=android \
        --arch=arm64 \
        --enable-shared \
        --disable-static \
        --cross-prefix=$TOOLCHAIN/bin/$TARGET- \
        --sysroot=$TOOLCHAIN/sysroot \
        --prefix=./android-build \
        --enable-jni \
        --enable-mediacodec \
        --enable-neon \
        --enable-asm \
        --enable-pic \
        --extra-cflags="-fPIC -DANDROID" \
        --extra-ldflags="-Wl,-rpath-link=$TOOLCHAIN/sysroot/usr/lib/$TARGET/$API"

        # 编译并安装
        make -j$(nproc) && make install

        # 复制生成的 .so 文件到项目的 jniLibs 目录
        mkdir -p ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/src/main/jniLibs/arm64-v8a
        cp -r android-build/lib/*.so ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/src/main/jniLibs/arm64-v8a

    # ========== 5. 环境验证 ==========
    - name: Verify .NET SDK Installation
      run: |
        dotnet --list-sdks
        echo "检查是否安装 .NET ${{ env.DOTNET_VERSION }}"

    - name: Install NDK Platform Libraries
      run: |
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-${{ env.ANDROID_API_LEVEL }}"

    - name: Configure Environment Paths
      shell: bash
      run: |
        ANDROID_NDK_HOME="/usr/local/lib/android/sdk/ndk/${{ env.ANDROID_NDK_VERSION }}"
        LLVM_PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
        LIB_DIR="$LLVM_PATH/sysroot/usr/lib/aarch64-linux-android/${{ env.ANDROID_API_LEVEL }}"

        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
        echo "LLVM_PATH=$LLVM_PATH" >> $GITHUB_ENV
        echo "LIB_DIR=$LIB_DIR" >> $GITHUB_ENV
        echo "$LLVM_PATH/bin" >> $GITHUB_PATH

        # 检查路径是否存在
        echo "检查 NDK 路径:"
        ls -l $ANDROID_NDK_HOME
        echo "检查 LLVM 工具链:"
        ls -l $LLVM_PATH/bin/clang

    # ========== 6. 主构建流程 ==========
    - name: Build APK
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      env:
        OPENSSL_ROOT_DIR: /opt/openssl-x64
        VULKAN_SDK: ${{ env.VULKAN_SDK }}  # 传递 Vulkan SDK 路径
      run: |
        # 修复文件权限
        chmod +x gradlew
        find . -name "*.sh" -exec chmod +x {} \;

        # 调试输出：关键环境变量
        echo "LLVM_PATH: $LLVM_PATH"
        echo "OPENSSL_ROOT_DIR: $OPENSSL_ROOT_DIR"
        echo "VULKAN_SDK: $VULKAN_SDK"

        # 执行构建
        ./gradlew clean assembleRelease \
          -DllvmToolchainPath=$LLVM_PATH \
          -Dopenssl.root=$OPENSSL_ROOT_DIR \
          -Dffmpeg.dir=${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/src/main/jniLibs/arm64-v8a \
          -Pandroid.overridePathCheck=true \
          --no-daemon \
          --stacktrace

    # ========== 7. 检查产物 ==========
    - name: Find Native Libraries (.so)
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        echo "========== 开始搜索 .so 文件 =========="
        find app/build -name "*.so" -print
        echo "========== 搜索完成 =========="

    - name: Upload Native Libraries
      uses: actions/upload-artifact@v4
      with:
        name: native-libs
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/**/*.so

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-arm64-release
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
