name: Clean Submodule
on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [test]  # 主分支触发

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予代码写入权限
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}  # 必须使用 PAT
          fetch-depth: 0  # 拉取完整历史

      - name: Purge submodule traces
        run: |
          # 删除物理目录（可能残留）
          rm -rf src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          
          # 从 Git 缓存中移除记录
          git rm --cached -f src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          
          # 删除 Git 模块配置（即使没有 .gitmodules）
          git config --local --remove-section submodule.src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools || true
          
          # 提交变更（添加 [skip ci] 避免循环触发）
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git commit -m "Purge adrenotools submodule [skip ci]" || echo "No changes"
          git push origin HEAD:${{ github.ref }}
