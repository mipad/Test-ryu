name: Remove Submodule
on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [test]  # 主分支推送触发

jobs:
  remove-submodule:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予代码写入权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}  # 必须使用自定义 PAT
          fetch-depth: 0  # 拉取完整历史记录

      - name: Delete submodule directory
        run: |
          # 强制删除物理目录
          rm -rf src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools

      - name: Purge Git references
        run: |
          # 清理 Git 缓存中的子模块记录
          git rm --cached -f src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          
          # 删除可能的残留 Git 配置
          git config --local --remove-section submodule.src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools 2>/dev/null || true

      - name: 提交更改
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Remove adrenotools submodule [skip ci]" || echo "No changes"
          git push origin HEAD:${{ github.ref }}
