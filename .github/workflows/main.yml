name: Auto Sync Submodules

on:
  push:
    # 限定触发条件（按需选择）
    branches:
      - test       # 仅  分支的推送触发
    paths:
      - '.gitmodules'                   # 仅当 .gitmodules 文件变更时触发
      - 'src/RyujinxAndroid/**'         # 仅当子模块路径下的文件变更时触发

jobs:
  sync-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}  # 替换为 PAT 如果子模块是私有仓库

      - name: Force update adrenotools submodule
        run: |
          cd src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          git fetch --all
          git reset --hard origin/master
          cd ../../../../../../../../..

      - name: Commit and push changes
        run: |
          # 添加 [skip ci] 避免循环触发
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add .
          git commit -m "Auto-update adrenotools submodule [skip ci]" || echo "No changes"
          git push
