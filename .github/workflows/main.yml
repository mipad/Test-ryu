name: Clean Submodule
on:
  workflow_dispatch:  #
  push:
    branches:
      - test         
    paths:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'  # 仅子模块路径变更时触发

jobs:
  clean-submodule:
    runs-on: ubuntu-latest
    # 授予写权限（关键配置）
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整提交历史
          token: ${{ secrets.GITHUB_TOKEN }}  # 使用默认令牌

      - name: Remove submodule references
        run: |
          # 删除 Git 记录
          git rm --cached src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools -r
          
          # 提交变更（添加 [skip ci] 防止循环触发）
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git commit -m "Remove submodule references [skip ci]" || echo "No changes"
          
          # 强制推送（处理可能的冲突）
          git push --force-with-lease origin HEAD:${{ github.ref }}
