name: Android CI with Gradle

on:
  workflow_dispatch:
    inputs:
      shouldrelease:
        description: Create release
        type: boolean
        default: false
      uploadbuild:
        description: Upload build artifacts
        type: boolean
        default: true
      releasetag:
        description: Release tag name
        required: true
        default: 'v0.1.0'
      releasetype:
        description: Mark as prerelease
        type: boolean
        default: false
      islatest:
        description: Mark as latest release
        type: boolean
        default: true
  push:
    branches: [ "test" ]
    tags: [ "v*" ]  # 新增标签触发
  pull_request:
    branches: [ "test" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      packages: write

    steps:
    # 子模块检查加强
    - name: Checkout repo with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0  # 获取完整提交历史

    # CCache 配置优化
    - name: Setup CCache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-ccache
        max-size: 1G

    # Gradle 缓存配置优化
    - name: Setup Gradle Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 17

    # Android 配置增强
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: 26.2.11394342  # 指定NDK版本
        cmake-version: 3.22.1

    - name: Accept licenses
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    # 构建阶段优化
    - name: Build with Gradle
      env:
        CMAKE_C_COMPILER_LAUNCHER: "ccache"
        CMAKE_CXX_COMPILER_LAUNCHER: "ccache"
        CCACHE_DIR: /home/runner/.ccache
        CCACHE_COMPRESS: true
      run: |
        ./gradlew clean assembleRelease \
          --no-daemon \
          --parallel \
          --build-cache \
          -Pandroid.enableBuildCache=true

    # 构建验证步骤
    - name: Verify APK
      run: |
        if [ ! -f app/build/outputs/apk/release/*.apk ]; then
          echo "APK file not found!"
          exit 1
        fi
        ls -lh app/build/outputs/apk/release/

    # 产物上传优化
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: ${{ inputs.uploadbuild || github.event_name != 'workflow_dispatch' }}
      with:
        name: ryu-build-${{ github.run_number }}
        path: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/mapping/release/mapping.txt
        retention-days: 7

    # 自动创建Release
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: ${{ inputs.shouldrelease || startsWith(github.ref, 'refs/tags/') }}
      with:
        tag_name: ${{ inputs.releasetag || github.ref_name }}
        prerelease: ${{ inputs.releasetype }}
        generate_release_notes: true
        files: |
          app/build/outputs/apk/release/*.apk
        body: |
          ### 构建信息
          - **版本号**: ${{ github.ref_name }}
          - **构建时间**: ${{ steps.date.outputs.timestamp }}
          - **提交哈希**: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

          ### 变更日志
          ${{ steps.changelog.outputs.content }}

    # 辅助步骤
    - name: Get current timestamp
      id: date
      run: echo "timestamp=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_OUTPUT

    - name: Generate changelog
      id: changelog
      run: |
        changelog=$(git log --pretty=format:"- %s (%h)" ${{ github.event.base_ref || 'HEAD^' }}..HEAD)
        echo "content=$changelog" >> $GITHUB_OUTPUT
