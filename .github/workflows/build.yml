name: Android CI with Gradle

on:
  workflow_dispatch:
    inputs:
      shouldrelease:
        description: Create release
        type: boolean
        default: false
      uploadbuild:
        description: Upload build artifacts
        type: boolean
        default: true
      releasetag:
        description: Release tag name
        required: true
        default: 'v0.1.0'
  push:
    branches: [ "test" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "test" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: false
        fetch-depth: 0

    # 新增 Gradle 版本验证
    - name: Validate Gradle
      run: |
        if [ ! -f "gradlew" ]; then
          echo "错误：缺少 gradlew 文件"
          exit 1
        fi
        chmod +x gradlew

    # 优化 CCache 配置
    - name: Setup CCache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-ccache
        max-size: 2G

    # 改进缓存策略
    - name: Setup Gradle Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          build/
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: 26.2.11394342
        cmake-version: 3.22.1

    - name: Accept licenses
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    # 移除不必要的步骤
    # - name: Install packages (已集成到 setup-android)

    # 优化构建命令
    - name: Build with Gradle
      env:
        CCACHE_DIR: /home/runner/.ccache
        CCACHE_COMPRESS: true
      run: |
        ./gradlew clean assembleRelease \
          --no-daemon \
          --parallel \
          --build-cache \
          -Pandroid.enableBuildCache=true

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: ${{ inputs.uploadbuild || github.event_name != 'workflow_dispatch' }}
      with:
        name: ryu-build-${{ github.run_number }}
        path: app/build/outputs/apk/release/*.apk
        retention-days: 7

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: ${{ inputs.shouldrelease || startsWith(github.ref, 'refs/tags/') }}
      with:
        tag_name: ${{ inputs.releasetag || github.ref_name }}
        generate_release_notes: true
        files: app/build/outputs/apk/release/*.apk
