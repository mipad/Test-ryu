name: Android CI with Gradle

on:
  workflow_dispatch:
    inputs:
      shouldrelease:
        description: Create release
        type: boolean
        default: false
      uploadbuild:
        description: Upload build artifacts
        type: boolean
        default: true
      releasetag:
        description: Release tag name
        required: true
        default: 'v0.1.0'
      releasetype:
        description: Mark as prerelease
        type: boolean
        default: false
      islatest:
        description: Mark as latest release
        type: boolean
        default: true
  push:
    branches: [ "test" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "test" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: false
        path: src/RyujinxAndroid  # 指定检出到子目录

    - name: Validate Gradle Wrapper
      working-directory: src/RyujinxAndroid
      run: |
        if [ ! -f "gradlew" ]; then
          echo "::error::gradlew 文件未找到！请检查项目结构"
          exit 1
        fi
        chmod +x gradlew

    - name: Setup CCache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-ccache-${{ github.sha }}
        max-size: 2G

    - name: Setup Gradle Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          src/RyujinxAndroid/build
        key: ${{ runner.os }}-gradle-${{ hashFiles('src/RyujinxAndroid/**/*.gradle*', 'src/RyujinxAndroid/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: 26.2.11394342
        cmake-version: 3.22.1

    - name: Accept licenses
      working-directory: src/RyujinxAndroid
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    - name: Build with Gradle
      working-directory: src/RyujinxAndroid
      env:
        CCACHE_DIR: /home/runner/.ccache
        CCACHE_COMPRESS: true
      run: |
        ./gradlew clean assembleRelease \
          --no-daemon \
          --parallel \
          --build-cache \
          -Pandroid.enableBuildCache=true

    - name: Verify APK
      working-directory: src/RyujinxAndroid
      run: |
        if [ ! -f "app/build/outputs/apk/release/*.apk" ]; then
          echo "::error::APK 文件未生成！"
          exit 1
        fi
        ls -lh app/build/outputs/apk/release/

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: ${{ inputs.uploadbuild || github.event_name != 'workflow_dispatch' }}
      with:
        name: ryu-build-${{ github.run_number }}
        path: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
        retention-days: 7

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: ${{ inputs.shouldrelease || startsWith(github.ref, 'refs/tags/') }}
      with:
        tag_name: ${{ inputs.releasetag || github.ref_name }}
        prerelease: ${{ inputs.releasetype }}
        generate_release_notes: true
        files: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
        body: |
          ### 构建信息
          - **版本**: ${{ github.ref_name }}
          - **提交**: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          - **构建时间**: ${{ steps.date.outputs.timestamp }}

    - name: Get timestamp
      id: date
      run: echo "timestamp=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_OUTPUT
