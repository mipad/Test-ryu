name: Build job

on:
  workflow_call:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]
    
env:
  ANDROID_COMPILE_SDK: 34
  ANDROID_BUILD_TOOLS: "34.0.0"
  RYUJINX_BASE_VERSION: "1.1.0"

jobs:
  # 其他作业保持不变...

  build_android:
    name: Android Build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Accept licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Configure NDK and CMake
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.1.8937393" "cmake;3.22.1"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: |
          ./gradlew :app:assembleDebug \
            -PversionCode=$(date +%s) \
            -PversionName="${{ env.RYUJINX_BASE_VERSION }}" \
            -PdisableUpdater=true

      - name: Build Release AAB
        run: |
          ./gradlew :app:bundleRelease \
            -PversionCode=$(date +%s) \
            -PversionName="${{ env.RYUJINX_BASE_VERSION }}" \
            -PdisableUpdater=true
        if: github.event_name == 'pull_request'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-android-build-${{ github.run_number }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/bundle/release/*.aab
        if: github.event_name == 'pull_request'
