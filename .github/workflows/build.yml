name: Java CI with Gradle

on:
  workflow_dispatch:
    inputs:
      shouldrelease:
          description: Create release
          type: boolean
      uploadbuild:
          description: Upload build
          type: boolean
      releasetag:
        description: Enter the tag name
        type: string
      releasetype:
        description: Make it prerelease
        type: boolean
      islatest:
        description: Mark as latest
        type: boolean
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup CCache
      uses: hendrikmuhs/ccache-action@v1.2

    - name: Setup Gradle Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-android-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-android-
            
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept licenses
      run: |
        yes | sdkmanager --licenses

    - name: Install packages
      run: yes | sdkmanager "cmake;3.31.6"

    # 修复权限问题：添加执行权限后运行 gradlew
    - name: Download gradlew binaries
      run: |
        chmod +x src/RyujinxAndroid/gradlew
        src/RyujinxAndroid/gradlew

    - name: Build with Gradle
      env: 
        CMAKE_C_COMPILER_LAUNCHER: "ccache"
        CMAKE_CXX_COMPILER_LAUNCHER: "ccache"
      run: src/RyujinxAndroid/gradlew assembleRelease

    - name: Build release artifacts
      uses: actions/upload-artifact@v4
      if: ${{ github.event_name != 'workflow_dispatch' }} || ${{ inputs.uploadbuild }}
      with:
        name: ryu-build
        path: |
          app/build/outputs/apk/release/*

    - name: Create release
      uses: softprops/action-gh-release@v2
      if: ${{ inputs.shouldrelease }}
      with:
        prerelease: ${{ inputs.releasetype }}
        tag_name: ${{ inputs.releasetag }}
        make_latest: ${{ inputs.islatest }}
        files: |
          app/build/outputs/apk/release/ryu-release.apk
