name: Android CI Fix

on:
  push:
    branches: [ "4" ]
  pull_request:
    branches: [ "4" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 延长超时时间

    env:
      JAVA_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=2g"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4"
      PROJECT_DIR: src/RyujinxAndroid
      ANDROID_NDK_VERSION: "27.2.12479018"
      DOTNET_VERSION: "9.0.203"
      ANDROID_API_LEVEL: "35"
      FFMPEG_VERSION: "6.1.1"          # 新增 FFmpeg 版本变量
      VULKAN_SDK_VERSION: "1.4.309.0"

    steps:
    # ========== 1. 代码检出 ==========
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: 4
        path: Test-ryu

    # ========== 2. 环境配置 ==========
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        architecture: x64

    - name: Setup Android SDK/NDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: ${{ env.ANDROID_NDK_VERSION }}
        cmake-version: 3.22.1

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # ========== 3. 安装构建依赖 ==========
    - name: Install Build Tools
      run: |
        sudo apt-get update && sudo apt-get install -y \
          nasm yasm pkg-config clang \
          libssl-dev zlib1g-dev \
          libx264-dev libx265-dev

    - name: Build libx264
      run: |
       git clone https://code.videolan.org/videolan/x264.git
       cd x264
       ./configure \
         --prefix=./android-build \
         --host=aarch64-linux-android \
         --cross-prefix=$TOOLCHAIN/bin/aarch64-linux-android- \
         --sysroot=$SYSROOT \
         --enable-pic
       make && make install
    
    # ========== 4. 交叉编译 FFmpeg ==========
    - name: Build FFmpeg for Android
      run: |
       export NDK_ROOT="/usr/local/lib/android/sdk/ndk/${{ env.ANDROID_NDK_VERSION }}"
       export TOOLCHAIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"
       export TARGET="aarch64-linux-android"
       export API="${{ env.ANDROID_API_LEVEL }}"

       # 设置工具链变量
       export AR="$TOOLCHAIN/bin/llvm-ar"
       export CC="$TOOLCHAIN/bin/${TARGET}${API}-clang"
       export CXX="$TOOLCHAIN/bin/${TARGET}${API}-clang++"
       export LD="$TOOLCHAIN/bin/ld"
       export STRIP="$TOOLCHAIN/bin/llvm-strip"
       export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
       export SYSROOT="$TOOLCHAIN/sysroot"

       # 验证编译器
       echo 'int main(){return 0;}' > test.c
       $CC test.c -o test || { echo "编译器验证失败！"; exit 1; }

       # 下载并编译 FFmpeg
       wget "https://ffmpeg.org/releases/ffmpeg-${{ env.FFMPEG_VERSION }}.tar.gz"
       tar -xzf "ffmpeg-${{ env.FFMPEG_VERSION }}.tar.gz"
       cd "ffmpeg-${{ env.FFMPEG_VERSION }}"

       ./configure \
        --target-os=android \
        --arch=aarch64 \
        --enable-shared \
        --disable-static \
        --enable-gpl \
        --enable-libx264 \
        --enable-libx265 \
        --enable-neon \
        --enable-mediacodec \
        --enable-jni \
        --enable-pic \
        --cross-prefix="$TOOLCHAIN/bin/$TARGET-" \
        --sysroot="$SYSROOT" \
        --prefix=./android-build \
        --extra-cflags="-fPIC -DANDROID -I$SYSROOT/usr/include" \
        --extra-ldflags="-Wl,-rpath-link=$SYSROOT/usr/lib/$TARGET/$API -L$SYSROOT/usr/lib/$TARGET/$API"

       make -j$(nproc) && make install

       # 复制库文件到项目
       mkdir -p ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/src/main/jniLibs/arm64-v8a
       cp -v android-build/lib/*.so ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/src/main/jniLibs/arm64-v8a/
    
        
          
    # ========== 5. 安装 Vulkan SDK ==========
    - name: 下载并解压 Vulkan SDK
      run: |
        wget -O vulkan-sdk.tar.xz "https://sdk.lunarg.com/sdk/download/${{ env.VULKAN_SDK_VERSION }}/linux/vulkansdk-linux-x86_64-${{ env.VULKAN_SDK_VERSION }}.tar.xz"
        mkdir -p vulkan-sdk-temp
        tar -xJf vulkan-sdk.tar.xz -C vulkan-sdk-temp
        echo "Vulkan SDK 解压结构:"
        tree vulkan-sdk-temp

    - name: 配置 Vulkan 环境变量
      run: |
        VULKAN_SDK_PATH="${{ github.workspace }}/vulkan-sdk-temp/${{ env.VULKAN_SDK_VERSION }}/x86_64"
        echo "VULKAN_SDK=$VULKAN_SDK_PATH" >> $GITHUB_ENV
        echo "PATH=$VULKAN_SDK_PATH/bin:$PATH" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=$VULKAN_SDK_PATH/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

    # ========== 6. 主构建流程 ==========
    - name: Build APK
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      env:
        OPENSSL_ROOT_DIR: /opt/openssl-x64
        VULKAN_SDK: ${{ env.VULKAN_SDK }}
      run: |
        chmod +x gradlew
        ./gradlew clean assembleRelease \
          -DllvmToolchainPath=$LLVM_PATH \
          -Dopenssl.root=$OPENSSL_ROOT_DIR \
          -Dvulkan.sdk.path=$VULKAN_SDK \
          -Pandroid.overridePathCheck=true \
          --stacktrace \
          --info \
          --no-daemon

    # ========== 7. 产物处理 ==========
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-arm64-release
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
