name: Android CI Path Fix

on:
  push:
    branches: [ "best" ]
  pull_request:
    branches: [ "best" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REPO_NAME: Test-ryu  # 显式定义仓库名
      PROJECT_DIR: src/RyujinxAndroid

    steps:
    # ========== 1. 正确克隆仓库 ==========
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: best
        # 关键！设置 path 为仓库名，确保路径为 ${{ github.workspace }}/Test-ryu
        path: ${{ env.REPO_NAME }}

    # ========== 2. 调试路径 ==========
    - name: Verify directory structure
      run: |
        echo "Workspace root: ${{ github.workspace }}"
        echo "Repo path: ${{ github.workspace }}/${{ env.REPO_NAME }}"
        ls -la ${{ github.workspace }}/${{ env.REPO_NAME }}  # 验证仓库根目录
        ls -la ${{ github.workspace }}/${{ env.REPO_NAME }}/${{ env.PROJECT_DIR }}  # 验证子目录

    # ========== 3. 构建步骤 ==========
    - name: Build APK
      working-directory: ${{ github.workspace }}/${{ env.REPO_NAME }}/${{ env.PROJECT_DIR }}
      run: |
        chmod +x gradlew
        ./gradlew clean assembleRelease --no-daemon --stacktrace

    # ========== 4. 上传产物 ==========
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-release
        path: ${{ github.workspace }}/${{ env.REPO_NAME }}/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
