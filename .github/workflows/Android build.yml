name: Enhanced Android CI

on:
  push:
    branches: [ "best" ]
  pull_request:
    branches: [ "best" ]
  workflow_dispatch:
    inputs:
      should_release:
        description: 'Create GitHub Release'
        type: boolean
        default: false
      upload_artifact:
        description: 'Upload APK as artifact'
        type: boolean
        default: true
      release_tag:
        description: 'Custom release tag'
        type: string
        default: ''
      is_prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PROJECT_DIR: src/RyujinxAndroid
      NDK_VERSION: 25.1.8937393
      ANDROID_CMAKE_VERSION: 3.31.6
      DOTNET_SDK_VERSION: 9.0.203

    steps:
    # ========== 1. 克隆代码 ==========
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: best
        path: Test-ryu

    # ========== 2. 配置缓存 ==========
    - name: Setup CCache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ccache-${{ runner.os }}-${{ github.sha }}

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

    # ========== 3. 配置基础环境 ==========
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # ========== 4. 安装 Android SDK 和工具链 ==========
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: "latest"
        ndk-version: ${{ env.NDK_VERSION }}
        cmake-version: ${{ env.ANDROID_CMAKE_VERSION }}

    - name: Accept Android Licenses
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    # ========== 5. 安装 .NET SDK ==========
    - name: Install .NET SDK ${{ env.DOTNET_SDK_VERSION }}
      run: |
        wget https://packages.microsoft.com/config/ubuntu/20.04/packages-microsoft-prod.deb
        sudo dpkg -i packages-microsoft-prod.deb
        sudo apt update
        sudo apt install -y dotnet-sdk-9.0=9.0.203-1

    - name: Verify .NET SDK
      run: dotnet --list-sdks

    # ========== 6. 配置 CMake 路径 ==========
    - name: Add CMake to PATH
      run: |
        echo "CMake 路径: $ANDROID_HOME/cmake/${{ env.ANDROID_CMAKE_VERSION }}/bin"
        echo "$ANDROID_HOME/cmake/${{ env.ANDROID_CMAKE_VERSION }}/bin" >> $GITHUB_PATH

    - name: Verify CMake
      run: cmake --version

    # ========== 7. 构建 APK ==========
    - name: Build with Gradle
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      env:
        CMAKE_C_COMPILER_LAUNCHER: "ccache"
        CMAKE_CXX_COMPILER_LAUNCHER: "ccache"
      run: |
        # 强制更新 Gradle Wrapper 到 8.4
        sed -i 's/gradle-8.11.1-bin.zip/gradle-8.4-bin.zip/' gradle/wrapper/gradle-wrapper.properties
        ./gradlew wrapper --gradle-version 8.4
        
        chmod +x gradlew
        ./gradlew clean assembleRelease --no-daemon --stacktrace

    # ========== 8. 上传产物 ==========
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: ${{ inputs.upload_artifact || github.event_name == 'push' }}
      with:
        name: android-release
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk

    # ========== 9. 创建 Release ==========
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: ${{ inputs.should_release }}
      with:
        tag_name: ${{ inputs.release_tag || github.sha }}
        prerelease: ${{ inputs.is_prerelease }}
        files: |
          ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
