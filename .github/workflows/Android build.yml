name: Android CI with .NET 9.0.203

on:
  push:
    branches: [ "arm" ]
  pull_request:
    branches: [ "arm" ]
  workflow_dispatch:
    inputs:
      should_release:
        description: 'Create GitHub Release'
        type: boolean
        default: false
      upload_artifact:
        description: 'Upload APK as artifact'
        type: boolean
        default: true
        
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      packages: write
    env:
      PROJECT_DIR: src/RyujinxAndroid
      NDK_VERSION: 28.0.13004108
      CMAKE_VERSION: "3.31.6"
      DOTNET_VERSION: "9.0.203"
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: arm
        path: Test-ryu

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        include-prerelease: true

    - name: Install Android SDK and NDK
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "cmdline-tools;latest"
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.NDK_VERSION }}"
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;${{ env.CMAKE_VERSION }}"
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;34.0.0"

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libc6-dev lib32stdc++6 lib32z1 zlib1g-dev

    - name: Verify NDK Installation
      run: |
        NDK_PATH="$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}"
        echo "NDK Path: $NDK_PATH"
        ls -l $NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/24

    - name: Build Native Libraries
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/src/main/cpp
      run: |
        mkdir -p build && cd build
        export OPENSSL_INSTALL_DIR="$PWD/openssl_install"
        mkdir -p "$OPENSSL_INSTALL_DIR"
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_NATIVE_API_LEVEL=29 \
          -DCMAKE_INSTALL_PREFIX="$OPENSSL_INSTALL_DIR"
        make -j4

    - name: Build with Gradle
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        chmod +x gradlew
        unset _JAVA_OPTIONS
        ./gradlew clean assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: ${{ inputs.upload_artifact }}
      with:
        name: android-release
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
