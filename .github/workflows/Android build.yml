name: Advanced Android CI/CD

on:
  push:
    branches: [ "best" ]
  pull_request:
    branches: [ "best" ]
  workflow_dispatch:
    inputs:
      release_settings:
        description: 'Release Configuration'
        required: true
        type: choice
        options:
          - nightly
          - stable
          - custom
        default: 'nightly'

env:
  PROJECT_DIR: Test-ryu/src/RyujinxAndroid
  NDK_VERSION: 26.2.11394342      # 最新 LTS 版本 NDK
  CMAKE_VERSION: 3.27.7           # NDK 26+ 推荐版本
  BUILD_TOOLS: 34.0.0
  TARGET_SDK: 34
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

jobs:
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      packages: write
      actions: read

    steps:
    # ========== 代码仓库准备 ==========
    - name: Checkout codebase
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: best
        path: Test-ryu
        fetch-depth: 0
        sparse-checkout: |       # 优化大仓库克隆速度
          src/RyujinxAndroid/
          gradle/
          build.gradle

    # ========== 构建环境配置 ==========
    - name: Setup build tools
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: gradle
        check-latest: true

    - name: Configure Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: |
          ndk;${{ env.NDK_VERSION }}
          cmake;${{ env.CMAKE_VERSION }}
          platform-tools
          build-tools;${{ env.BUILD_TOOLS }}
          platforms;android-${{ env.TARGET_SDK }}
          cmdline-tools;latest
        accept-android-sdk-licenses: true
        disable-confirmation: true

    # ========== 缓存加速策略 ==========
    - name: CCache configuration
      uses: hendrikmuhs/ccache-action@v1.4
      with:
        key: ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}-ccache
        max-size: 500M
        restore-keys: |
          ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}-ccache

    - name: Gradle dependency cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ${{ github.workspace }}/Test-ryu/gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties', '**/build.gradle') }}

    # ========== 构建过程优化 ==========
    - name: Build Android package
      working-directory: ${{ github.workspace }}/${{ env.PROJECT_DIR }}
      env:
        CCACHE_DIR: /github/home/.ccache
        CCACHE_COMPRESS: true
        CCACHE_COMPRESSLEVEL: 6
      run: |
        # 预配置构建环境
        ./gradlew --configure-on-demand

        # 主构建命令
        ./gradlew clean assembleRelease \
          --build-cache \
          --no-daemon \
          --parallel \
          --max-workers=$(nproc) \
          -Pandroid.debug.obsoleteApi=true \
          -Pkotlin.incremental=true

    # ========== 构建产物处理 ==========
    - name: APK artifact management
      uses: actions/upload-artifact@v4
      with:
        name: android-${{ github.run_number }}
        path: |
          ${{ github.workspace }}/${{ env.PROJECT_DIR }}/app/build/outputs/apk/**/*.apk
          ${{ github.workspace }}/${{ env.PROJECT_DIR }}/app/build/outputs/mapping/**/*.txt
        retention-days: 7
        if-no-files-found: error

    # ========== 自动发布流程 ==========
    - name: Release orchestration
      if: ${{ github.event.inputs.release_settings != 'custom' || github.ref == 'refs/heads/best' }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ format('v{0}-{1}', github.run_number, env.NDK_VERSION) }}
        prerelease: ${{ contains(github.event.inputs.release_settings, 'nightly') }}
        generate_release_notes: true
        files: |
          ${{ github.workspace }}/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
        body: |
          ### Build Metadata
          | Component       | Version          |
          |-----------------|------------------|
          | NDK             | ${{ env.NDK_VERSION }} |
          | Build Tools     | ${{ env.BUILD_TOOLS }} |
          | Target SDK      | ${{ env.TARGET_SDK }} |
          | CMake           | ${{ env.CMAKE_VERSION }} |

          **Build Environment**:  
          - Runner: ${{ runner.os }} (Ubuntu 22.04)  
          - Java: Temurin 17  
          - Cache Efficiency: ${{ steps.ccache.outputs.cache-hit-rate }}

    # ========== 安全扫描集成 ==========
    - name: Security scanning
      uses: ShiftLeftSecurity/scan-action@v2
      if: always()
      with:
        output: reports/
        fail-build: false
