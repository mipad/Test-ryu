name: Test-ryu-build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        type: string
        default: 'best'
  push:
    branches: [ "best" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "best" ]

jobs:
  ryujinx_android_build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Clone repository
      run: |
        cd ${{ github.workspace }}
        git clone --branch "${{ github.event.inputs.branch || 'best' }}" \
          https://github.com/mipad/Test-ryu.git

    - name: Verify gradlew existence (调试步骤)
      run: |
        ls -la ${{ github.workspace }}/Test-ryu/.src/RyujinxAndroid  # 确认 gradlew 存在

    - id: version
      name: Get version
      working-directory: ${{ github.workspace }}/Test-ryu  # 确保版本获取在仓库目录
      run: |
        echo "date=$(date -u '+%Y%m%d')" >> $GITHUB_OUTPUT
        echo "hash=$(git log -1 --pretty=format:%H)" >> $GITHUB_OUTPUT
        echo "version=$(git describe --tags --always)" >> $GITHUB_OUTPUT

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ steps.version.outputs.hash }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build Android
      working-directory: ${{ github.workspace }}/Test-ryu/src/RyujinxAndroid  # 关键修复：进入 gradlew 所在目录
      run: |
        chmod +x gradlew  # 现在 gradlew 在 src/RyujinxAndroid 下
        ./gradlew clean assembleRelease --no-daemon --stacktrace
        # 修复 APK 移动路径（根据实际输出路径调整）
        mv app/build/outputs/apk/release/*.apk ${{ github.workspace }}/Test-ryu-${{ steps.version.outputs.date }}-${{ steps.version.outputs.version }}.apk

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        name: Ryujinx Android ${{ steps.version.outputs.date }}
        tag_name: android-${{ steps.version.outputs.date }}
        files: ${{ github.workspace }}/Test-ryu-${{ steps.version.outputs.date }}-${{ steps.version.outputs.version }}.apk
