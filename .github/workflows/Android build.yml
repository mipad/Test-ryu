name: Android CI with Gradlew Search

on:
  push:
    branches: [ "best" ]
  pull_request:
    branches: [ "best" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PROJECT_ROOT: src/RyujinxAndroid  # 项目根目录
      GRADLEW_SEARCH_PATTERN: "**/gradlew"  # 支持多级目录搜索

    steps:
    # ========== 1. 克隆代码 ==========
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: best
        path: ${{ env.PROJECT_ROOT }}
        sparse-checkout: |  # 稀疏检出优化（可选）
          ${{ env.GRADLEW_SEARCH_PATTERN }}
          app/
          gradle/
          build.gradle
        submodules: recursive

    # ========== 2. 全局搜索 gradlew ==========
    - name: Locate gradlew
      id: find_gradlew
      working-directory: ${{ env.PROJECT_ROOT }}
      run: |
        # 递归搜索 gradlew 文件
        GRADLEW_PATH=$(find . -type f -name "gradlew" -print -quit)
        
        if [ -z "$GRADLEW_PATH" ]; then
          echo "::error::gradlew not found in repository!"
          exit 1
        fi

        # 标准化路径并输出
        GRADLEW_DIR=$(dirname "$GRADLEW_PATH")
        echo "gradlew_path=$GRADLEW_PATH" >> $GITHUB_OUTPUT
        echo "GRADLEW_DIR=$GRADLEW_DIR" >> $GITHUB_ENV
        echo "Found gradlew at: $GRADLEW_PATH"

    # ========== 3. 动态配置环境变量 ==========
    - name: Set dynamic paths
      working-directory: ${{ env.PROJECT_ROOT }}
      run: |
        # 将 gradlew 所在目录设为工作目录
        echo "PROJECT_ROOT=${{ env.PROJECT_ROOT }}/${{ env.GRADLEW_DIR }}" >> $GITHUB_ENV

    # ========== 4. 后续构建步骤 ==========
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: 25.2.9519653

    - name: Accept licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    - name: Build APK
      working-directory: ${{ env.PROJECT_ROOT }}
      run: |
        chmod +x gradlew
        ./gradlew clean assembleRelease --no-daemon --stacktrace

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-release
        path: ${{ env.PROJECT_ROOT }}/app/build/outputs/apk/release/*.apk
