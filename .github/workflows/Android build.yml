name: Android CI with .NET 9.0.203

on:
  push:
    branches: [ "arm" ]
  pull_request:
    branches: [ "arm" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      packages: write
    env:
      PROJECT_DIR: src/RyujinxAndroid      # Android 项目路径
      LIB_PROJECT_DIR: src/LibRyujinx      # .NET 原生库项目路径
      NDK_VERSION: 25.1.8937393
      DOTNET_VERSION: "9.0.203"

    steps:
    # -------------------------- 代码检出 --------------------------
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: best
        path: Test-ryu

    # -------------------------- 初始化构建工具 --------------------------

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        include-prerelease: true

    - name: Verify .NET Version
      run: dotnet --version

    # -------------------------- 配置 Android 环境 --------------------------
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: ${{ env.NDK_VERSION }}

    - name: Install CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"
        echo "PATH=$ANDROID_HOME/cmake/3.22.1/bin:$PATH" >> $GITHUB_ENV  # 强制使用 CMake 3.22.1

    # -------------------------- 清理步骤 --------------------------
    - name: Clean Gradle Project
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        chmod +x gradlew  # 修复权限问题
        ./gradlew clean
        rm -rf ~/.gradle/caches  # 清理全局缓存

    - name: Clean .NET Project
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.LIB_PROJECT_DIR }}
      run: |
        dotnet clean  # 在 .NET 项目目录下执行

    # -------------------------- 构建阶段 --------------------------
    - name: Build with Gradle
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      
      run: |
        chmod +x gradlew  # 再次确保权限
        unset _JAVA_OPTIONS  # 避免 Java 环境变量冲突
        ./gradlew :libryujinx:compileLibRyujinx assembleRelease --no-daemon --stacktrace  # 强制重新构建

    # -------------------------- 验证 APK 内容 --------------------------
    - name: Verify APK Contents
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        apk_path=$(ls app/build/outputs/apk/release/*.apk)
        if ! unzip -l "$apk_path" | grep -q 'lib/arm64-v8a/libryujinx.so'; then
          echo "❌ Error: APK 中缺少 libryujinx.so 文件！"
          exit 1
        else
          echo "✅ 验证通过：APK 包含 libryujinx.so"
        fi

    # -------------------------- 发布与上传 --------------------------
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: ${{ inputs.upload_artifact || github.event_name == 'push' }}
      with:
        name: android-release
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: ${{ inputs.should_release }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ inputs.release_tag || github.sha }}
        prerelease: ${{ inputs.is_prerelease }}
        files: |
          ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
