name: Android CI (Full Clone)

on:
  push:
    branches: [ "best" ]
  pull_request:
    branches: [ "best" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PROJECT_DIR: src/RyujinxAndroid  # 你的 Android 项目子目录

    steps:
    # ========== 1. 完整克隆仓库 ==========
    - name: Checkout full repository
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: best
        # 不设置 path 参数，默认克隆到 $GITHUB_WORKSPACE/Test-ryu

    # ========== 2. 配置 Java 环境 ==========
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # ========== 3. 配置 Android SDK ==========
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: 25.2.9519653  # 根据项目需求调整

    # ========== 4. 接受 Android 许可证 ==========
    - name: Accept licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    # ========== 5. 进入项目子目录并构建 ==========
    - name: Build APK
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        chmod +x gradlew  # 赋予执行权限
        ./gradlew clean assembleRelease --no-daemon --stacktrace

    # ========== 6. 上传产物 ==========
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-release
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
