name: Android CI with .NET 9.0.203

on:
  push:
    branches: [ "arm" ]
  pull_request:
    branches: [ "arm" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PROJECT_DIR: src/RyujinxAndroid
      LIB_PROJECT_DIR: src/LibRyujinx
      NDK_VERSION: 25.1.8937393
      DOTNET_VERSION: "9.0.203"
      ANDROID_NDK_HOME: ${{ github.workspace }}/android-ndk

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: arm
        path: Test-ryu

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Android SDK and NDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: ${{ env.NDK_VERSION }}

    - name: Set NDK Home Environment
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

    - name: Debug NDK Path
      run: |
        echo "NDK Path: $ANDROID_NDK_HOME"
        ls -l $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64  # 检查工具链文件

    - name: Install CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"
        echo "PATH=$ANDROID_HOME/cmake/3.22.1/bin:$PATH" >> $GITHUB_ENV

    - name: Generate local.properties
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties

    - name: Build with Gradle
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        chmod +x gradlew
        unset _JAVA_OPTIONS
        ./gradlew :libryujinx:compileLibRyujinx assembleRelease \
          --no-daemon \
          --stacktrace \
          -Pandroid.ndkPath="$ANDROID_NDK_HOME"  # 显式传递 NDK 路径

    - name: Verify APK Contents
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        apk_path=$(ls app/build/outputs/apk/release/*.apk)
        unzip -l "$apk_path" | grep 'lib/arm64-v8a/libryujinx.so' || exit 1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-release
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
