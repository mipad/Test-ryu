name: Android CI with .NET 9.0.101

on:
  push:
    branches: [ "best" ]
  pull_request:
    branches: [ "best" ]
  workflow_dispatch:
    inputs:
      should_release:
        description: 'Create GitHub Release'
        type: boolean
        default: false
      upload_artifact:
        description: 'Upload APK as artifact'
        type: boolean
        default: true
      release_tag:
        description: 'Custom release tag'
        type: string
        default: ''
      is_prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    # ========== 全局权限配置 ==========
    permissions:
      contents: read    # 默认克隆仓库的读权限
      actions: write     # 允许上传构件
      packages: write   # 如需发布包时启用（按需）
    env:
      PROJECT_DIR: src/RyujinxAndroid
      NDK_VERSION: 26.2.11394342
      DOTNET_VERSION: "9.0.101"

    steps:
    # ========== 1. 克隆代码 ==========
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: best
        path: Test-ryu

    # ========== 2. 配置缓存 ==========
    - name: Setup CCache
      uses: hendrikmuhs/ccache-action@v1.2

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

    # ========== 3. 配置环境 ==========
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        include-prerelease: true  # 允许安装预览版

    - name: Verify .NET Version
      run: dotnet --version

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: ${{ env.NDK_VERSION }}

    # ========== 4. 安装构建工具 ==========
    - name: Install CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.31.6"
    # ========== 5. 构建 APK ==========
    - name: Build with Gradle
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      env:
        CMAKE_C_COMPILER_LAUNCHER: "ccache"
        CMAKE_CXX_COMPILER_LAUNCHER: "ccache"
      run: |
        chmod +x gradlew
        ./gradlew clean assembleRelease --no-daemon --stacktrace
    # ========== 6. 上传产物 ==========
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: ${{ inputs.upload_artifact || github.event_name == 'push' }}
      with:
        name: android-release
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk

    # ========== 7. 创建 Release ==========
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: ${{ inputs.should_release }}
      # 局部覆盖权限（需在全局 permissions 中已定义 contents: read）
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 自动注入的 Token
      with:
        tag_name: ${{ inputs.release_tag || github.sha }}
        prerelease: ${{ inputs.is_prerelease }}
        files: |
          ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
