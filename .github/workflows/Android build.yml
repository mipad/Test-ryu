name: Enhanced Android CI

on:
  push:
    branches: [ "best" ]
  pull_request:
    branches: [ "best" ]
  workflow_dispatch:
    inputs:
      should_release:
        description: 'Create GitHub Release'
        type: boolean
        default: false
      upload_artifact:
        description: 'Upload APK as artifact'
        type: boolean
        default: true
      release_tag:
        description: 'Custom release tag'
        type: string
        default: ''
      is_prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PROJECT_DIR: src/RyujinxAndroid
      NDK_VERSION: 25.1.8937393
      ANDROID_CMAKE_VERSION: 3.31.6
      DOTNET_VERSION: 9.0.203

    steps:
    # ========== 1. 克隆代码 ==========
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: best
        path: Test-ryu

    # ========== 2. 强制清理旧版 .NET ==========
    - name: Purge existing .NET
      run: |
        # 移除所有可能的残留
        sudo apt remove --purge dotnet-* aspnetcore-* -y || true
        sudo apt autoremove -y
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/bin/dotnet
        sudo rm -rf ~/.dotnet

    # ========== 3. 安装 .NET SDK 9.0.203 ==========
    - name: Install .NET SDK ${{ env.DOTNET_VERSION }}
      run: |
        # 使用微软官方脚本安装到隔离目录
        wget https://dot.net/v1/dotnet-install.sh
        chmod +x dotnet-install.sh
        sudo ./dotnet-install.sh --version ${{ env.DOTNET_VERSION }} --install-dir /opt/dotnet --no-path
        
        # 配置全局环境变量
        echo "DOTNET_ROOT=/opt/dotnet" | sudo tee -a /etc/environment
        echo "PATH=/opt/dotnet:/opt/dotnet/tools:$PATH" | sudo tee -a /etc/environment
        source /etc/environment

    # ========== 4. 验证 .NET 环境 ==========
    - name: Verify .NET
      run: |
        echo "Dotnet Path: $(which dotnet)"
        dotnet --list-sdks
        dotnet --info

    # ========== 5. 配置缓存加速 ==========
    - name: Setup CCache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ccache-${{ runner.os }}-${{ github.sha }}

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

    # ========== 6. 配置基础环境 ==========
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # ========== 7. 配置 Android 工具链 ==========
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: "latest"
        ndk-version: ${{ env.NDK_VERSION }}
        cmake-version: ${{ env.ANDROID_CMAKE_VERSION }}

    - name: Accept Android Licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    # ========== 8. 配置 CMake 路径 ==========
    - name: Add CMake to PATH
      run: |
        echo "$ANDROID_HOME/cmake/${{ env.ANDROID_CMAKE_VERSION }}/bin" >> $GITHUB_PATH

    - name: Verify CMake
      run: cmake --version

    # ========== 9. 强制更新 Gradle ==========
    - name: Force Gradle 8.4
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        sed -i 's/gradle-8.11.1-bin.zip/gradle-8.4-bin.zip/' gradle/wrapper/gradle-wrapper.properties
        ./gradlew wrapper --gradle-version 8.4

    # ========== 10. 构建 APK ==========
    - name: Build with Gradle
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      env:
        CMAKE_C_COMPILER_LAUNCHER: "ccache"
        CMAKE_CXX_COMPILER_LAUNCHER: "ccache"
      run: |
        chmod +x gradlew
        ./gradlew clean assembleRelease --no-daemon --stacktrace

    # ========== 11. 上传产物 ==========
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: ${{ inputs.upload_artifact || github.event_name == 'push' }}
      with:
        name: android-release
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk

    # ========== 12. 创建 Release ==========
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: ${{ inputs.should_release }}
      with:
        tag_name: ${{ inputs.release_tag || github.sha }}
        prerelease: ${{ inputs.is_prerelease }}
        files: |
          ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
