name: Android CI with NDK Fix

on:
  push:
    branches: [ "arm" ]
  pull_request:
    branches: [ "arm" ]

env:
  NDK_VERSION: "25.1.8937393"  # 确认可用的 NDK 版本
  ANDROID_HOME: ${{ github.workspace }}/android-sdk  # 显式定义 SDK 路径
  PROJECT_DIR: "Test-ryu/src/RyujinxAndroid"  # 项目路径

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # -------------------------- 代码检出 --------------------------
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: arm
        path: Test-ryu

    # -------------------------- Android 环境配置 (核心修复) --------------------------
    - name: Install Android SDK and NDK
      uses: android-actions/setup-android@v3
      id: android-setup
      with:
        cmdline-tools-version: "latest"  # 必须指定命令行工具版本
        packages: "tools,platform-tools,ndk;${{ env.NDK_VERSION }},cmake;3.22.1"  # 逗号分隔！
        accept-android-sdk-licenses: true
        log-accepted-android-sdk-licenses: true  # 调试用

    # -------------------------- NDK 路径验证 --------------------------
    - name: Validate NDK Installation
      run: |
        NDK_DIR="$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}"
        echo "检查 NDK 路径: $NDK_DIR"

        # 基础目录检查
        if [ ! -d "$NDK_DIR" ]; then
          echo "::error::❌ NDK 目录不存在: $NDK_DIR"
          echo "已安装的 NDK 版本:"
          ls -l $ANDROID_HOME/ndk || true
          exit 1
        fi

        # 关键文件检查
        REQUIRED_FILES=(
          "$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
          "$NDK_DIR/build/cmake/android.toolchain.cmake"
        )
        
        MISSING_FILES=0
        for file in "${REQUIRED_FILES[@]}"; do
          if [ ! -f "$file" ]; then
            echo "::error::❌ 关键文件缺失: $file"
            MISSING_FILES=1
          fi
        done

        if [ $MISSING_FILES -ne 0 ]; then
          exit 1
        fi

        echo "✅ NDK 验证通过"
        echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV

    # -------------------------- 备用手动安装 (保险机制) --------------------------
    - name: Manual NDK Installation (Fallback)
      if: ${{ failure() && steps.android-setup.outcome == 'failure' }}
      run: |
        echo "::warning::⚠️ 自动安装失败，尝试手动安装 NDK..."
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --verbose "ndk;${{ env.NDK_VERSION }}"
        
        # 二次验证
        if [ ! -d "$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" ]; then
          echo "::error::❌ 手动安装仍失败！请检查 NDK 版本有效性"
          exit 1
        fi

    # -------------------------- 生成 Gradle 配置文件 --------------------------
    - name: Configure local.properties
      working-directory: ${{ github.workspace }}/${{ env.PROJECT_DIR }}
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties
        echo "生成配置内容:"
        cat local.properties

    # -------------------------- 构建阶段 --------------------------
    - name: Build Android Project
      working-directory: ${{ github.workspace }}/${{ env.PROJECT_DIR }}
      run: |
        # 修复权限问题
        chmod +x gradlew

        # 清理并构建
        ./gradlew clean assembleRelease \
          --no-daemon \
          --stacktrace \
          -Pandroid.ndkPath="$ANDROID_NDK_HOME"

    # -------------------------- 产物处理 --------------------------
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ryujinx-release
        path: ${{ github.workspace }}/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
        retention-days: 3
