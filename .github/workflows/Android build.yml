name: Ryujinx Android CI (CMake FetchContent)

on:
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: 'Upload APK artifact'
        type: boolean
        default: true
      release_tag:
        description: 'Release tag (empty=auto)'
        type: string
        default: ''
  push:
    branches: [ "best" ]
  pull_request:
    branches: [ "best" ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      PROJECT_ROOT: .src/RyujinxAndroid
      BUILD_DIR: ${{ github.workspace }}/build
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
    # ========== 代码检出（禁用子模块）==========
    - name: Checkout codebase
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: best
        path: ${{ env.PROJECT_ROOT }}
        submodules: false  # 关键配置：禁用子模块
        fetch-depth: 0

    # ========== 构建加速配置 ==========
    - name: CCache setup
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ryujinx-fetchcontent-${{ github.sha }}
        max_size: 1G

    - name: CMake cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.BUILD_DIR }}
          ~/.cache/CMake
        key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}

    # ========== 环境配置 ==========
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: 25.2.9519653
        cmake-version: 3.22.1

    - name: Accept licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    # ========== CMake 构建阶段 ==========
    - name: Configure CMake
      working-directory: ${{ env.PROJECT_ROOT }}
      run: |
        cmake -B ${{ env.BUILD_DIR }} \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-33 \
          -DCMAKE_FETCHCONTENT_FULLY_DISCONNECTED=OFF

    - name: Build with CMake
      working-directory: ${{ env.PROJECT_ROOT }}
      env:
        CCACHE_DIR: /github/workspace/.ccache
      run: cmake --build ${{ env.BUILD_DIR }} --parallel 4

    # ========== Gradle 打包 ==========
    - name: Build APK
      working-directory: ${{ env.PROJECT_ROOT }}
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease \
          -PCMAKE_BUILD_DIR=${{ env.BUILD_DIR }} \
          --no-daemon \
          --stacktrace

    # ========== 产物处理 ==========
    - name: Locate APK
      id: apk_finder
      working-directory: ${{ env.PROJECT_ROOT }}
      run: |
        APK_PATH=$(find app/build/outputs/apk -name '*.apk' -print -quit)
        echo "apk_path=${APK_PATH}" >> $GITHUB_OUTPUT
        echo "APK_NAME=$(basename ${APK_PATH})" >> $GITHUB_ENV

    - name: Archive APK
      run: |
        mv "${{ env.PROJECT_ROOT }}/${{ steps.apk_finder.outputs.apk_path }}" \
          "${{ github.workspace }}/Ryujinx-Android-${{ github.run_number }}.apk"

    # ========== 发布流程 ==========
    - name: Upload artifact
      if: ${{ inputs.upload_artifact || github.event_name == 'push' }}
      uses: actions/upload-artifact@v4
      with:
        name: ryujinx-android
        path: ${{ github.workspace }}/Ryujinx-Android-${{ github.run_number }}.apk
        retention-days: 7

    - name: Create Release
      if: ${{ github.event_name == 'push' }}
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ coalesce(inputs.release_tag, format('Ryujinx-Android-{0}', github.run_number)) }}
        tag_name: ${{ coalesce(inputs.release_tag, format('android-{0}', github.run_number)) }}
        files: |
          ${{ github.workspace }}/Ryujinx-Android-${{ github.run_number }}.apk
