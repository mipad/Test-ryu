name: Android CI with .NET 9.0.203

on:
  push:
    branches: [ "arm" ]
  pull_request:
    branches: [ "arm" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      packages: write

    # -------------------------- 全局静态环境变量 --------------------------
    env:
      PROJECT_DIR: src/RyujinxAndroid
      LIB_PROJECT_DIR: src/LibRyujinx
      NDK_VERSION: 25.1.8937393  # 直接硬编码版本号
      DOTNET_VERSION: "9.0.203"

    steps:
    # -------------------------- 代码检出 --------------------------
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: arm
        path: Test-ryu
        fetch-depth: 0

    # -------------------------- 初始化构建工具 --------------------------
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        check-latest: true

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # -------------------------- 配置 Android 环境 (关键修复) --------------------------
    - name: Setup Android SDK and NDK
      uses: android-actions/setup-android@v3
      id: android-setup
      with:
        ndk: ${{ env.NDK_VERSION }}  # 使用正确的参数名
        cmake: 3.22.1
        packages: |
          tools
          platform-tools
          ndk;${{ env.NDK_VERSION }}  # 显式包含 NDK 包
        accept-android-sdk-licenses: true

    # 动态设置 NDK 路径（必须在此步骤后）
    - name: Set Android NDK Home
      run: |
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
        echo "📌 Android SDK 路径: $ANDROID_HOME"
        echo "📌 Android NDK 路径: $ANDROID_NDK_HOME"

    # -------------------------- NDK 安装验证 --------------------------
    - name: Verify NDK Installation
      run: |
        if [ ! -d "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64" ]; then
          echo "::error::❌ NDK 安装失败！工具链目录不存在"
          exit 1
        fi
        echo "✅ NDK 验证通过"
        echo "已安装的 NDK 内容:"
        ls -l $ANDROID_NDK_HOME

    # -------------------------- 生成配置 --------------------------
    - name: Generate local.properties
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties
        echo "生成的文件内容:"
        cat local.properties

    # -------------------------- 构建阶段 --------------------------
    - name: Build with Gradle
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        chmod +x gradlew
        unset _JAVA_OPTIONS
        
        echo "::group::🔧 构建环境信息"
        echo "NDK 路径: $ANDROID_NDK_HOME"
        ./gradlew --version
        echo "::endgroup::"

        ./gradlew :libryujinx:compileLibRyujinx assembleRelease \
          --no-daemon \
          --stacktrace \
          --info \
          -Pandroid.ndkPath="$ANDROID_NDK_HOME" \
          -Dorg.gradle.parallel=false

    # -------------------------- 产物验证 --------------------------
    - name: Verify APK Structure
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        apk_path=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
        if [ -z "$apk_path" ]; then
          echo "::error::❌ 未找到 APK 文件！"
          exit 1
        fi
        
        echo "🔍 分析 APK: $apk_path"
        if unzip -l "$apk_path" | grep -q 'lib/.*/libryujinx.so'; then
          echo "✅ 原生库验证通过"
        else
          echo "::error::❌ APK 中缺少原生库！"
          exit 1
        fi

    # -------------------------- 产物上传 --------------------------
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-release-${{ github.sha }}
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
        retention-days: 3

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: ${{ github.event_name == 'push' }}
      with:
        tag_name: build-${{ github.run_id }}
        name: "Android Build ${{ github.run_number }}"
        body: "自动构建版本 - ${{ github.sha }}"
        prerelease: true
        files: |
          ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
