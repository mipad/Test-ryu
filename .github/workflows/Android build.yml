name: Android CI

on:
  push:
    branches: [ "best" ]
  pull_request:
    branches: [ "best" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # ========== 1. 克隆代码到明确路径 ==========
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: best
        path: Test-ryu  # 关键！克隆到 ${{ github.workspace }}/Test-ryu

    # ========== 2. 验证路径 ==========
    - name: Check directory structure
      run: |
        echo "项目路径: ${{ github.workspace }}/Test-ryu/src/RyujinxAndroid"
        ls -la ${{ github.workspace }}/Test-ryu/src/RyujinxAndroid

    # ========== 3. 构建步骤 ==========
    - name: Build APK
      working-directory: ${{ github.workspace }}/Test-ryu/src/RyujinxAndroid
      run: |
        chmod +x gradlew
        ./gradlew clean assembleRelease --no-daemon --stacktrace

    # ========== 4. 上传产物 ==========
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-release
        path: ${{ github.workspace }}/Test-ryu/src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
