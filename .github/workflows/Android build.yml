name: Ryujinx Android CI (Fixed)

on:
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: "Upload APK artifact"
        type: boolean
        default: true
      release_tag:
        description: "Custom release tag"
        type: string
        default: ""
  push:
    branches: [ "best" ]
  pull_request:
    branches: [ "best" ]

env:
  REPO_ROOT: ${{ github.workspace }}
  CMAKE_SOURCE_DIR: src/RyujinxAndroid/app/src/main/cpp  # 核心修正点
  BUILD_DIR: ${{ github.workspace }}/build
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
  ANDROID_ABI: arm64-v8a
  ANDROID_PLATFORM: android-33

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    # ========== 代码检出 ==========
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: best
        path: src/RyujinxAndroid
        submodules: false
        fetch-depth: 0

    # ========== 环境验证 ==========
    - name: Validate CMakeLists existence
      run: |
        echo "Checking CMakeLists.txt at: ${{ env.CMAKE_SOURCE_DIR }}"
        ls -la ${{ env.CMAKE_SOURCE_DIR }}
        test -f ${{ env.CMAKE_SOURCE_DIR }}/CMakeLists.txt || exit 1

    # ========== 缓存配置 ==========
    - name: CCache setup
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ryujinx-${{ github.sha }}
        max_size: 2G

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.BUILD_DIR }}
          ~/.cache/CMake
        key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}

    # ========== 安卓环境配置 ==========
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: 25.2.9519653
        cmake-version: 3.22.1

    - name: Accept licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    # ========== CMake 构建阶段 ==========
    - name: Configure CMake
      working-directory: ${{ env.CMAKE_SOURCE_DIR }}
      run: |
        cmake -B "${{ env.BUILD_DIR }}" \
          -S . \
          -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
          -DANDROID_ABI="${{ env.ANDROID_ABI }}" \
          -DANDROID_PLATFORM="${{ env.ANDROID_PLATFORM }}" \
          -DCMAKE_FETCHCONTENT_FULLY_DISCONNECTED=OFF

    - name: Build native code
      working-directory: ${{ env.CMAKE_SOURCE_DIR }}
      env:
        CCACHE_DIR: /github/workspace/.ccache
      run: cmake --build "${{ env.BUILD_DIR }}" --parallel 4

    # ========== Gradle 打包 ==========
    - name: Build APK
      working-directory: src/RyujinxAndroid
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease \
          -PnativeBuildDir="${{ env.BUILD_DIR }}" \
          --no-daemon \
          --stacktrace

    # ========== 产物处理 ==========
    - name: Locate APK
      id: find_apk
      working-directory: src/RyujinxAndroid
      run: |
        APK_PATH=$(find app/build/outputs/apk -name '*.apk' -print -quit)
        echo "apk_path=${APK_PATH}" >> $GITHUB_OUTPUT
        echo "APK_NAME=$(basename ${APK_PATH})" >> $GITHUB_ENV

    - name: Prepare release asset
      run: |
        mv "src/RyujinxAndroid/${{ steps.find_apk.outputs.apk_path }}" \
          "${{ env.REPO_ROOT }}/Ryujinx-Android-${{ github.run_number }}.apk"

    # ========== 发布流程 ==========
    - name: Upload artifact
      if: ${{ inputs.upload_artifact || github.event_name == 'push' }}
      uses: actions/upload-artifact@v4
      with:
        name: ryujinx-android
        path: ${{ env.REPO_ROOT }}/Ryujinx-Android-${{ github.run_number }}.apk
        retention-days: 7
