name: Android CI with .NET 9.0.203

on:
  push:
    branches: [ "arm" ]
  pull_request:
    branches: [ "arm" ]
  workflow_dispatch:
    inputs:
      should_release:
        description: 'Create GitHub Release'
        type: boolean
        default: false
      upload_artifact:
        description: 'Upload APK as artifact'
        type: boolean
        default: true
      release_tag:
        description: 'Custom release tag'
        type: string
        default: ''
      is_prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      packages: write
    env:
      PROJECT_DIR: src/RyujinxAndroid
      NDK_VERSION: 25.1.8937393
      DOTNET_VERSION: "9.0.203"

    steps:
    # -------------------------- 代码检出 --------------------------
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: best
        path: Test-ryu  # 代码检出到 Test-ryu 目录

    # -------------------------- 初始化构建工具 --------------------------
    - name: Setup CCache
      uses: hendrikmuhs/ccache-action@v1.2

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        include-prerelease: true

    - name: Verify .NET Version
      run: dotnet --version

    # -------------------------- 配置 Android 环境 --------------------------
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: ${{ env.NDK_VERSION }}

    - name: Install CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"
        echo "PATH=$ANDROID_HOME/cmake/3.22.1/bin:$PATH" >> $GITHUB_ENV  # 显式设置 CMake 路径

    # -------------------------- 清理步骤 --------------------------
    - name: Clean Gradle and .NET artifacts
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}  # 设置正确的工作目录
      run: |
        chmod +x gradlew  # 赋予执行权限
        ./gradlew clean
        dotnet clean
        rm -rf ~/.gradle/caches  # 清理全局缓存

    # -------------------------- 构建阶段 --------------------------
    - name: Build with Gradle
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      env:
        CMAKE_C_COMPILER_LAUNCHER: "ccache"
        CMAKE_CXX_COMPILER_LAUNCHER: "ccache"
      run: |
        chmod +x gradlew  # 再次确保权限
        unset _JAVA_OPTIONS  # 避免 Java 环境干扰
        ./gradlew clean :libryujinx:compileLibRyujinx assembleRelease --no-daemon --stacktrace  # 强制重新构建

    # -------------------------- 验证 APK 内容 --------------------------
    - name: Verify APK Contents
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        apk_path=$(ls app/build/outputs/apk/release/*.apk)
        unzip -l "$apk_path" | grep 'lib/arm64-v8a/libryujinx.so' || (echo "Error: .so file missing!"; exit 1)

    # -------------------------- 发布与上传 --------------------------
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: ${{ inputs.upload_artifact || github.event_name == 'push' }}
      with:
        name: android-release
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: ${{ inputs.should_release }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ inputs.release_tag || github.sha }}
        prerelease: ${{ inputs.is_prerelease }}
        files: |
          ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
