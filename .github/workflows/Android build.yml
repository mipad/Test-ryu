name: Enhanced Android CI

on:
  push:
    branches: [ "best" ]
  pull_request:
    branches: [ "best" ]
  workflow_dispatch:
    inputs:
      should_release:
        description: 'Create GitHub Release'
        type: boolean
        default: false
      upload_artifact:
        description: 'Upload APK as artifact'
        type: boolean
        default: true
      release_tag:
        description: 'Custom release tag'
        type: string
        default: ''
      is_prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PROJECT_DIR: src/RyujinxAndroid
      NDK_VERSION: 25.1.8937393
      ANDROID_CMAKE_VERSION: 3.31.6  # 显式定义 CMake 版本

    steps:
    # ========== 1. 克隆代码 ==========
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: best
        path: Test-ryu

    # ========== 2. 配置缓存 ==========
    - name: Setup CCache
      uses: hendrikmuhs/ccache-action@v1.2

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

    # ========== 3. 配置环境 ==========
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: ${{ env.NDK_VERSION }}

    # ========== 4. 接受 Android 许可证 ==========
    - name: Accept Android Licenses
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    # ========== 5. 安装 CMake ==========
    - name: Install CMake
      run: |
        # 显式安装 CMake 并添加到 PATH
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;${{ env.ANDROID_CMAKE_VERSION }}"
        echo "CMake 路径: $ANDROID_HOME/cmake/${{ env.ANDROID_CMAKE_VERSION }}/bin"
        echo "$ANDROID_HOME/cmake/${{ env.ANDROID_CMAKE_VERSION }}/bin" >> $GITHUB_PATH

    # ========== 6. 验证 CMake 安装 ==========
    - name: Check CMake Version
      run: |
        cmake --version
        which cmake

    # ========== 7. 构建 APK ==========
    - name: Build with Gradle
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      env:
        CMAKE_C_COMPILER_LAUNCHER: "ccache"
        CMAKE_CXX_COMPILER_LAUNCHER: "ccache"
      run: |
        chmod +x gradlew
        ./gradlew clean assembleRelease --no-daemon --stacktrace

    # ========== 8. 上传产物 ==========
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: ${{ inputs.upload_artifact || github.event_name == 'push' }}
      with:
        name: android-release
        path: ${{ github.workspace }}/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk

    # ========== 9. 创建 Release ==========
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: ${{ inputs.should_release }}
      with:
        tag_name: ${{ inputs.release_tag || github.sha }}
        prerelease: ${{ inputs.is_prerelease }}
        files: |
          ${{ github.workspace }}/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
