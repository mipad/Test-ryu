name: Test-ryu-build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        type: string
        default: 'best'  # 关键修复：设置默认分支
  push:
    branches: [ "best" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "best" ]

jobs:
  ryujinx_android_build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Clone repository
      run: |
        cd ${{ github.workspace }}
        # 关键修复：移除 --false，并为 branch 提供默认值
        git clone --branch "${{ github.event.inputs.branch || 'best' }}" \
          https://github.com/mipad/Test-ryu.git

    - id: version
      name: Get version
      run: |
        cd ${{ github.workspace }}/Test-ryu
        echo "date=$(date -u '+%Y%m%d')" >> $GITHUB_OUTPUT
        echo "hash=$(git log -1 --pretty=format:%H)" >> $GITHUB_OUTPUT
        echo "short_hash=$(git describe --always --long)" >> $GITHUB_OUTPUT
        echo "version=$(git describe --tags --always)" >> $GITHUB_OUTPUT

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ steps.version.outputs.hash }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build Android
      working-directory: ${{ github.workspace }}/Test-ryu
      run: |
        chmod +x gradlew  # 直接使用仓库根目录的 gradlew
        ./gradlew clean assembleRelease --no-daemon --stacktrace
        # 修复 APK 移动路径
        mv app/build/outputs/apk/release/*.apk ../Test-ryu-${{ steps.version.outputs.date }}-${{ steps.version.outputs.version }}.apk

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        name: Ryujinx Android ${{ steps.version.outputs.date }}
        tag_name: android-${{ steps.version.outputs.date }}
        files: ${{ github.workspace }}/Test-ryu-${{ steps.version.outputs.date }}-${{ steps.version.outputs.version }}.apk
