name: Android CI Path Fix

on:
  push:
    branches: [ "best" ]
  pull_request:
    branches: [ "best" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PROJECT_DIR: src/RyujinxAndroid  # 项目子目录

    steps:
    # ========== 1. 正确克隆仓库 ==========
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: best
        # 不指定 path 参数，默认克隆到 ${{ github.workspace }}/Test-ryu

    # ========== 2. 调试路径（关键验证） ==========
    - name: Verify paths
      run: |
        echo "Workspace root: ${{ github.workspace }}"  # 应为 /home/runner/work/Test-ryu/Test-ryu
        echo "Repo directory: ${{ github.workspace }}/Test-ryu"  # 克隆后的实际路径
        ls -la ${{ github.workspace }}/Test-ryu  # 验证仓库根目录
        ls -la ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}  # 验证项目子目录

    # ========== 3. 构建步骤 ==========
    - name: Build APK
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        chmod +x gradlew
        ./gradlew clean assembleRelease --no-daemon --stacktrace

    # ========== 4. 上传产物 ==========
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-release
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
