name: Android CI - Fixed NDK Paths

on:
  push:
    branches: [ "best" ]
  pull_request:
    branches: [ "best" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REPO_NAME: Test-ryu                   # 仓库名称
      PROJECT_DIR: src/RyujinxAndroid        # 项目子目录
      NDK_VERSION: 25.2.9519653             # 推荐稳定 NDK 版本
      ANDROID_API: 29                       # Android API 级别
      DOTNET_VERSION: 9.0.203               # .NET SDK 版本

    steps:
    # ========== 1. 克隆仓库 ==========
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: mipad/Test-ryu
        ref: best
        path: ${{ env.REPO_NAME }}          # 克隆到 ${{ github.workspace }}/Test-ryu

    # ========== 2. 安装交叉编译工具链 ==========
    - name: Install ARM64 toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu \
          libc6-dev-arm64-cross

    # ========== 3. 配置 .NET 环境 ==========
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # ========== 4. 配置 Android 环境 ==========
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: ${{ env.NDK_VERSION }}  # 使用兼容的 NDK 版本

    - name: Accept Android licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    # ========== 5. 配置 NDK 路径 ==========
    - name: Set NDK environment
      run: |
        echo "NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
        echo "SYSROOT=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot" >> $GITHUB_ENV
        echo "LIB_DIR=$SYSROOT/usr/lib/aarch64-linux-android/${{ env.ANDROID_API }}" >> $GITHUB_ENV

    # ========== 6. 验证 NDK 路径 ==========
    - name: Verify NDK paths
      run: |
        echo "NDK根目录: $NDK_HOME"
        echo "Sysroot路径: $SYSROOT"
        echo "库目录: $LIB_DIR"
        ls -la $LIB_DIR  # 确认存在 crtbegin_so.o、liblog.so 等文件

    # ========== 7. 构建 APK ==========
    - name: Build APK
      working-directory: ${{ github.workspace }}/${{ env.REPO_NAME }}/${{ env.PROJECT_DIR }}
      run: |
        chmod +x gradlew
        ./gradlew clean assembleRelease \
          -DllvmToolchainPath=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin \
          -DlinkerFlags="-Wl,--sysroot=$SYSROOT -L$LIB_DIR -llog -ldl -lz -lm -lgcc -lc" \
          --no-daemon \
          --stacktrace

    # ========== 8. 上传产物 ==========
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-release
        path: ${{ github.workspace }}/${{ env.REPO_NAME }}/${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
