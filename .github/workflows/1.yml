name: Initialize and Update Submodules to Test Branch
on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [test]  # 仅在 test 分支触发

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写入权限提交变更

    steps:
      # ------------ 1. 检出主仓库及子模块 ------------
      - name: Checkout main repo with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}  # 必须使用 PAT
          submodules: recursive         # 递归初始化子模块
          ref: test                     # 指定 test 分支
          fetch-depth: 0                # 获取完整历史

      # ------------ 2. 将所有子模块切换到 test 分支 ------------
      - name: Switch submodules to test branch
        run: |
          # 遍历所有子模块并切换到 test 分支
          git submodule foreach --recursive '
            git fetch origin test
            git checkout test || git checkout -b test origin/test
            git pull origin test
          '

      # ------------ 3. 提交子模块变更 ------------
      - name: Commit and push submodule updates
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          # 检测子模块是否有变更
          if git diff-index --quiet HEAD --; then
            echo "No submodule changes detected"
          else
            git add .
            git commit -m "Update submodules to test branch [skip ci]"
            git push origin HEAD:test  # 推送至 test 分支
          fi
