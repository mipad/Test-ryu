name: Initialize and Update Submodules to Test Branch
on:
  workflow_dispatch:
  push:
    branches: [test]

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # ------------ 1. 安全代码检出 ------------
      - name: Checkout main repo with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          repository: mipad/Test-ryu  # 请确认这是您有权限的仓库
          ref: test
          submodules: recursive
          fetch-depth: 0
          clean: true
          # 新增关键配置
          sparse-checkout: |  # 限制检出范围
            **
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools  # 排除问题子模块
          persist-credentials: true

      # ------------ 2. 子模块安全更新 ------------
      - name: Update and switch submodules
        run: |
          # 先更新主仓库子模块配置
          git submodule sync --recursive
          
          # 深度清理残留子模块
          git submodule deinit -f src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools || true
          git rm --cached src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools || true
          rm -rf .git/modules/src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          
          # 遍历有效子模块
          git submodule foreach --recursive '
            echo "正在处理子模块: $name"
            
            # 配置安全认证
            git config --local credential.helper "store --file=/tmp/git-credentials"
            echo "https://oauth2:${{ secrets.GH_PAT }}@github.com" > /tmp/git-credentials
            
            # 分支处理逻辑
            if git ls-remote --exit-code origin test >/dev/null 2>&1; then
              git fetch origin test
              git checkout test || git checkout -b test origin/test
              git pull origin test
            else
              echo "警告: 子模块 $name 没有 test 分支"
              git checkout main  # 回退到默认分支
            fi
          '

      # ------------ 3. 安全提交变更 ------------
      - name: 提交更改
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 精确检测子模块变更
          SUBMODULE_CHANGES=$(git diff --submodule=log | wc -l)
          
          if [ "$SUBMODULE_CHANGES" -gt 0 ]; then
            echo "检测到子模块变更，正在提交..."
            git add .
            git commit -m "安全更新子模块到test分支 [skip ci] [security]"
            
            # 强制推送（处理可能的冲突）
            git push origin HEAD:test --force-with-lease
          else
            echo "没有检测到子模块变更"
          fi
