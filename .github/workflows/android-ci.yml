name: Android CI

on:
  workflow_call:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools/**'
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  NDK_VERSION: "25.1.8937393"
  CMAKE_VERSION: "3.22.1"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ================== [1] 智能代码检出 ==================
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: recursive
          fetch-depth: 1
          sparse-checkout: |
            # 基础文件
            *
            # 包含Android项目
            src/RyujinxAndroid/
            # 排除指定子目录
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools/
          sparse-checkout-cone-mode: false

      # ================== [2] 环境验证 ==================
      - name: Validate checkout structure
        run: |
          echo "===== 目录结构验证 ====="
          [ -d "src/RyujinxAndroid" ] || exit 1
          [ ! -d "src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools" ] || exit 1
          tree -L 3

      # ================== [3] Java环境配置 ==================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
          check-latest: true

      # ================== [4] Android SDK配置 ==================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "12.0"
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;${{ env.NDK_VERSION }}
            cmake;${{ env.CMAKE_VERSION }}
        timeout-minutes: 10

      # ================== [5] 缓存加速 ==================
      - name: CCache configuration
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ runner.os }}-${{ github.sha }}
          max-size: 1G

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            src/RyujinxAndroid/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties') }}

      # ================== [6] 原生库构建 ==================
      - name: Build Native Libraries
        working-directory: src/LibRyujinx
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
        run: |
          dotnet restore --verbosity minimal
          dotnet build -c Release \
            /p:RuntimeIdentifier=linux-bionic-arm64 \
            /p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
            /p:AndroidNdkDirectory=$ANDROID_NDK

      # ================== [7] Android APK构建 ==================
      - name: Build Android APK
        working-directory: src/RyujinxAndroid
        env:
          ORG_GRADLE_PROJECT_ndkPath: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.ndkVersion=${{ env.NDK_VERSION }} \
            -Pandroid.enableParallelJsonGen=true

      # ================== [8] 产物处理 ==================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-android
          path: src/RyujinxAndroid/app/build/outputs/apk/**/*.apk
          retention-days: 7

      - name: Create GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
          draft: false
