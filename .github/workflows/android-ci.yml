name: Android CI

on:
  workflow_call:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  NDK_VERSION: "25.2.9519653"
  CMAKE_VERSION: "3.22.1"
  DOTNET_VERSION: "9.0.101"
  JAVA_VERSION: "17"
  ANDROID_CMD_TOOLS_VERSION: "10406996"
  BUILD_TOOLS_VERSION: "34.0.0"
  PLATFORM_VERSION: "34"

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ================== [1] 代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          sparse-checkout-cone-mode: false
          clean: true

      # ================== [2] 环境清理 ==================
      - name: Deep clean
        run: |
          sudo rm -rf $ANDROID_SDK_ROOT/*
          rm -rf src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          git clean -fdx
          git submodule deinit -f --all

      # ================== [3] .NET环境配置 ==================
      - name: Setup .NET 9.0.101
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "${{ env.DOTNET_VERSION }}"
          cache: false

      # ================== [4] Android环境安装 ==================
      - name: Install Android CLI Tools
        run: |
          sudo mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          sudo chmod -R 777 $ANDROID_SDK_ROOT
          
          # 使用清华镜像下载命令行工具
          wget -q --tries=3 --retry-connrefused \
            https://mirrors.tuna.tsinghua.edu.cn/android/repository/commandlinetools-linux-${ANDROID_CMD_TOOLS_VERSION}_latest.zip \
            -O cmdline-tools.zip
          
          if ! unzip -ql cmdline-tools.zip | grep -q 'cmdline-tools/'; then
            echo "::error::下载文件损坏或格式不正确"
            exit 1
          fi
          
          unzip -q -o cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          
          if [ ! -d "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" ]; then
            echo "::error::解压目录结构异常："
            ls -lR $ANDROID_SDK_ROOT/cmdline-tools
            exit 1
          fi
          
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Install Android Components
        run: |
          # 配置清华镜像源
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest/repos
          cat << EOF > $ANDROID_SDK_ROOT/cmdline-tools/latest/repos.cfg
          repo.url=https://mirrors.tuna.tsinghua.edu.cn/git/git-repo
          EOF

          function install_with_retry {
            local cmd="$1"
            local max_attempts=3
            local delay=15
            
            for ((attempt=1; attempt<=max_attempts; attempt++)); do
              if $cmd; then
                return 0
              else
                echo "尝试 $attempt/$max_attempts 失败，${delay}秒后重试..."
                sleep $delay
              fi
            done
            echo "::error::安装失败：$cmd"
            return 1
          }

          # 配置清华 Android SDK 镜像
          echo "设置镜像源配置文件"
          mkdir -p ~/.android
          cat > ~/.android/repositories.cfg << EOF
          ### User Sources for Android SDK Manager
          count=0
          disabled=0
          enable=1
          name=TUNA
          url=https://mirrors.tuna.tsinghua.edu.cn/android/repository/
          EOF

          components=(
            "platforms;android-${{ env.PLATFORM_VERSION }}"
            "build-tools;${{ env.BUILD_TOOLS_VERSION }}"
            "ndk;${{ env.NDK_VERSION }}"
            "cmake;${{ env.CMAKE_VERSION }}"
          )
          
          for component in "${components[@]}"; do
            install_with_retry \
              "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install '$component' \
                --sdk_root=$ANDROID_SDK_ROOT \
                --verbose \
                --channel=0"  # 使用稳定渠道
          done

      # ================== [关键新增] 安装.NET Android工作负载 ==================
      - name: Install .NET Android Workload
        run: |
          # 使用国内 NuGet 镜像
          dotnet nuget add source https://mirrors.tuna.tsinghua.edu.cn/nuget/v3/index.json -n tuna
          
          dotnet workload install android \
            --skip-manifest-update \
            --source https://mirrors.tuna.tsinghua.edu.cn/nuget/v3/index.json \
            --source https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet9/nuget/v3/index.json
          
          if ! dotnet workload list | grep -q "android"; then
            echo "::error::Android工作负载安装失败"
            exit 1
          fi

      # ================== [5] Java环境配置 ==================
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "${{ env.JAVA_VERSION }}"
          check-latest: true

      # ...（后续步骤保持不变，以下为保持完整性保留原始结构）...

      # ================== [7] 构建配置 ==================
      - name: Prepare Build Environment
        working-directory: src/RyujinxAndroid
        run: |
          chmod +x gradlew
          echo "NDK_PATH=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "CMAKE_PATH=$ANDROID_SDK_ROOT/cmake/${{ env.CMAKE_VERSION }}/bin" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      # ================== [8] 原生库构建 ==================
      - name: Build Native Libraries
        working-directory: src/LibRyujinx
        env:
          ANDROID_NDK: "${{ env.NDK_PATH }}"
          ANDROID_SDK: "${{ env.ANDROID_SDK_ROOT }}"
        run: |
          dotnet build -c Release \
            -p:RuntimeIdentifier=linux-bionic-arm64 \
            -p:AndroidNdkDirectory=$ANDROID_NDK \
            -p:AndroidSdkDirectory=$ANDROID_SDK \
            -p:TargetFramework=net9.0-android${{ env.PLATFORM_VERSION }} \
            -p:AndroidSupportedAbis=arm64-v8a \
            -p:AndroidEnableProfiledAot=true

      # ================== [9] Android应用构建 ==================
      - name: Build Android APK
        working-directory: src/RyujinxAndroid
        env:
          ORG_GRADLE_PROJECT_ndkPath: "${{ env.NDK_PATH }}"
          ORG_GRADLE_PROJECT_cmakePath: "${{ env.CMAKE_PATH }}"
          KEY_ALIAS: "${{ secrets.KEY_ALIAS }}"
          STORE_PASSWORD: "${{ secrets.STORE_PASSWORD }}"
          KEY_PASSWORD: "${{ secrets.KEY_PASSWORD }}"
        run: |
          ./gradlew assembleRelease \
            --no-build-cache \
            --no-daemon \
            -Pandroid.ndkPath=$ORG_GRADLE_PROJECT_ndkPath \
            -Pandroid.cmakePath=$ORG_GRADLE_PROJECT_cmakePath \
            -Pandroid.buildToolsVersion="${{ env.BUILD_TOOLS_VERSION }}" \
            -Pandroid.enableJetifier=true

      # ================== [10] 产物处理 ==================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-android
          path: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Create Release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          files: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
