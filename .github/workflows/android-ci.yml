name: Android CI

on:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
  GRADLE_USER_HOME: ${{ github.workspace }}/src/RyujinxAndroid/.gradle
  NDK_VERSION: "25.2.9519653"
  CMAKE_VERSION: "3.22.1"
  BUILD_TOOLS_VERSION: "34.0.0"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ================== [1] 代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          sparse-checkout-cone-mode: false
          clean: true

      # ================== [2] 环境清理 ==================
      - name: Clean workspace
        run: |
          mkdir -p $ANDROID_SDK_ROOT
          rm -rf src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          git clean -fdx

      # ================== [3] .NET环境配置 ==================
      - name: Setup .NET 9.0.101
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.101"
          cache: false

      # ================== [4] JDK环境配置 ==================
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ================== [5] Android基础环境配置 ==================
      - name: Setup Android SDK
        uses: actions/setup-android@v3  # 使用官方维护的Action
        with:
          api-level: 34
          build-tools-version: ${{ env.BUILD_TOOLS_VERSION }}
          ndk-version: ${{ env.NDK_VERSION }}
          cmake-version: ${{ env.CMAKE_VERSION }}

      # ================== [6] 安装缺失组件 ==================
      - name: Install missing components
        run: |
          # 确保cmdline-tools安装路径正确
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platform-tools"
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "emulator"

      # ================== [7] 路径验证 ==================
      - name: Verify paths
        run: |
          echo "ANDROID_SDK_ROOT contents:"
          ls -la $ANDROID_SDK_ROOT
          echo "CMD line tools path:"
          ls -la $ANDROID_SDK_ROOT/cmdline-tools/latest/bin

      # ================== [8] 构建缓存配置 ==================
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GRADLE_USER_HOME }}
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('src/RyujinxAndroid/**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ================== [9] 构建执行 ==================
      - name: Build with Gradle
        working-directory: src/RyujinxAndroid
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Porg.gradle.parallel=true \
            -Porg.gradle.daemon=false \
            --no-build-cache

      # ================== [10] 产物上传 ==================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-apk
          path: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
          retention-days: 3
