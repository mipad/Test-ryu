name: Android CI (Linux Bionic ARM64)

on:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/src/RyujinxAndroid/.gradle
  NDK_VERSION: "25.2.9519653"
  CMAKE_VERSION: "3.22.1"
  BUILD_TOOLS_VERSION: "34.0.0"
  DOTNET_VERSION: "9.0.101"
  ANDROID_HOME: ${{ github.workspace }}/android-sdk

jobs:
  build:
    name: Build Android Library
    runs-on: ubuntu-latest

    steps:
      # ================== [1] 代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            src/Ryujinx.Common/**
            src/Ryujinx.HLE/**
            src/Ryujinx.Input/**
            src/ARMeilleure/**
            src/Ryujinx.Graphics.**
            src/Ryujinx.Audio.**
            src/Ryujinx.UI.**
            Directory.Packages.props
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          sparse-checkout-cone-mode: false
          clean: true

      # ================== [2] 环境初始化 ==================
      - name: Prepare workspace
        run: |
          # 设置NDK路径
          NDK_HOME="$ANDROID_HOME/ndk/$NDK_VERSION"
          echo "NDK_HOME=$NDK_HOME" >> $GITHUB_ENV
          
          # 创建必要目录
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          
          # 设置文件权限
          sudo chmod -R 777 ${{ env.ANDROID_HOME }}

          # 验证项目结构
          echo "=== 项目结构验证 ==="
          [ -d src/Ryujinx.Common ] || { echo "::error::Missing Ryujinx.Common"; exit 1; }
          [ -d src/Ryujinx.HLE ] || { echo "::error::Missing Ryujinx.HLE"; exit 1; }

      # ================== [3] .NET环境配置 ==================
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: false

      # ================== [4] Android SDK安装 (关键修复) ==================
      - name: Install Android Tools
        run: |
          cd "$ANDROID_HOME"

          # 下载命令行工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-*.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest
          rm commandlinetools-linux-*.zip

          # 设置执行权限 (新增关键步骤)
          chmod +x cmdline-tools/latest/bin/*

          # 显式导出环境变量 (关键修复)
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          echo "PATH=$PATH" >> $GITHUB_ENV

          # 验证SDK管理器
          echo "=== sdkmanager 路径验证 ==="
          which sdkmanager || { echo "::error::sdkmanager not found"; exit 1; }

          # 接受许可证 (增加重试机制)
          tries=0
          until yes | sdkmanager --licenses; do
            tries=$((tries+1))
            if [ $tries -gt 3 ]; then
              echo "::error::Failed to accept licenses after 3 attempts"
              exit 1
            fi
            sleep 5
          done

          # 安装必要组件
          sdkmanager --verbose \
            "platform-tools" \
            "build-tools;$BUILD_TOOLS_VERSION" \
            "ndk;$NDK_VERSION" \
            "cmake;$CMAKE_VERSION"

          # NDK 完整性检查
          echo "=== NDK 工具链验证 ==="
          [ -f "$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang++" ] || exit 1

      # ================== [5] 配置项目文件 ==================
      - name: Configure Project
        working-directory: src/LibRyujinx
        run: |
          sudo apt-get install -y xmlstarlet

          # 修正 RuntimeIdentifiers
          xmlstarlet ed -L \
            -u '/Project/PropertyGroup/RuntimeIdentifiers' \
            -v 'android-arm64;linux-bionic-arm64' \
            LibRyujinx.csproj

          # 动态添加链接参数
          for lib in "-llog" "-ldl" "-lz" "-lm" "-lc"; do
            xmlstarlet ed -L \
              -s '/Project/ItemGroup[contains(@Condition, "linux-bionic-arm64")]' \
              -t elem -n LinkerArg -v "$lib" \
              -i '/Project/ItemGroup/LinkerArg[last()]' -t attr -n Include -v "$lib" \
              LibRyujinx.csproj
          done

          # XML格式验证
          if ! xmlstarlet val LibRyujinx.csproj; then
            echo "::error::XML validation failed!"
            exit 1
          fi

      # ================== [6] 编译原生库 ==================
      - name: Build Native Library
        working-directory: src/LibRyujinx
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
        run: |
          # 强制还原依赖
          dotnet restore --force-evaluate

          # 详细编译日志
          dotnet publish -c Release \
            -r linux-bionic-arm64 \
            -p:AndroidNdkDirectory="$NDK_HOME" \
            -p:AndroidNativeLibraryName=libryujinx.so \
            -p:StripSymbols=true \
            --self-contained true \
            --verbosity detailed

          # 二进制文件验证
          echo "=== 生成的共享库信息 ==="
          find bin/Release/net9.0/linux-bionic-arm64/publish -name '*.so' -exec file {} \;

      # ================== [7] 集成到Android工程 ==================
      - name: Integrate into Android Project
        working-directory: src/RyujinxAndroid
        run: |
          # 清理旧文件
          rm -rf app/src/main/jniLibs/arm64-v8a/*
          
          # 复制新库文件
          mkdir -p app/src/main/jniLibs/arm64-v8a
          rsync -av --checksum ../LibRyujinx/bin/Release/net9.0/linux-bionic-arm64/publish/*.so app/src/main/jniLibs/arm64-v8a/
          
          # 验证复制结果
          echo "=== 已集成的原生库 ==="
          [ -f app/src/main/jniLibs/arm64-v8a/libryujinx.so ] || { echo "::error::libryujinx.so missing"; exit 1; }

      # ================== [8] 构建APK ==================
      - name: Build APK
        working-directory: src/RyujinxAndroid
        timeout-minutes: 30
        run: |
          # 清理构建缓存
          ./gradlew clean --no-daemon
          
          # 正式构建 (内存优化)
          ./gradlew assembleRelease \
            -Pandroid.ndkVersion=$NDK_VERSION \
            -Pandroid.sdkDirectory=$ANDROID_HOME \
            --stacktrace \
            --no-daemon \
            --max-workers 2 \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"

          # APK 验证
          apk_path=$(find app/build/outputs/apk -name '*-release.apk')
          [ -f "$apk_path" ] || { echo "::error::APK file not found"; exit 1; }

      # ================== [9] 上传产物 ==================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.run_number }}
          path: |
            src/RyujinxAndroid/app/build/outputs/apk/**/*.apk
            src/RyujinxAndroid/app/build/outputs/native-debug-symbols/**/*.so
          retention-days: 7

      # ================== [10] 清理工作区 ==================
      - name: Cleanup
        if: always()
        run: |
          # 释放磁盘空间
          sudo rm -rf ${{ env.ANDROID_HOME }}/ndk
          sudo rm -rf ~/.nuget/packages
          df -h
