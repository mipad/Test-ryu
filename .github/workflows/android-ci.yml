name: Android CI

on:
  workflow_call:
  push:
    branches: [ "test" ]
    paths:
      - 'src/LibRyujinx/**'
      - 'src/RyujinxAndroid/**'
      - 'Directory.Packages.props'
  pull_request:
    branches: [ "test" ]
    paths:
      - 'src/LibRyujinx/**'
      - 'src/RyujinxAndroid/**'
      - 'Directory.Packages.props'

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  NDK_VERSION: "25.1.8937393"
  CMAKE_VERSION: "3.22.1"
  DOTNET_VERSION: "9.0.101"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ------------ 1. 代码检出（修复子模块） ------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 递归初始化子模块
          fetch-depth: 0

      # ------------ 2. 环境设置 ------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ------------ 3. Android 环境配置 ------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;${{ env.NDK_VERSION }}
            cmake;${{ env.CMAKE_VERSION }}
          accept-android-sdk-licenses: true

      # ------------ 4. 自动接受许可证（新增步骤） ------------
      - name: Accept Android Licenses
        run: |
          yes | ${{ env.ANDROID_SDK_ROOT }}/cmdline-tools/latest/bin/sdkmanager --licenses

      # ------------ 5. 构建环境验证 ------------
      - name: Verify NDK Installation
        run: |
          echo "NDK路径: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}"
          ls -l ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++

      # ------------ 6. 缓存优化 ------------
      - name: CCache setup
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ runner.os }}
          maxsize: 500M

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # ------------ 7. 构建准备 ------------
      - name: Fix permissions
        working-directory: src/RyujinxAndroid
        run: |
          chmod +x gradlew
          sudo sysctl -w fs.inotify.max_user_watches=524288
          ulimit -n 65536

      # ------------ 8. 核心构建步骤（新增 .NET 构建） ------------
      - name: Build LibRyujinx (AOT)
        working-directory: src/LibRyujinx
        run: |
          dotnet restore
          dotnet build -c Release /p:RuntimeIdentifier=linux-bionic-arm64
          dotnet build -c Release /p:RuntimeIdentifier=ios-arm64

      # ------------ 9. Android 应用构建 ------------
      - name: Build with Gradle
        working-directory: src/RyujinxAndroid
        env:
          ORG_GRADLE_PROJECT_ndkPath: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          CCACHE_DIR: /tmp/ccache
        run: |
          ./gradlew assembleRelease \
            --stacktrace \
            --no-daemon \
            -Pandroid.ndkPath=$ORG_GRADLE_PROJECT_ndkPath \
            -Dorg.gradle.workers.max=2 \
            -Dorg.gradle.caching=true

      # ------------ 10. 产物处理 ------------
      - name: Upload APK
        if: ${{ inputs.uploadbuild || github.event_name != 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-android
          path: |
            src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Create Release
        if: ${{ inputs.shouldrelease }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.releasetag || github.ref_name }}
          prerelease: ${{ inputs.releasetype }}
          generate_release_notes: true
          files: |
            src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
