name: Android CI

on:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          fetch-depth: 1
          clean: true

      - name: Deep clean
        run: |
          git submodule deinit -f --all
          git clean -ffdx
          rm -rf .git/modules

      - name: Validate structure
        run: |
          [ -f "src/RyujinxAndroid/gradlew" ] || { echo "::error::Gradle wrapper missing"; exit 1; }
          [ ! -d "src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools" ] || { echo "::error::Adrenotools still exists"; exit 1; }

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: src/RyujinxAndroid
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
        run: |
          echo "$KEYSTORE_FILE" | base64 -d > keystore.jks
          ./gradlew assembleRelease \
            -PstoreFile=keystore.jks \
            -PstorePassword=${{ secrets.STORE_PASSWORD }} \
            -PkeyAlias=${{ secrets.KEY_ALIAS }} \
            -PkeyPassword=${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-apk
          path: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
