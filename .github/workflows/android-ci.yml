name: Android CI (Skip Submodule)

on:
  workflow_dispatch:
  push:
    branches: [ "test" ]

env:
  EXCLUDED_SUBMODULE: "src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ================== [1] 智能代码检出 ==================
      - name: Checkout with Submodule Filter
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          submodules: false  # 完全禁用自动初始化
          sparse-checkout: |
            /*
            !${{ env.EXCLUDED_SUBMODULE }}
          filter: 'tree:0'  # 启用部分克隆优化
          clean: true

      # ================== [2] 子模块安全白名单 ==================
      - name: Safe Submodule Initialization
        run: |
          # 生成有效子模块列表
          valid_submodules=$(
            git config --file .gitmodules --get-regexp path |
            awk '{print $2}' |
            grep -v "${{ env.EXCLUDED_SUBMODULE }}" |
            tr '\n' ' '
          )

          # 显示调试信息
          echo "有效子模块列表: ${valid_submodules}"
          
          # 初始化白名单子模块
          git submodule sync --recursive
          git submodule update --init --depth=1 --jobs $(nproc) $valid_submodules

          # 验证排除路径
          if [ -d "${{ env.EXCLUDED_SUBMODULE }}" ]; then
            echo "::error::排除路径仍然存在"
            exit 1
          fi

      # ================== [3] 构建环境配置 ==================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "12.0"
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;25.1.8937393
            cmake;3.22.1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ================== [4] 构建流程优化 ==================
      - name: Build Native Libraries
        working-directory: src/LibRyujinx
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.1.8937393
        run: |
          # 显式排除子模块路径
          find . -path "*${{ env.EXCLUDED_SUBMODULE }}*" -prune -o -name "*.cpp" -exec echo Building {} \;
          
          # 实际构建命令
          dotnet build -c Release /p:RuntimeIdentifier=linux-bionic-arm64

      - name: Build APK
        working-directory: src/RyujinxAndroid
        run: |
          # 使用Gradle属性排除模块
          ./gradlew assembleRelease \
            -PexcludeModules=${{ env.EXCLUDED_SUBMODULE }} \
            --no-daemon \
            --stacktrace

      # ================== [5] 产物处理 ==================
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            src/RyujinxAndroid/app/build/outputs/apk/**/*.apk
