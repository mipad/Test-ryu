name: Android CI (Full Pipeline)

on:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "test" ]

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/src/RyujinxAndroid/.gradle
  NDK_VERSION: "25.2.9519653"
  CMAKE_VERSION: "3.22.1"
  BUILD_TOOLS_VERSION: "34.0.0"
  DOTNET_VERSION: "9.0.101"
  JAVA_VERSION: "17"
  ANDROID_HOME: ${{ github.workspace }}/android-sdk

jobs:
  build:
    name: Build Full Android Package
    runs-on: ubuntu-latest

    steps:
      # ================== [1] 代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            src/Ryujinx.Common/**
            src/Ryujinx.HLE/**
            src/Ryujinx.Input/**
            src/ARMeilleure/**
            src/Ryujinx.Graphics.**
            src/LibRyujinx/**
            Directory.Packages.props
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          sparse-checkout-cone-mode: false
          clean: true

      # ================== [2] 环境初始化 ==================
      - name: Prepare workspace
        run: |
          # 设置关键路径
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> $GITHUB_ENV
          
          # 创建必要目录结构
          mkdir -p $ANDROID_HOME/cmdline-tools
          sudo chmod -R 777 $ANDROID_HOME
          
          # 初始化Android项目配置
          echo "sdk.dir=$ANDROID_HOME" >> src/RyujinxAndroid/local.properties

          # 验证项目结构
          [ -d src/Ryujinx.Common ] || { echo "::error::Missing Ryujinx.Common"; exit 1; }

      # ================== [3] 基础环境配置 ==================
      - name: Setup core environments
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: false

      # ================== [4] Android SDK安装 ==================
      - name: Install Android Components
        run: |
          # 安装命令行工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -P "$ANDROID_HOME"
          unzip -q "$ANDROID_HOME"/commandlinetools-linux-*.zip -d "$ANDROID_HOME/cmdline-tools"
          mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
          rm "$ANDROID_HOME"/commandlinetools-linux-*.zip
          chmod +x "$ANDROID_HOME/cmdline-tools/latest/bin/"*

          # 配置环境变量
          echo "PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

          # 安装核心组件
          for i in {1..3}; do
            echo "Attempt $i/3 installing components..."
            yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses && \
            "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
              "platform-tools" \
              "build-tools;$BUILD_TOOLS_VERSION" \
              "ndk;$NDK_VERSION" \
              "cmake;$CMAKE_VERSION" && break || sleep 15
          done

          # 验证安装
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --list_installed

      # ================== [5] NuGet配置 ==================
      - name: Configure NuGet
        run: |

          # 配置NuGet源
          dotnet nuget add source https://api.nuget.org/v3/index.json --name nuget

          # 创建包源映射配置
          echo '<?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="nuget" value="https://api.nuget.org/v3/index.json" />
              <add key="dotnet9" value="https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet9/nuget/v3/index.json" />
            </packageSources>
            <packageSourceMapping>
              <packageSource key="nuget">
                <package pattern="*" />
                <package pattern="Silk.NET.*" />
              </packageSource>
              <packageSource key="dotnet9">
                <package pattern="Microsoft.DotNet.*" />
              </packageSource>
            </packageSourceMapping>
          </configuration>' > nuget.config

      # ================== [6] 原生库构建 ==================
      - name: Build Native Library
        working-directory: src/LibRyujinx
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
        run: |
          # 安装XML处理工具
          sudo apt-get install -y xmlstarlet

          # 修改项目配置
          xmlstarlet ed -L \
            -d "//ItemGroup/LinkerArg[@Condition=\"'\$(RuntimeIdentifier)' == 'linux-bionic-arm64'\"]" \
            LibRyujinx.csproj

          for lib in "-llog" "-ldl" "-lz" "-lm" "-lc"; do
            xmlstarlet ed -L \
              -s '//ItemGroup[last()]' \
              -t elem -n LinkerArg \
              -i '$prev' -t attr -n Include -v "$lib" \
              -i '$prev' -t attr -n Condition -v "'\$(RuntimeIdentifier)' == 'linux-bionic-arm64'" \
              LibRyujinx.csproj
          done

          # 构建原生库
          dotnet restore --configfile ../../nuget.config \
            --source "https://api.nuget.org/v3/index.json" \
            --source "https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet9/nuget/v3/index.json"

          dotnet publish -c Release \
            -r linux-bionic-arm64 \
            -p:AndroidNdkDirectory="$NDK_HOME" \
            -p:AndroidNativeLibraryName=libryujinx.so \
            -p:StripSymbols=true \
            --self-contained \
            --verbosity detailed

      # ================== [7] APK构建 ==================
      - name: Build Android Package
        working-directory: src/RyujinxAndroid
        timeout-minutes: 30
        env:
          ORG_GRADLE_PROJECT_androidSdkDirectory: ${{ env.ANDROID_HOME }}
        run: |
          # 准备native库
          mkdir -p app/src/main/jniLibs/arm64-v8a
          rsync -av --checksum ../LibRyujinx/bin/Release/net9.0/linux-bionic-arm64/publish/*.so app/src/main/jniLibs/arm64-v8a/
          
          # 执行Gradle构建
          chmod +x gradlew
          ./gradlew clean assembleRelease \
            -Pandroid.ndkVersion="$NDK_VERSION" \
            --no-daemon \
            --max-workers 4 \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=2g" \
            --stacktrace

          # APK验证
          if ! ls app/build/outputs/apk/release/*.apk 1> /dev/null 2>&1; then
            echo "::error::APK file not generated"
            exit 1
          fi

      # ================== [8] 产物管理 ==================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.run_number }}
          path: |
            src/RyujinxAndroid/app/build/outputs/apk/**/*.apk
            src/RyujinxAndroid/app/build/outputs/native-debug-symbols/**/*.so
          retention-days: 7

      - name: Cache cleanup
        run: |
          sudo rm -rf "$ANDROID_HOME/ndk"
          sudo rm -rf ~/.nuget/packages
