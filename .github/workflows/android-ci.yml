name: Android CI

on:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "test" ]

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/src/RyujinxAndroid/.gradle
  NDK_VERSION: "25.2.9519653"  # 必须与安装版本完全一致
  CMAKE_VERSION: "3.22.1"
  BUILD_TOOLS_VERSION: "34.0.0"
  JAVA_VERSION: "17"
  DOTNET_VERSION: "9.0.101"
  ANDROID_HOME: ${{ github.workspace }}/android-sdk  # 直接定义环境变量
  NDK_HOME: ${{ github.workspace }}/android-sdk/ndk/${{ env.NDK_VERSION }}

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ================== [1] 代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          sparse-checkout-cone-mode: false
          clean: true

      # ================== [2] 环境初始化 ==================
      - name: Prepare workspace
        run: |
          # 创建SDK和NDK目录
          mkdir -p $ANDROID_HOME/cmdline-tools
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "NDK_HOME=$NDK_HOME" >> $GITHUB_ENV

      # ================== [3] .NET环境配置 ==================
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: false

      # ================== [4] Android SDK安装 ==================
      - name: Install Android Tools
        run: |
          cd $ANDROID_HOME

          # 安装命令行工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-*.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest
          rm commandlinetools-linux-*.zip

          # 配置PATH
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

          # 安装组件（显式指定NDK版本）
          yes | sdkmanager --licenses
          sdkmanager --install \
            "platform-tools" \
            "build-tools;${{ env.BUILD_TOOLS_VERSION }}" \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"

          # 验证NDK安装
          ls -l $NDK_HOME

      # ================== [5] 修复NativeAOT参数 ==================
      - name: Patch NativeAOT Settings
        working-directory: src/LibRyujinx
        run: |
          # 使用XML工具直接修改项目文件
          sudo apt-get install -y xmlstarlet

          # 修正RuntimeIdentifier
          xmlstarlet ed -L \
            -u '/Project/PropertyGroup/RuntimeIdentifier' \
            -v 'android-arm64' \
            LibRyujinx.csproj

          # 添加AOT参数
          xmlstarlet ed -L \
            -s '/Project/PropertyGroup[1]' \
            -t elem -n IlcGenerateMapFile -v 'true' \
            -s '/Project/PropertyGroup[1]' \
            -t elem -n IlcDisableUnhandledExceptionExperience -v 'true' \
            -s '/Project/PropertyGroup[1]' \
            -t elem -n IlcGenerateCompleteTypeMetadata -v 'false' \
            -s '/Project/PropertyGroup[1]' \
            -t elem -n IlcDisableReflection -v 'true' \
            -s '/Project/PropertyGroup[1]' \
            -t elem -n AndroidStripSymbols -v 'false' \
            LibRyujinx.csproj

          # 验证XML格式
          xmlstarlet val LibRyujinx.csproj || exit 1

      # ================== [6] 构建执行 ==================
      - name: Build Android Project
        working-directory: src/RyujinxAndroid
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
          TERM: xterm-color
        run: |
          # 修复权限并清理
          chmod +x gradlew
          ./gradlew clean

          # 带参数构建（关键修改：通过环境变量传递路径）
          ./gradlew assembleRelease \
            -Pandroid.ndkVersion=$NDK_VERSION \
            -Pandroid.sdkDirectory=$ANDROID_HOME \
            -Porg.gradle.java.home=$JAVA_HOME \
            --stacktrace \
            --info

      # ================== [7] 产物上传 ==================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.run_number }}
          path: |
            src/RyujinxAndroid/app/build/outputs/apk/**/*.apk
            src/RyujinxAndroid/app/build/outputs/native-debug-symbols/**/*.so
          retention-days: 7
