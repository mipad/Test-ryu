name: Android CI

on:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  GRADLE_USER_HOME: ${{ github.workspace }}/src/RyujinxAndroid/.gradle
  NDK_VERSION: "25.2.9519653"
  CMAKE_VERSION: "3.22.1"
  BUILD_TOOLS_VERSION: "34.0.0"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ================== [1] 代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          sparse-checkout-cone-mode: false
          clean: true

      # ================== [2] 环境清理 ==================
      - name: Deep clean
        run: |
          sudo rm -rf $ANDROID_SDK_ROOT/*
          rm -rf src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          git clean -fdx
          git submodule deinit -f --all

      # ================== [3] .NET环境配置 ==================
      - name: Setup .NET 9.0.101
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.101"
          cache: false

      # ================== [4] JDK环境配置 ==================
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ================== [5] Android环境配置 ==================
      - name: Setup Android SDK
        uses: actions/setup-android@v1  # 使用官方推荐Action
        with:
          licenses: |
            android-sdk-license
            android-sdk-preview-license

      # ================== [6] 安装Android命令行工具 ==================
      - name: Install Command-line Tools
        run: |
          # 安装cmdline-tools
          yes | $ANDROID_SDK_ROOT/cmdline-tools/bin/sdkmanager --install "cmdline-tools;latest"
          # 设置环境变量
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH" >> $GITHUB_ENV

      # ================== [7] 安装Android工具 ==================
      - name: Install Android Tools
        run: |
          yes | sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
          yes | sdkmanager --install "cmake;${{ env.CMAKE_VERSION }}"
          yes | sdkmanager --install "build-tools;${{ env.BUILD_TOOLS_VERSION }}"
          yes | sdkmanager --install "platform-tools"

      # ================== [8] 构建缓存配置 ==================
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GRADLE_USER_HOME }}
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('src/RyujinxAndroid/**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ================== [9] 构建执行 ==================
      - name: Build with Gradle
        working-directory: src/RyujinxAndroid
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Porg.gradle.parallel=true \
            -Porg.gradle.daemon=false \
            --no-build-cache

      # ================== [10] 产物上传 ==================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-apk
          path: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
          retention-days: 3
