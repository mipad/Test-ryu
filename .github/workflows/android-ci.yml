name: Android CI

on:
  workflow_call:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  NDK_VERSION: "25.2.9519653"
  CMAKE_VERSION: "3.22.1"
  DOTNET_VERSION: "9.0.101"
  JAVA_VERSION: "17"
  ANDROID_CMD_TOOLS_VERSION: "10406996"
  BUILD_TOOLS_VERSION: "34.0.0"
  PLATFORM_VERSION: "34"

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ================== [1] 代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: recursive
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          clean: true

      # ================== [2] 环境清理 ==================
      - name: Deep clean
        run: |
          rm -rf $ANDROID_SDK_ROOT/*
          git clean -fdx -e local.properties

      # ================== [3] 网络加速配置 ==================
      - name: Configure network accelerator
        run: |
          # 设置全局代理（根据实际情况调整）
          echo "http_proxy=http://proxy.example.com:8080" >> $GITHUB_ENV
          echo "https_proxy=http://proxy.example.com:8080" >> $GITHUB_ENV

      # ================== [4] Android CLI 工具安装 ==================
      - name: Install Android CLI Tools
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          
          # 多级下载源配置
          declare -A mirrors=(
            ["azure"]="https://ghproxy.com/https://github.com/mirrors/android-commandlinetools/releases/download/v$ANDROID_CMD_TOOLS_VERSION/commandlinetools-linux-${ANDROID_CMD_TOOLS_VERSION}_latest.zip"
            ["fastgit"]="https://hub.fgit.cf/mirrors/android-commandlinetools/raw/v$ANDROID_CMD_TOOLS_VERSION/commandlinetools-linux-${ANDROID_CMD_TOOLS_VERSION}_latest.zip"
            ["official"]="https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_CMD_TOOLS_VERSION}_latest.zip"
          )

          for key in "${!mirrors[@]}"; do
            echo "⇩ 尝试从 $key 源下载..."
            if wget -q --tries=3 --timeout=30 --retry-connrefused "${mirrors[$key]}" -O cmdline-tools.zip; then
              if [ $(stat -c%s cmdline-tools.zip) -gt 100000000 ] && unzip -tq cmdline-tools.zip; then
                echo "✓ $key 源下载成功"
                break
              else
                echo "⚠ $key 源文件校验失败"
                rm -f cmdline-tools.zip
              fi
            fi
          done

          if [ ! -f cmdline-tools.zip ]; then
            echo "❌ 所有下载源均不可用"
            exit 1
          fi

          unzip -q -o cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          find $ANDROID_SDK_ROOT/cmdline-tools -name cmdline-tools -type d -exec mv {} $ANDROID_SDK_ROOT/cmdline-tools/latest \;
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

      # ================== [5] Android组件安装 ==================
      - name: Install Android Components
        run: |
          # 混合镜像配置
          cat > ~/.android/repositories.cfg << EOF
          disabled=0
          enable=1
          name=Custom
          url=https://mirror.example.com/android/repository/
          EOF

          components=(
            "platforms;android-$PLATFORM_VERSION"
            "build-tools;$BUILD_TOOLS_VERSION"
            "ndk;$NDK_VERSION"
            "cmake;$CMAKE_VERSION"
          )

          for component in "${components[@]}"; do
            retry_count=0
            until [ $retry_count -ge 3 ]; do
              if $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
                --install "$component" \
                --sdk_root=$ANDROID_SDK_ROOT \
                --verbose \
                --no_https \
                --proxy=http \
                --proxy_host=mirror.example.com \
                --proxy_port=80; then
                break
              fi
              sleep $((++retry_count * 10))
              echo "⚠ 安装重试 ($retry_count/3)"
            done
          done

      # ================== [6] .NET 工作负载配置 ==================
      - name: Install .NET Workload
        run: |
          # 多源配置
          dotnet nuget add source https://nuget.cdn.example.com/v3/index.json -n mirror
          dotnet nuget add source https://api.nuget.org/v3/index.json -n official
          
          dotnet workload install android \
            --skip-manifest-update \
            --source https://nuget.cdn.example.com/v3/index.json \
            --source https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet9/nuget/v3/index.json \
            --verbosity detailed

          if ! dotnet workload list | grep -q "android"; then
            echo "❌ 工作负载安装失败，详细日志："
            cat $(find /tmp -name 'dotnet-workload*.log')
            exit 1
          fi

      # ================== [7] 构建阶段 ==================
      - name: Build Project
        uses: ./src/build-action
        with:
          ndk_path: ${{ env.NDK_PATH }}
          cmake_path: ${{ env.CMAKE_PATH }}
          build_tools_version: ${{ env.BUILD_TOOLS_VERSION }}

      # ================== [8] 产物处理 ==================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            src/RyujinxAndroid/app/build/outputs/apk/**/*.apk
            src/RyujinxAndroid/app/build/outputs/bundle/**/*.aab
          retention-days: 7
