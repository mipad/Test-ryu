name: Android CI

on:
  workflow_call:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  NDK_VERSION: "25.1.8937393"
  CMAKE_VERSION: "3.22.1"
  DOTNET_VERSION: "9.0.101"
  JAVA_VERSION: "17"
  ANDROID_CMD_TOOLS_VERSION: "9477386"
  BUILD_TOOLS_VERSION: "34.0.0"
  PLATFORM_VERSION: "34"

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ================== [1] 代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          sparse-checkout-cone-mode: false
          clean: true

      # ================== [2] 环境清理 ==================
      - name: Deep clean
        run: |
          rm -rf src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          git clean -fdx -e .gradle/ -e .nuget/
          git submodule deinit -f --all

      # ================== [3] .NET环境配置 ==================
      - name: Setup .NET 9.0.101
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "${{ env.DOTNET_VERSION }}"
          cache: false  # 禁用自动缓存检查

      # ================== [4] Android环境安装 ==================
      - name: Install Android CLI Tools
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_CMD_TOOLS_VERSION}_latest.zip
          unzip -q commandlinetools-linux-*.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Install Android Components
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-${{ env.PLATFORM_VERSION }}" \
            "build-tools;${{ env.BUILD_TOOLS_VERSION }}" \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}" \
            --sdk_root=$ANDROID_SDK_ROOT

      # ================== [5] Java环境配置 ==================
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "${{ env.JAVA_VERSION }}"
          cache: "gradle"

      # ================== [6] 缓存配置 ==================
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/platforms
            ${{ env.ANDROID_SDK_ROOT }}/ndk
            ${{ env.ANDROID_SDK_ROOT }}/build-tools
          key: android-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties') }}

      - name: Generate NuGet Lock File
        working-directory: src/LibRyujinx
        run: dotnet restore --use-lock-file --lock-file-path packages.lock.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            src/LibRyujinx/packages.lock.json
          key: nuget-${{ runner.os }}-${{ hashFiles('src/LibRyujinx/packages.lock.json') }}

      # ================== [7] 构建配置 ==================
      - name: Prepare Build Environment
        working-directory: src/RyujinxAndroid
        run: |
          chmod +x gradlew
          echo "NDK_PATH=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "CMAKE_PATH=$ANDROID_SDK_ROOT/cmake/${{ env.CMAKE_VERSION }}/bin" >> $GITHUB_ENV

      # ================== [8] 原生库构建 ==================
      - name: Build Native Libraries
        working-directory: src/LibRyujinx
        env:
          ANDROID_NDK: "${{ env.NDK_PATH }}"
          ANDROID_SDK: "${{ env.ANDROID_SDK_ROOT }}"
        run: |
          dotnet restore --configfile nuget.config
          dotnet build -c Release \
            -p:RuntimeIdentifier=linux-bionic-arm64 \
            -p:AndroidNdkDirectory=$ANDROID_NDK \
            -p:AndroidSdkDirectory=$ANDROID_SDK \
            -p:TargetFramework=net9.0-android${{ env.PLATFORM_VERSION }}

      # ================== [9] Android应用构建 ==================
      - name: Build Android APK
        working-directory: src/RyujinxAndroid
        env:
          ORG_GRADLE_PROJECT_ndkPath: "${{ env.NDK_PATH }}"
          ORG_GRADLE_PROJECT_cmakePath: "${{ env.CMAKE_PATH }}"
          KEY_ALIAS: "${{ secrets.KEY_ALIAS }}"
          STORE_PASSWORD: "${{ secrets.STORE_PASSWORD }}"
          KEY_PASSWORD: "${{ secrets.KEY_PASSWORD }}"
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --no-daemon \
            -Pandroid.ndkPath=$ORG_GRADLE_PROJECT_ndkPath \
            -Pandroid.cmakePath=$ORG_GRADLE_PROJECT_cmakePath \
            -Pandroid.buildToolsVersion="${{ env.BUILD_TOOLS_VERSION }}"

      # ================== [10] 产物处理 ==================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-android
          path: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Create Release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          files: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
