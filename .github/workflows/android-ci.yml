name: Android CI

on:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Make gradlew Executable
        working-directory: src/RyujinxAndroid
        run: chmod +x gradlew

      - name: Install .NET 9.0 SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "9.0.100"

      - name: Install Android Tools
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_SDK_ROOT <<< "y"
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;25.1.8937393" --sdk_root=$ANDROID_SDK_ROOT

      - name: Verify NDK Path
        run: |
          echo "LLVM工具链路径: ${{ env.ORG_RYUJINX_LLVM_TOOLCHAIN_PATH }}"
          ls -la ${{ env.ORG_RYUJINX_LLVM_TOOLCHAIN_PATH }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      - name: Clean Project
        working-directory: src/RyujinxAndroid
        run: |
          ./gradlew clean
          dotnet clean

      - name: Build Release APK
        working-directory: src/RyujinxAndroid
        run: ./gradlew assembleRelease --stacktrace --info
        env:
          ORG_RYUJINX_LLVM_TOOLCHAIN_PATH: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.1.8937393/toolchains/llvm/prebuilt/linux-x86_64/bin

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: src/RyujinxAndroid/app/build/outputs/apk/release/app-release.apk
