name: Android Build Workflow

on:
  workflow_dispatch:
  push:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  CMAKE_VERSION: "3.31.6"
  NDK_VERSION: "25.1.8937393"

jobs:
  android-build:
    runs-on: ubuntu-latest
    
    # ================== [1] 权限声明 ==================
    permissions:
      contents: write    # 需要写入内容（发布release）
      packages: write    # 需要上传制品
      actions: write     # 需要创建工作流产物
      id-token: write    # 需要OIDC令牌（如果使用云服务认证）

    steps:
      # ================== [2] 代码检出（含令牌配置） ==================
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}  # 必须使用具有repo权限的PAT
          submodules: recursive
          fetch-depth: 0
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools

      # ================== [3] Java环境配置 ==================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'
          server-id: github  # Maven服务器配置
          server-username: ${{ github.actor }}
          server-password: ${{ secrets.GITHUB_TOKEN }}

      # ================== [4] 密钥库处理（需要secrets读取权限） ==================
      - name: Decode Keystore
        env:
          KEYSTORE_ENCODED: ${{ secrets.KEYSTORE }}
        run: |
          echo "$KEYSTORE_ENCODED" | base64 -d > app/ks.jks
          chmod 600 app/ks.jks

      # ================== [5] Android SDK配置 ==================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;${{ env.NDK_VERSION }}

      # ================== [6] 构建步骤 ==================
      - name: Build APK
        env:
          ORG_GRADLE_PROJECT_ndkPath: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
        run: ./gradlew assembleRelease

      # ================== [7] 产物上传（需要contents:write） ==================
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: app/build/outputs/apk/**/*.apk

      # ================== [8] 创建Release（需要contents:write） ==================
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: app/build/outputs/apk/release/*.apk
