name: Android CI (Linux Bionic ARM64)

on:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/src/RyujinxAndroid/.gradle
  NDK_VERSION: "25.2.9519653"
  CMAKE_VERSION: "3.22.1"
  BUILD_TOOLS_VERSION: "34.0.0"
  DOTNET_VERSION: "9.0.101"
  ANDROID_HOME: ${{ github.workspace }}/android-sdk

jobs:
  build:
    name: Build Android Library
    runs-on: ubuntu-latest

    steps:
      # ================== [1] 代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            Directory.Packages.props  # 关键修复：包含版本控制文件
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          sparse-checkout-cone-mode: false
          clean: true

      # ================== [2] 配置验证 ==================
      - name: Validate Environment
        run: |
          # 检查关键配置文件
          if [ ! -f "Directory.Packages.props" ]; then
            echo "::error::Missing Directory.Packages.props!"
            exit 1
          fi
          
          # 验证 .NET 版本
          dotnet --version
          echo "NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION"

      # ================== [3] 环境初始化 ==================
      - name: Prepare workspace
        run: |
          NDK_HOME="$ANDROID_HOME/ndk/$NDK_VERSION"
          echo "NDK_HOME=$NDK_HOME" >> $GITHUB_ENV
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          
          # 设置文件权限
          sudo chmod -R 777 ${{ env.ANDROID_HOME }}

      # ================== [4] .NET环境配置 ==================
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: false

      # ================== [5] Android SDK安装 ==================
      - name: Install Android Tools
        run: |
          cd "$ANDROID_HOME"

          # 下载命令行工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-*.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest
          rm commandlinetools-linux-*.zip

          # 配置环境变量
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          
          # 安装必要组件
          yes | sdkmanager --licenses
          sdkmanager --verbose \
            "platform-tools" \
            "build-tools;$BUILD_TOOLS_VERSION" \
            "ndk;$NDK_VERSION" \
            "cmake;$CMAKE_VERSION"

          # NDK 完整性检查
          [ -f "$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang++" ] || exit 1

      # ================== [6] 配置项目文件 ==================
      - name: Configure Project
        working-directory: src/LibRyujinx
        run: |
          sudo apt-get install -y xmlstarlet

          # 修正 RuntimeIdentifiers (复数形式)
          xmlstarlet ed -L \
            -u '/Project/PropertyGroup/RuntimeIdentifiers' \
            -v 'android-arm64;linux-bionic-arm64' \
            LibRyujinx.csproj

          # 动态添加链接参数
          for lib in "-llog" "-ldl" "-lz" "-lm" "-lc"; do
            xmlstarlet ed -L \
              -s '/Project/ItemGroup[contains(@Condition, "linux-bionic-arm64")]' \
              -t elem -n LinkerArg -v "$lib" \
              -i '/Project/ItemGroup/LinkerArg[last()]' -t attr -n Include -v "$lib" \
              LibRyujinx.csproj
          done

          # 强制 XML 验证
          if ! xmlstarlet val LibRyujinx.csproj; then
            echo "::error::XML validation failed!"
            exit 1
          fi

      # ================== [7] 编译原生库 ==================
      - name: Build Native Library
        working-directory: src/LibRyujinx
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
        run: |
          # 还原 NuGet 包
          dotnet restore --force-evaluate

          # AOT 编译
          dotnet publish -c Release \
            -r linux-bionic-arm64 \
            -p:AndroidNdkDirectory="$NDK_HOME" \
            -p:AndroidNativeLibraryName=libryujinx.so \
            -p:StripSymbols=true \
            --self-contained true \
            --verbosity detailed

          # 验证产出
          find bin/Release/net9.0/linux-bionic-arm64/publish -name '*.so' | xargs -I {} file {}

      # ================== [8] 集成到Android工程 ==================
      - name: Integrate into Android Project
        working-directory: src/RyujinxAndroid
        run: |
          # 清理旧文件
          rm -rf app/src/main/jniLibs/arm64-v8a/*
          
          # 复制新库文件
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp -v ../LibRyujinx/bin/Release/net9.0/linux-bionic-arm64/publish/*.so app/src/main/jniLibs/arm64-v8a/
          
          # 验证复制结果
          ls -lh app/src/main/jniLibs/arm64-v8a

      # ================== [9] 构建APK ==================
      - name: Build APK
        working-directory: src/RyujinxAndroid
        timeout-minutes: 25
        run: |
          # 清理 Gradle 缓存
          ./gradlew clean --no-daemon
          
          # 正式构建
          ./gradlew assembleRelease \
            -Pandroid.ndkVersion=$NDK_VERSION \
            -Pandroid.sdkDirectory=$ANDROID_HOME \
            --stacktrace \
            --no-daemon \
            --max-workers 2

          # APK 验证
          apk_path=$(find app/build/outputs/apk -name '*.apk' | head -1)
          if [ ! -f "$apk_path" ]; then
            echo "::error::APK file not found!"
            exit 1
          fi
          du -h $apk_path

      # ================== [10] 上传产物 ==================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.run_number }}
          path: |
            src/RyujinxAndroid/app/build/outputs/apk/**/*.apk
            src/RyujinxAndroid/app/build/outputs/native-debug-symbols/**/*.so
          retention-days: 7

      # ================== [11] 清理工作区 ==================
      - name: Cleanup
        if: always()
        run: |
          sudo rm -rf ${{ env.ANDROID_HOME }}/ndk
          sudo rm -rf ~/.nuget/packages
