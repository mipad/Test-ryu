name: Android CI (Full Pipeline)

on:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "test" ]

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/src/RyujinxAndroid/.gradle
  NDK_VERSION: "25.2.9519653"
  CMAKE_VERSION: "3.22.1"
  BUILD_TOOLS_VERSION: "34.0.0"
  DOTNET_VERSION: "9.0.101"
  JAVA_VERSION: "17"
  ANDROID_HOME: ${{ github.workspace }}/android-sdk

jobs:
  build:
    name: Build Full Android Package
    runs-on: ubuntu-latest

    steps:
      # ================== [1] 代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            src/Ryujinx.Common/**
            src/Ryujinx.HLE/**
            src/Ryujinx.Input/**
            src/ARMeilleure/**
            src/Ryujinx.Graphics.**
            src/LibRyujinx/**
            Directory.Packages.props
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          sparse-checkout-cone-mode: false
          clean: true

      # ================== [2] 环境初始化 ==================
      - name: Prepare workspace
        run: |
          # 设置关键路径
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> $GITHUB_ENV
          
          # 创建必要目录结构
          mkdir -p $ANDROID_HOME/cmdline-tools
          sudo chmod -R 777 $ANDROID_HOME
          
          # 初始化Android项目配置
          echo "sdk.dir=$ANDROID_HOME" >> src/RyujinxAndroid/local.properties

          # 验证项目结构
          [ -d src/Ryujinx.Common ] || { echo "::error::Missing Ryujinx.Common"; exit 1; }
          [ -f Directory.Packages.props ] || { echo "::error::Missing Directory.Packages.props"; exit 1; }

      # ================== [3] 基础环境配置 ==================
      - name: Setup core environments
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: false

      # ================== [4] Android SDK安装 ==================
      - name: Install Android Components
        run: |
          # 安装命令行工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -P $ANDROID_HOME
          unzip -q $ANDROID_HOME/commandlinetools-linux-*.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          rm $ANDROID_HOME/commandlinetools-linux-*.zip
          chmod +x $ANDROID_HOME/cmdline-tools/latest/bin/*

          # 配置环境变量
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

          # 安装核心组件（带重试机制）
          for i in {1..3}; do
            if yes | sdkmanager --licenses && \
               sdkmanager "platform-tools" "build-tools;$BUILD_TOOLS_VERSION" \
               "ndk;$NDK_VERSION" "cmake;$CMAKE_VERSION"; then
              break
            else
              echo "::warning::Installation failed, retrying ($i/3)..."
              sleep 10
            fi
          done

          # 验证NDK安装
          [ -f "$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang++" ] || exit 1

      # ================== [5] NuGet配置 ==================
      - name: Configure NuGet
        run: |
          dotnet nuget remove source dotnet9 || true
          dotnet nuget remove source nuget || true
          
          dotnet nuget add source https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet9/nuget/v3/index.json --name dotnet9
          dotnet nuget add source https://api.nuget.org/v3/index.json --name nuget
          
          echo '<?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="nuget" value="https://api.nuget.org/v3/index.json" />
              <add key="dotnet9" value="https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet9/nuget/v3/index.json" />
            </packageSources>
            <packageSourceMapping>
              <packageSource key="nuget">
                <package pattern="*" />
              </packageSource>
              <packageSource key="dotnet9">
                <package pattern="Microsoft.DotNet.*" />
                <package pattern="Silk.NET.*" />
              </packageSource>
            </packageSourceMapping>
          </configuration>' > nuget.config

      # ================== [6] 原生库构建 ==================
      - name: Build Native Library
        working-directory: src/LibRyujinx
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
        run: |
          # XML配置修正
          sudo apt-get install -y xmlstarlet
          xmlstarlet ed -L \
            -d '//ItemGroup/LinkerArg[@Condition="'\''$(RuntimeIdentifier)'\''=='\''linux-bionic-arm64'\''"]' \
            LibRyujinx.csproj

          for lib in "-llog" "-ldl" "-lz" "-lm" "-lc"; do
            xmlstarlet ed -L \
              --var condition "'\$(RuntimeIdentifier)'=='linux-bionic-arm64'" \
              -s '//ItemGroup[last()]' \
              -t elem -n LinkerArg \
              -i '$prev' -t attr -n Include -v "$lib" \
              -i '$prev' -t attr -n Condition -v "\$condition" \
              LibRyujinx.csproj
          done

          # 依赖还原与构建
          dotnet restore --configfile ../nuget.config
          dotnet publish -c Release \
            -r linux-bionic-arm64 \
            -p:AndroidNdkDirectory=$NDK_HOME \
            -p:AndroidNativeLibraryName=libryujinx.so \
            -p:StripSymbols=true \
            --self-contained

          # 验证产出
          find bin/Release/net9.0/linux-bionic-arm64/publish -name '*.so' -exec file {} \;

      # ================== [7] APK构建 ==================
      - name: Build Android Package
        working-directory: src/RyujinxAndroid
        timeout-minutes: 30
        env:
          ORG_GRADLE_PROJECT_androidSdkDirectory: ${{ env.ANDROID_HOME }}
        run: |
          # 集成原生库
          mkdir -p app/src/main/jniLibs/arm64-v8a
          rsync -av --checksum ../LibRyujinx/bin/Release/net9.0/linux-bionic-arm64/publish/*.so app/src/main/jniLibs/arm64-v8a/
          
          # 构建APK
          chmod +x gradlew
          ./gradlew clean assembleRelease \
            -Pandroid.ndkVersion=$NDK_VERSION \
            --no-daemon \
            --max-workers 4 \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=2g"

          # 验证APK
          [ -f app/build/outputs/apk/release/*.apk ] || { echo "::error::APK not found"; exit 1; }

      # ================== [8] 产物管理 ==================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.run_number }}
          path: |
            src/RyujinxAndroid/app/build/outputs/apk/**/*.apk
            src/RyujinxAndroid/app/build/outputs/native-debug-symbols/**/*.so
          retention-days: 7

      - name: Cache cleanup
        run: |
          sudo rm -rf $ANDROID_HOME/ndk
          sudo rm -rf ~/.nuget/packages
