name: Android CI

on:
  workflow_call:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  NDK_VERSION: "25.1.8937393"
  CMAKE_VERSION: "3.22.1"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ================== [1] 代码检出优化 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          sparse-checkout-cone-mode: false

      # ================== [2] Java环境配置优化 ==================
      - name: Setup Java (Optimized)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: "gradle"
          check-latest: true  # 确保获取最新补丁版本

      # ================== [3] Android SDK配置增强 ==================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"  # 自动获取最新稳定版
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;${{ env.NDK_VERSION }}
            cmake;${{ env.CMAKE_VERSION }}

      # ================== [4] 构建缓存优化 ==================
      - name: Cache optimization
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
            src/RyujinxAndroid/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ================== [5] 构建环境验证 ==================
      - name: Verify Environment
        run: |
          # Java验证
          java -version
          javac -version

          # Android SDK验证
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --list_installed
          ls -l $ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}

      # ================== [6] 原生库构建 ==================
      - name: Build Native Libraries
        working-directory: src/LibRyujinx
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
        run: |
          dotnet restore --verbosity minimal
          dotnet build -c Release /p:RuntimeIdentifier=linux-bionic-arm64 \
            /p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
            /p:AndroidNdkDirectory=$ANDROID_NDK

      # ================== [7] Android构建强化 ==================
      - name: Build APK
        working-directory: src/RyujinxAndroid
        env:
          ORG_GRADLE_PROJECT_ndkPath: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          CCACHE_DIR: /tmp/ccache
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --no-daemon \
            --stacktrace \
            -Pandroid.ndkPath=$ORG_GRADLE_PROJECT_ndkPath

      # ================== [8] 产物处理 ==================
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-android
          path: src/RyujinxAndroid/app/build/outputs/apk/**/*.apk
          retention-days: 7

      - name: Create Release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
          draft: false
