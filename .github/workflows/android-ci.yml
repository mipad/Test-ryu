name: Android CI

on:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "test" ]

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/src/RyujinxAndroid/.gradle
  NDK_VERSION: "25.2.9519653"  # 显式指定 NDK 版本
  CMAKE_VERSION: "3.22.1"
  BUILD_TOOLS_VERSION: "34.0.0"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ================== [1] 代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          sparse-checkout-cone-mode: false
          clean: true

      # ================== [2] 环境初始化 ==================
      - name: Prepare workspace
        run: |
          # 设置 ANDROID_HOME 和 NDK_ROOT 环境变量
          echo "ANDROID_HOME=${{ github.workspace }}/android-sdk" >> $GITHUB_ENV
          echo "NDK_ROOT=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV  # 新增 NDK_ROOT
          mkdir -p $ANDROID_HOME/cmdline-tools
          echo "sdk.dir=$ANDROID_HOME" >> src/RyujinxAndroid/local.properties

      # ================== [3] .NET环境配置 ==================
      - name: Setup .NET 9.0.101
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.101"
          cache: false

      # ================== [4] JDK环境配置 ==================
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ================== [5] Android SDK基础安装 ==================
      - name: Install Android Command-line Tools
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-*.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          rm commandlinetools-linux-*.zip
          echo "Command-line tools installed at:"
          ls -la $ANDROID_HOME/cmdline-tools/latest
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

      # ================== [6] 安装Android组件 ==================
      - name: Install Android Components
        run: |
          yes | sdkmanager --licenses
          yes | sdkmanager "platform-tools" "build-tools;${{ env.BUILD_TOOLS_VERSION }}"
          yes | sdkmanager "ndk;${{ env.NDK_VERSION }}"  # 安装指定版本的 NDK
          yes | sdkmanager "cmake;${{ env.CMAKE_VERSION }}"

      # ================== [7] 构建缓存配置 ==================
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GRADLE_USER_HOME }}
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('src/RyujinxAndroid/**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ================== [8] 构建执行 ==================
      - name: Build with Gradle
        working-directory: src/RyujinxAndroid
        run: |
          sed -i '/sdk.dir/d' local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Porg.gradle.parallel=true \
            -Porg.gradle.daemon=false \
            --no-build-cache

      # ================== [9] 产物上传 ==================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-apk
          path: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
          retention-days: 3
