name: Android Secure CI

on:
  workflow_dispatch:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools/**'
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  NDK_VERSION: "25.1.8937393"
  CMAKE_VERSION: "3.22.1"
  JAVA_VERSION: "17"
  EXCLUDED_PATH: "src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools"

jobs:
  secure-build:
    name: Security Hardened Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ================== [1] 安全代码检出 ==================
      - name: Checkout with Nuclear Clean
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          submodules: false  # 禁用自动初始化
          clean: true
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/
            !${{ env.EXCLUDED_PATH }}
          filter: 'blob:none'  # 启用对象过滤
          sparse-checkout-cone-mode: false

      # ================== [2] 量子级残留清理 ==================
      - name: Quantum-Level Cleanup
        run: |
          # 递归擦除git配置
          find . -type d -name ".git" | while read gitdir; do
            cfg_files=("$gitdir/config" "$gitdir/modules/config" "${gitdir%.git}.gitmodules")
            parallel --will-cite -j4 "sed -i '\|${{ env.EXCLUDED_PATH }}|d' {}" ::: "${cfg_files[@]}" 2>/dev/null || true
          done

          # 物理湮灭残留路径
          find . -type d -path "*${{ env.EXCLUDED_PATH }}*" -exec rm -rf {} + 2>/dev/null || true
          find .git/modules -type d -name "*$(basename "${{ env.EXCLUDED_PATH }}")*" -exec rm -rf {} + 2>/dev/null || true

          # 量子态索引重建
          git reset --hard HEAD
          git update-index --really-refresh
          git rm --cached -r --ignore-unmatch "${{ env.EXCLUDED_PATH }}" || true

      # ================== [3] 白名单子模块初始化 ==================
      - name: Whitelist Submodule Init
        run: |
          # 生成有效子模块列表
          valid_submodules=$(git config --file .gitmodules --get-regexp path | 
            awk '{print $2}' | 
            grep -v "${{ env.EXCLUDED_PATH }}" | 
            tr '\n' ' ')

          # 安全初始化
          git submodule sync --recursive
          git submodule update --init --force --depth=1 \
            --jobs $(nproc) \
            --filter=tree:0 \
            --checkout \
            $valid_submodules

      # ================== [4] 环境验证 ==================
      - name: Security Verification
        run: |
          # 路径存在性断言
          if [ -d "${{ env.EXCLUDED_PATH }}" ]; then
            echo "::error::路径残留异常：${{ env.EXCLUDED_PATH }}"
            exit 1
          fi

          # 子模块健康检查
          bad_submodules=$(git submodule status | grep -E "(^\-|${{ env.EXCLUDED_PATH }})")
          if [ -n "$bad_submodules" ]; then
            echo "::error::异常子模块列表："
            printf "%s\n" "$bad_submodules"
            exit 1
          fi

      # ================== [5] 构建环境配置 ==================
      - name: Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
          check-latest: true

      - name: Android SDK Fortification
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "12.0"
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;${{ env.NDK_VERSION }}
            cmake;${{ env.CMAKE_VERSION }}
        timeout-minutes: 15

      # ================== [6] 分布式缓存系统 ==================
      - name: Cache Matrix
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.ccache
            src/RyujinxAndroid/.gradle
          key: ${{ runner.os }}-${{ github.sha }}-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-

      - name: CCache Accelerator
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ runner.os }}-${{ github.sha }}
          max-size: 2G
          enable-fallback: false

      # ================== [7] 核心构建流程 ==================
      - name: Native Library Compilation
        working-directory: src/LibRyujinx
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
        run: |
          dotnet build -c Release \
            /p:RuntimeIdentifier=linux-bionic-arm64 \
            /p:AndroidNdkDirectory="$ANDROID_NDK" \
            /p:AndroidSdkDirectory="$ANDROID_SDK_ROOT" \
            /p:ErrorReport=prompt

      - name: APK Assembly Line
        working-directory: src/RyujinxAndroid
        env:
          ORG_GRADLE_PROJECT_ndkPath: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.ndkVersion=${{ env.NDK_VERSION }} \
            -Pandroid.buildCacheDir=${{ github.workspace }}/.gradle-build-cache \
            -Porg.gradle.parallel=true

      # ================== [8] 安全发布通道 ==================
      - name: Artifact Fort Knox
        run: |
          # APK完整性校验
          find app/build/outputs/apk -name "*.apk" -print0 | xargs -0 -P4 -I{} \
            sh -c 'if ! unzip -t "{}" >/dev/null; then 
              echo "::error::损坏的APK文件: {}"
              exit 1
            fi'

      - name: Deploy Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: armored-apk
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/mapping/**/*.txt
          retention-days: 3
          compression-level: 9

      - name: Release Sentinel
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: app/build/outputs/apk/release/*.apk
          draft: false
          generate_release_notes: true
          discussion_category_name: "Releases"
