name: Android CI (Linux Bionic ARM64)

on:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/src/RyujinxAndroid/.gradle
  NDK_VERSION: "25.2.9519653"
  CMAKE_VERSION: "3.22.1"
  BUILD_TOOLS_VERSION: "34.0.0"
  DOTNET_VERSION: "9.0.101"
  ANDROID_HOME: ${{ github.workspace }}/android-sdk

jobs:
  build:
    name: Build Android Library
    runs-on: ubuntu-latest

    steps:
      # ================== [1] 代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            src/Ryujinx.Common/**
            src/Ryujinx.HLE/**
            src/Ryujinx.Input/**
            src/ARMeilleure/**
            src/Ryujinx.Graphics.**
            Directory.Packages.props
          sparse-checkout-cone-mode: false
          clean: true

      # ================== [2] 环境初始化 ==================
      - name: Prepare workspace
        run: |
          NDK_HOME="$ANDROID_HOME/ndk/$NDK_VERSION"
          echo "NDK_HOME=$NDK_HOME" >> $GITHUB_ENV
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          sudo chmod -R 777 ${{ env.ANDROID_HOME }}

      # ================== [3] .NET环境配置 ==================
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: false

      # ================== [4] Android SDK安装 ==================
      - name: Install Android Tools
        run: |
          cd "$ANDROID_HOME"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-*.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest
          rm commandlinetools-linux-*.zip
          chmod +x cmdline-tools/latest/bin/*
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          
          # 接受许可证
          yes | sdkmanager --licenses
          sdkmanager --verbose \
            "platform-tools" \
            "build-tools;$BUILD_TOOLS_VERSION" \
            "ndk;$NDK_VERSION" \
            "cmake;$CMAKE_VERSION"

      # ================== [5] 配置项目文件 (关键修复步骤) ==================
      - name: Configure Project
        working-directory: src/LibRyujinx
        run: |
          sudo apt-get install -y xmlstarlet

          # 清理旧参数 (重要修复)
          xmlstarlet ed -L \
            -d '//ItemGroup/LinkerArg[@Condition="'\''$(RuntimeIdentifier)'\''=='\''linux-bionic-arm64'\''"]' \
            LibRyujinx.csproj

          # 动态添加链接参数 (属性模式)
          for lib in "-llog" "-ldl" "-lz" "-lm" "-lc"; do
            xmlstarlet ed -L \
              --var condition "'\$(RuntimeIdentifier)'=='linux-bionic-arm64'" \
              -s '//ItemGroup[last()]' \
              -t elem -n LinkerArg \
              -i '$prev' -t attr -n Include -v "$lib" \
              -i '$prev' -t attr -n Condition -v "\$condition" \
              LibRyujinx.csproj
          done

          # 格式验证
          if ! xmlstarlet val LibRyujinx.csproj; then
            echo "::error::XML validation failed!"
            exit 1
          fi

          # 调试输出
          echo "=== 生成的链接参数 ==="
          xmlstarlet sel -t -m '//LinkerArg' -v '@Include' -n LibRyujinx.csproj

      # ================== [6] 编译原生库 ==================
      - name: Build Native Library
        working-directory: src/LibRyujinx
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
        run: |
          dotnet publish -c Release \
            -r linux-bionic-arm64 \
            -p:AndroidNdkDirectory=$NDK_HOME \
            -p:AndroidNativeLibraryName=libryujinx.so \
            -p:StripSymbols=true \
            --self-contained

      # ================== [7] 后续步骤保持不变 ==================
      - name: Integrate into Android Project
        working-directory: src/RyujinxAndroid
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp ../LibRyujinx/bin/Release/net9.0/linux-bionic-arm64/publish/*.so app/src/main/jniLibs/arm64-v8a/

      - name: Build APK
        working-directory: src/RyujinxAndroid
        run: |
          ./gradlew assembleRelease \
            -Pandroid.ndkVersion=$NDK_VERSION \
            -Pandroid.sdkDirectory=$ANDROID_HOME

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.run_number }}
          path: src/RyujinxAndroid/app/build/outputs/apk/**/*.apk
