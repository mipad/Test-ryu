name: Android CI

on:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "test" ]

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/src/RyujinxAndroid/.gradle
  NDK_VERSION: "25.2.9519653"
  CMAKE_VERSION: "3.22.1"
  BUILD_TOOLS_VERSION: "34.0.0"
  JAVA_VERSION: "17"
  DOTNET_VERSION: "9.0.101"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ================== [1] 代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          sparse-checkout: |
            /*
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          sparse-checkout-cone-mode: false
          clean: true

      # ================== [2] 环境初始化 ==================
      - name: Prepare workspace
        run: |
          # 设置Android环境变量
          ANDROID_HOME="${{ github.workspace }}/android-sdk"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          
          # 创建必要的目录结构
          mkdir -p $ANDROID_HOME/cmdline-tools
          
          # 配置local.properties
          echo "sdk.dir=$ANDROID_HOME" > src/RyujinxAndroid/local.properties
          echo "ndk.dir=$NDK_HOME" >> src/RyujinxAndroid/local.properties
          echo "cmake.dir=$ANDROID_HOME/cmake/${{ env.CMAKE_VERSION }}" >> src/RyujinxAndroid/local.properties

      # ================== [3] .NET环境配置 ==================
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: false

      # ================== [4] Android SDK安装（关键修改）==================
      - name: Install Android Tools
        run: |
          # 安装命令行工具（修复目录结构）
          cd $ANDROID_HOME
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-*.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest
          rm commandlinetools-linux-*.zip

          # 设置立即生效的PATH
          echo "Current PATH: $PATH"
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          echo "Updated PATH: $PATH"

          # 验证sdkmanager可用性
          if ! command -v sdkmanager &> /dev/null; then
              echo "❌ sdkmanager not found! Searching..."
              find $ANDROID_HOME -name sdkmanager
              exit 1
          fi

          # 接受许可证（改进写法）
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          (while true; do echo y; sleep 1; done) | sdkmanager --licenses

          # 安装组件（使用完整路径保险）
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --verbose \
              "platform-tools" \
              "build-tools;${{ env.BUILD_TOOLS_VERSION }}" \
              "ndk;${{ env.NDK_VERSION }}" \
              "cmake;${{ env.CMAKE_VERSION }}"

          # 验证安装结果
          ls -l $ANDROID_HOME/ndk/${{ env.NDK_VERSION }}
          ls -l $ANDROID_HOME/cmake/${{ env.CMAKE_VERSION }}

      # ================== [5] 修复NativeAOT编译参数 ==================
      - name: Patch NativeAOT Settings
        working-directory: src/LibRyujinx
        run: |
          # 修改RuntimeIdentifier为Android目标
          sed -i 's|<RuntimeIdentifier>.*</RuntimeIdentifier>|<RuntimeIdentifier>android-arm64</RuntimeIdentifier>|g' LibRyujinx.csproj
          
          # 添加AOT编译参数
          cat << EOF >> LibRyujinx.csproj
          <PropertyGroup>
            <IlcGenerateMapFile>true</IlcGenerateMapFile>
            <IlcDisableUnhandledExceptionExperience>true</IlcDisableUnhandledExceptionExperience>
            <IlcGenerateCompleteTypeMetadata>false</IlcGenerateCompleteTypeMetadata>
            <IlcDisableReflection>true</IlcDisableReflection>
            <AndroidStripSymbols>false</AndroidStripSymbols>
          </PropertyGroup>
          EOF

      # ================== [6] 构建执行（优化参数）==================
      - name: Build Android Project
        working-directory: src/RyujinxAndroid
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
          TERM: xterm-color  # 确保Gradle输出颜色正常
        run: |
          # 清理旧构建
          ./gradlew clean --stacktrace
          
          # 完整构建流程
          ./gradlew assembleRelease \
            -Pandroid.debug.obsoleteApi=true \
            -Porg.gradle.parallel=true \
            -Porg.gradle.daemon=false \
            -Porg.gradle.caching=false \
            -PnativeLib.buildType=release \
            --scan \
            --stacktrace \
            --info

      # ================== [7] 产物处理（增加符号文件）==================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.run_id }}
          path: |
            src/RyujinxAndroid/app/build/outputs/apk/**/*.apk
            src/RyujinxAndroid/app/build/outputs/native-debug-symbols/**/*.so
            src/RyujinxAndroid/app/build/reports/**/*.html
          retention-days: 3
