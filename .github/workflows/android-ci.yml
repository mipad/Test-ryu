name: Android CI

on:
  workflow_call:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  NDK_VERSION: "25.1.8937393"
  CMAKE_VERSION: "3.22.1"
  DOTNET_VERSION: "9.0.101"
  JAVA_VERSION: "17"
  ANDROID_CMD_TOOLS_VERSION: "9477386"
  BUILD_TOOLS_VERSION: "34.0.0"
  PLATFORM_VERSION: "34"

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ================== [1] 智能代码检出（子模块处理）==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false  # 显式禁用子模块检出
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools  # 排除子模块目录
          sparse-checkout-cone-mode: false
          clean: true

      # ================== [2] 深度子模块清理 ==================
      - name: Deep clean submodules
        run: |
          # 物理删除残留目录
          rm -rf src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools || true
          
          # Git历史记录清理
          git reset --hard HEAD
          git clean -fdx
          
          # 清理子模块缓存
          git submodule deinit -f src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools 2>/dev/null || true
          git rm --cached src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools 2>/dev/null || true
          rm -rf .git/modules/src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools

      # ================== [3] 项目结构验证 ==================
      - name: Validate project structure
        run: |
          echo "===== 排除目录深度检测 ====="
          if find . -type d -path '*/adrenotools' | grep -q .; then
            echo "::error::检测到残留的子模块目录"
            find . -type d -path '*/adrenotools'
            exit 1
          else
            echo "✅ 排除验证通过"
          fi

          echo "===== 依赖目录完整性检查 ====="
          [ -d "src/RyujinxAndroid/app/src/main/cpp/libraries" ] || { echo "::warning::libraries目录不存在，可能影响构建"; }
          [ -d "src/LibRyujinx" ] || { echo "::error::原生库目录缺失"; exit 1; }

      # ================== [4] 环境配置 ================== 
      - name: Setup .NET 9.0.101
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "${{ env.DOTNET_VERSION }}"

      - name: Install Android CLI Tools
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_CMD_TOOLS_VERSION}_latest.zip
          unzip -q commandlinetools-linux-*.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Install Android Components
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-${{ env.PLATFORM_VERSION }}" \
            "build-tools;${{ env.BUILD_TOOLS_VERSION }}" \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}" \
            --sdk_root=$ANDROID_SDK_ROOT

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "${{ env.JAVA_VERSION }}"

      # ================== [5] 构建配置 ==================
      - name: Prepare Build Environment
        working-directory: src/RyujinxAndroid
        run: |
          chmod +x gradlew
          echo "NDK_PATH=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      # ================== [6] 原生库构建 ==================
      - name: Build Native Libraries
        working-directory: src/LibRyujinx
        env:
          ANDROID_NDK: "${{ env.NDK_PATH }}"
        run: |
          dotnet restore
          dotnet build -c Release /p:RuntimeIdentifier=linux-bionic-arm64 \
            /p:AndroidNdkDirectory=$ANDROID_NDK \
            /p:AndroidSdkDirectory=$ANDROID_SDK_ROOT

      # ================== [7] Android应用构建 ==================
      - name: Build Android APK
        working-directory: src/RyujinxAndroid
        env:
          ORG_GRADLE_PROJECT_ndkPath: "${{ env.NDK_PATH }}"
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            -Pandroid.ndkPath=$ORG_GRADLE_PROJECT_ndkPath

      # ================== [8] 产物处理 ==================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-android
          path: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          files: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
