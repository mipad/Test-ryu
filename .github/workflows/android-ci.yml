name: Android CI

on:
  workflow_call:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  NDK_VERSION: "25.1.8937393"
  CMAKE_VERSION: "3.22.1"
  DOTNET_VERSION: "9.0.101"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须授予写入权限
      packages: write

    steps:
      # ================== 1. 安全代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}  # 必须使用自定义 PAT
          repository: mipad/Test-ryu    # 确认仓库名称正确
          ref: test                     # 明确指定分支
          submodules: false             # 禁用子模块拉取
          fetch-depth: 0
          clean: true
          

      # ================== 3. 构建环境配置 ==================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;${{ env.NDK_VERSION }}
            cmake;${{ env.CMAKE_VERSION }}
          accept-android-sdk-licenses: true

      # ================== 4. 构建优化配置 ==================
      - name: Configure CCache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ runner.os }}
          maxsize: "500M"

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # ================== 5. 核心编译流程 ==================
      - name: Build Native Libs
        working-directory: src/LibRyujinx
        run: |
          dotnet restore
          dotnet build -c Release /p:RuntimeIdentifier=linux-bionic-arm64

      - name: Build Android APK
        working-directory: src/RyujinxAndroid
        env:
          ORG_GRADLE_PROJECT_ndkPath: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          CCACHE_DIR: /tmp/ccache
        run: |
          ./gradlew assembleRelease \
            --stacktrace \
            --no-daemon \
            -Pandroid.ndkPath=$ORG_GRADLE_PROJECT_ndkPath \
            -Dorg.gradle.workers.max=2 \
            -Dorg.gradle.caching=true

      # ================== 6. 产物处理 ==================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-android
          path: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Create Release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
