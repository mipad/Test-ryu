name: Android CI (Linux Bionic ARM64)

on:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/src/RyujinxAndroid/.gradle
  NDK_VERSION: "25.2.9519653"
  CMAKE_VERSION: "3.22.1"
  BUILD_TOOLS_VERSION: "34.0.0"
  DOTNET_VERSION: "9.0.101"
  ANDROID_HOME: ${{ github.workspace }}/android-sdk

jobs:
  build:
    name: Build Android Library
    runs-on: ubuntu-latest

    steps:
      # ================== [1] 代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            src/Ryujinx.Common/**
            src/Ryujinx.HLE/**
            src/Ryujinx.Input/**
            src/ARMeilleure/**
            src/Ryujinx.Graphics.**
            src/LibRyujinx/**  # 确保主项目被检出
            Directory.Packages.props
          sparse-checkout-cone-mode: false
          clean: true

      # ================== [2] 环境初始化 ==================
      - name: Prepare workspace
        run: |
          # 设置NDK路径
          NDK_HOME="$ANDROID_HOME/ndk/$NDK_VERSION"
          echo "NDK_HOME=$NDK_HOME" >> $GITHUB_ENV
          
          # 创建必要目录
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          
          # 设置文件权限
          sudo chmod -R 777 ${{ env.ANDROID_HOME }}

          # 验证项目结构
          echo "=== 项目结构验证 ==="
          [ -d src/Ryujinx.Common ] || { echo "::error::Missing Ryujinx.Common"; exit 1; }
          [ -f Directory.Packages.props ] || { echo "::error::Missing Directory.Packages.props"; exit 1; }

      # ================== [3] 配置NuGet源 ==================
      - name: Configure NuGet
        run: |
          # 添加包源
          dotnet nuget add source https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet9/nuget/v3/index.json --name dotnet9
          dotnet nuget add source https://api.nuget.org/v3/index.json --name nuget
          
          # 生成nuget.config
          echo '<?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="nuget" value="https://api.nuget.org/v3/index.json" />
              <add key="dotnet9" value="https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet9/nuget/v3/index.json" />
            </packageSources>
            <packageSourceMapping>
              <packageSource key="nuget">
                <package pattern="*" />
              </packageSource>
              <packageSource key="dotnet9">
                <package pattern="Microsoft.DotNet.*" />
                <package pattern="Silk.NET.*" />
              </packageSource>
            </packageSourceMapping>
          </configuration>' > nuget.config

      # ================== [4] .NET环境配置 ==================
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: false

      # ================== [5] Android SDK安装 ==================
      - name: Install Android Tools
        run: |
          cd "$ANDROID_HOME"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-*.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest
          rm commandlinetools-linux-*.zip
          chmod +x cmdline-tools/latest/bin/*
          
          # 显式导出PATH
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"

          # 接受许可证（带重试机制）
          for i in {1..3}; do
            if yes | sdkmanager --licenses; then
              break
            else
              echo "::warning::License acceptance failed, retrying ($i/3)..."
              sleep 5
            done

          sdkmanager --verbose \
            "platform-tools" \
            "build-tools;$BUILD_TOOLS_VERSION" \
            "ndk;$NDK_VERSION" \
            "cmake;$CMAKE_VERSION"

          # NDK验证
          [ -f "$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang++" ] || exit 1

      # ================== [6] 配置项目文件 ==================
      - name: Configure Project
        working-directory: src/LibRyujinx
        run: |
          sudo apt-get install -y xmlstarlet

          # 清理旧参数
          xmlstarlet ed -L \
            -d '//ItemGroup/LinkerArg[@Condition="'\''$(RuntimeIdentifier)'\''=='\''linux-bionic-arm64'\''"]' \
            LibRyujinx.csproj

          # 动态添加链接参数（修复版）
          for lib in "-llog" "-ldl" "-lz" "-lm" "-lc"; do
            xmlstarlet ed -L \
              --var condition "'\$(RuntimeIdentifier)'=='linux-bionic-arm64'" \
              -s '//ItemGroup[last()]' \
              -t elem -n LinkerArg \
              -i '$prev' -t attr -n Include -v "$lib" \
              -i '$prev' -t attr -n Condition -v "\$condition" \
              LibRyujinx.csproj
          done

          # 格式验证
          if ! xmlstarlet val LibRyujinx.csproj; then
            echo "::error::XML validation failed!"
            exit 1
          fi

      # ================== [7] 还原依赖 ==================
      - name: Restore dependencies
        working-directory: src/LibRyujinx
        run: |
          dotnet restore --configfile ../nuget.config --force-evaluate

      # ================== [8] 编译原生库 ==================
      - name: Build Native Library
        working-directory: src/LibRyujinx
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
        run: |
          dotnet publish -c Release \
            -r linux-bionic-arm64 \
            -p:AndroidNdkDirectory=$NDK_HOME \
            -p:AndroidNativeLibraryName=libryujinx.so \
            -p:StripSymbols=true \
            --self-contained \
            --verbosity detailed

          # 验证产出
          echo "=== 生成的共享库 ==="
          find bin/Release/net9.0/linux-bionic-arm64/publish -name '*.so' -exec file {} \;

      # ================== [9] 集成到Android工程 ==================
      - name: Integrate into Android Project
        working-directory: src/RyujinxAndroid
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          rsync -av --checksum ../LibRyujinx/bin/Release/net9.0/linux-bionic-arm64/publish/*.so app/src/main/jniLibs/arm64-v8a/
          
          # 关键文件验证
          [ -f app/src/main/jniLibs/arm64-v8a/libryujinx.so ] || { echo "::error::libryujinx.so not found"; exit 1; }

      # ================== [10] 构建APK ==================
      - name: Build APK
        working-directory: src/RyujinxAndroid
        timeout-minutes: 30
        run: |
          ./gradlew clean assembleRelease \
            -Pandroid.ndkVersion=$NDK_VERSION \
            -Pandroid.sdkDirectory=$ANDROID_HOME \
            --no-daemon \
            --max-workers 2 \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"

          # APK验证
          apk_path=$(find app/build/outputs/apk -name '*-release.apk')
          [ -f "$apk_path" ] || { echo "::error::APK file not found"; exit 1; }

      # ================== [11] 上传产物 ==================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.run_number }}
          path: |
            src/RyujinxAndroid/app/build/outputs/apk/**/*.apk
            src/RyujinxAndroid/app/build/outputs/native-debug-symbols/**/*.so
          retention-days: 7
