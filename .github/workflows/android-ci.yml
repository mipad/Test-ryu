name: Android CI

on:
  workflow_dispatch:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools/**'
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  NDK_VERSION: "25.1.8937393"
  CMAKE_VERSION: "3.22.1"
  JAVA_VERSION: "17"
  EXCLUDE_PATH: "src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools"

jobs:
  build:
    name: Secure Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ================== [1] 安全代码检出 ==================
      - name: Checkout with Submodule Protection
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          submodules: recursive
          fetch-depth: 1
          sparse-checkout: |
            /*
            src/RyujinxAndroid/
            !${{ env.EXCLUDE_PATH }}
          sparse-checkout-cone-mode: false
          clean: true

      # ================== [2] 原子级子模块清理 ==================
      - name: Nuclear Submodule Cleanup
        run: |
          # 递归清理git配置
          find . -type d -name ".git" | while read gitdir; do
            config_files=(
              "$gitdir/config"
              "$gitdir/modules/config"
              "${gitdir%.git}.gitmodules"
            )
            for cfg in "${config_files[@]}"; do
              [ -f "$cfg" ] && sed -i '/adrenotools/d' "$cfg"
            done
          done

          # 物理清除残留
          find . -type d -path "*${{ env.EXCLUDE_PATH }}*" -exec rm -rf {} + || true
          rm -rf .git/modules/*adrenotools*

          # 重建索引
          git reset --hard HEAD
          git submodule sync --recursive

      # ================== [3] 安全子模块初始化 ==================
      - name: Safe Submodule Init
        run: |
          git config --global protocol.file.allow always
          git submodule update --init --force --depth=1 \
            --jobs $(nproc) \
            --filter=blob:none \
            --checkout \
            :(exclude,glob)${{ env.EXCLUDE_PATH }}

      # ================== [4] 环境验证 ==================
      - name: Environment Validation
        run: |
          # 路径存在性验证
          [ ! -d "${{ env.EXCLUDE_PATH }}" ] || { 
            echo "::error::排除目录仍然存在";
            exit 1;
          }

          # 子模块健康检查
          bad_submodules=$(git submodule status | grep -E "(^\-|adrenotools)")
          [ -z "$bad_submodules" ] || {
            echo "::error::检测到异常子模块:";
            echo "$bad_submodules";
            exit 1;
          }

      # ================== [5] 构建环境配置 ==================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
          overwrite-settings: false

      - name: Android SDK Manager
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "12.0"
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;${{ env.NDK_VERSION }}
            cmake;${{ env.CMAKE_VERSION }}
        env:
          REPO_OS_OVERRIDE: "linux"

      # ================== [6] 构建加速系统 ==================
      - name: Cache Optimization
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.ccache
          key: ${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-

      - name: CCache Setup
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 2G

      # ================== [7] 核心构建流程 ==================
      - name: Native Library Build
        working-directory: src/LibRyujinx
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
        run: |
          dotnet build -c Release \
            /p:RuntimeIdentifier=linux-bionic-arm64 \
            /p:AndroidNdkDirectory="$ANDROID_NDK" \
            /p:AndroidSdkDirectory="$ANDROID_SDK_ROOT"

      - name: APK Assembly
        working-directory: src/RyujinxAndroid
        env:
          ORG_GRADLE_PROJECT_ndkPath: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.ndkVersion=${{ env.NDK_VERSION }} \
            -Pandroid.enableParallelJsonGen=true

      # ================== [8] 产物安全发布 ==================
      - name: Artifact Sanitization
        run: |
          find app/build/outputs/apk -name "*.apk" -exec sh -c '
            echo "Validating $1 ...";
            if ! unzip -l "$1" >/dev/null; then
              echo "::error::损坏的APK文件: $1";
              exit 1;
            fi
          ' sh {} \;

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/mapping/**/*.txt
          retention-days: 3

      - name: Create Release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: app/build/outputs/apk/release/*.apk
          draft: false
          generate_release_notes: true
