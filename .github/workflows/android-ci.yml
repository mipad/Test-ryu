name: Android CI

on:
  workflow_call:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  NDK_VERSION: "25.1.8937393"
  CMAKE_VERSION: "3.22.1"
  DOTNET_VERSION: "9.0.101"  # 明确指定.NET版本
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ================== [1] 代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          clean: true
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools

      # ================== [2] 环境配置 ================== 
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      # ================== [新增].NET 9.0安装 ==================
      - name: Setup .NET 9.0.101
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          disable-parallel: false  # 启用并行安装

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "8.0"
          disable-confirmation: true
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;${{ env.NDK_VERSION }}
            cmake;${{ env.CMAKE_VERSION }}

      # ================== [3] 缓存优化 ==================
      - name: NuGet Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            **/packages.lock.json
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Configure CCache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ runner.os }}-${{ github.sha }}
          max-size: 500M

      # ================== [4] 原生库构建 ==================
      - name: Build Native Libraries
        working-directory: src/LibRyujinx
        env:
          DOTNET_ROOT: ${{ env.HOME }}/.dotnet  # 确保路径正确
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
        run: |
          # 验证.NET环境
          dotnet --info
          
          # 使用新版构建参数
          dotnet restore --verbosity minimal \
            --packages ./nuget_packages \
            --configfile nuget.config

          dotnet build -c Release \
            -p:RuntimeIdentifier=linux-bionic-arm64 \
            -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
            -p:AndroidNdkDirectory=$ANDROID_NDK \
            -p:TargetFramework=net9.0-android34 \  # Android特定目标框架
            -p:AndroidEnableProfiledAot=true \
            -p:UseSharedCompression=false \
            -p:IlcCompilationMode=partial \
            --no-self-contained \
            --nologo

      # ================== [5] Android构建 ==================
      - name: Build Android APK
        working-directory: src/RyujinxAndroid
        env:
          ORG_GRADLE_PROJECT_ndkPath: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          CCACHE_DIR: /tmp/ccache
          GRADLE_OPTS: -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --no-daemon \
            -Pandroid.ndkPath=$ORG_GRADLE_PROJECT_ndkPath \
            -Pandroid.enableJetifier=true

      # ================== [6] 产物处理 ==================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-android
          path: src/RyujinxAndroid/app/build/outputs/apk/**/*.apk
          retention-days: 7

      - name: Create GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          files: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
