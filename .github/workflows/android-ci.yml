name: Android CI

on:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ------------ 1. 拉取代码并保留权限 ------------
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false
          sparse-checkout: |
            *
          filter: 'blob:none'

      # ------------ 2. 修复权限并验证 ------------
      - name: Fix Gradle Permissions
        working-directory: src/RyujinxAndroid  # 根据实际路径调整
        run: |
          echo "修复前权限:"
          ls -l gradlew || true
          chmod +x gradlew
          echo "修复后权限:"
          ls -l gradlew
          echo "当前目录内容:"
          ls -la

      # ------------ 3. 构建步骤 ------------
      - name: Build Release APK
        working-directory: src/RyujinxAndroid
        run: ./gradlew assembleRelease --stacktrace
        env:
          ORG_RYUJINX_LLVM_TOOLCHAIN_PATH: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.1.8937393/toolchains/llvm/prebuilt/linux-x86_64/bin
