name: Android CI

on:
  workflow_call:
  push:
    branches: [ "test" ]
    paths:
      - '.gitmodules'
      - 'src/RyujinxAndroid/**'
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  NDK_VERSION: "25.1.8937393"
  CMAKE_VERSION: "3.22.1"
  DOTNET_VERSION: "9.0.101"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ------------ 1. 代码检出（修复子模块和权限） ------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}  # 使用自定义 PAT（需在仓库 Secrets 配置）
          submodules: recursive
          fetch-depth: 0
          persist-credentials: true
          clean: true
          sparse-checkout-cone-mode: true

      # ------------ 2. 强制删除问题子模块 ------------
      - name: Remove adrenotools submodule
        run: |
          # 删除物理目录和 Git 记录
          rm -rf src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          git rm --cached src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          # 提交变更（避免后续检出冲突）
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git commit -m "Remove adrenotools submodule" || echo "No changes to commit"

      # ------------ 3. 环境初始化 ------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ------------ 4. Android SDK 配置 ------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;${{ env.NDK_VERSION }}
            cmake;${{ env.CMAKE_VERSION }}
          accept-android-sdk-licenses: true

      - name: Accept Android Licenses
        run: |
          yes | ${{ env.ANDROID_SDK_ROOT }}/cmdline-tools/latest/bin/sdkmanager --licenses

      # ------------ 5. 缓存加速 ------------
      - name: CCache setup
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ runner.os }}
          maxsize: 500M

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # ------------ 6. 构建前准备 ------------
      - name: Fix permissions
        working-directory: src/RyujinxAndroid
        run: |
          chmod +x gradlew
          sudo sysctl -w fs.inotify.max_user_watches=524288
          ulimit -n 65536

      # ------------ 7. 核心编译步骤 ------------
      - name: Build LibRyujinx (AOT)
        working-directory: src/LibRyujinx
        run: |
          dotnet restore
          dotnet build -c Release /p:RuntimeIdentifier=linux-bionic-arm64
          dotnet build -c Release /p:RuntimeIdentifier=ios-arm64

      - name: Build with Gradle
        working-directory: src/RyujinxAndroid
        env:
          ORG_GRADLE_PROJECT_ndkPath: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          CCACHE_DIR: /tmp/ccache
        run: |
          ./gradlew assembleRelease \
            --stacktrace \
            --no-daemon \
            -Pandroid.ndkPath=$ORG_GRADLE_PROJECT_ndkPath \
            -Dorg.gradle.workers.max=2 \
            -Dorg.gradle.caching=true

      # ------------ 8. 产物处理 ------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-android
          path: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Create GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
