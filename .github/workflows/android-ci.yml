name: Android CI

on:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk  # 定义 Android SDK 根目录
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许创建 Release

    steps:
      # ------------ 基础配置 ------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # ------------ .NET 9.0 安装 ------------
      - name: Install .NET 9.0 SDK (Preview)
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.100-preview.6.24328.19'  # 指定精确预览版

      # ------------ Android SDK 安装 ------------
      - name: Install Android Command Line Tools
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip -d $ANDROID_SDK_ROOT/cmdline-tools/latest
          mv $ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm -rf $ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses  # 自动接受所有许可证

      - name: Install Android Components
        run: |
          sdkmanager "platforms;android-34"          # API 34
          sdkmanager "build-tools;34.0.0"           # 构建工具 34.0.0
          sdkmanager "ndk;25.1.8937393" --channel=3  # NDK 25.1.8937393

      # ------------ Java 环境 ------------
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      # ------------ 缓存优化 ------------
      - name: Cache Android SDK
        uses: actions/cache@v3
        with:
          path: |
            ~/.android/cache
            ${{ env.ANDROID_SDK_ROOT }}
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('ryujinx/src/RyujinxAndroid/gradle/wrapper/gradle-wrapper.properties') }}

      # ------------ 项目构建 ------------
      - name: Grant gradlew Permission
        run: chmod +x gradlew  # 赋予执行权限
        working-directory: ryujinx/src/RyujinxAndroid  # 关键：指定项目目录

      - name: Build Release APK
        run: ./gradlew assembleRelease
        working-directory: ryujinx/src/RyujinxAndroid  # 指定项目目录
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}          # 从 Secrets 读取签名信息
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # 修正 LLVM 路径（Linux 格式）
          ORG_RYUJINX_LLVM_TOOLCHAIN_PATH: /usr/local/lib/android/sdk/ndk/25.1.8937393/toolchains/llvm/prebuilt/linux-x86_64/bin

      # ------------ 产物上传 ------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ryujinx/src/RyujinxAndroid/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ryujinx/src/RyujinxAndroid/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
