name: Android CI

on:
  workflow_call:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  NDK_VERSION: "25.1.8937393"
  CMAKE_VERSION: "3.22.1"
  DOTNET_VERSION: "9.0.101"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ================== 1. 安全代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}  # 必须使用自定义 PAT
          repository: mipad/Test-ryu    # 确认仓库名称正确
          ref: test                     # 明确指定分支
          submodules: false             # 禁用子模块拉取
          fetch-depth: 0
          clean: true
          sparse-checkout: |
            /*
            !/src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
            src/RyujinxAndroid/**
          sparse-checkout-cone-mode: false  # 禁用 cone 模式
          persist-credentials: true

      # ================== 2. 全局 Git 配置 ==================
      - name: Configure Git security
        run: |
          # 强制使用 HTTPS 协议
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://".insteadOf git://
          
          # 配置凭证缓存
          git config --global credential.helper "store --file=/tmp/git-credentials"
          echo "https://oauth2:${{ secrets.GH_PAT }}@github.com" > /tmp/git-credentials

      # ================== 3. 项目结构验证 ==================
      - name: Validate project structure
        run: |
          echo "===== 完整目录结构 ====="
          tree -L 3  # 显示三级目录结构

          echo "===== Android 关键路径验证 ====="
          [ -d "src/RyujinxAndroid" ] || { echo "错误：Android 项目根目录不存在"; exit 1; }
          [ -f "src/RyujinxAndroid/build.gradle" ] || { echo "错误：未找到 build.gradle"; exit 1; }
          [ -d "src/RyujinxAndroid/app/src/main/cpp" ] || { echo "错误：C++ 代码目录不存在"; exit 1; }

          echo "===== 排除目录验证 ====="
          if [ -d "src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools" ]; then
            echo "错误：子模块目录未被排除！"
            exit 1
          else
            echo "成功排除 adrenotools 目录"
          fi

      # ================== 4. 构建环境配置 ==================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "8.0"
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;${{ env.NDK_VERSION }}
            cmake;${{ env.CMAKE_VERSION }}
          accept-android-sdk-licenses: true

      # ================== 5. 构建加速配置 ==================
      - name: CCache configuration
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ runner.os }}
          max-size: 500M
          enable-fallback: true

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ================== 6. 原生库构建 ==================
      - name: Build Native Libraries
        working-directory: src/LibRyujinx
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
        run: |
          dotnet restore --verbosity minimal
          dotnet build -c Release /p:RuntimeIdentifier=linux-bionic-arm64 \
            /p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
            /p:AndroidNdkDirectory=$ANDROID_NDK

      # ================== 7. Android应用构建 ==================
      - name: Build Android APK
        working-directory: src/RyujinxAndroid
        env:
          ORG_GRADLE_PROJECT_ndkPath: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          CCACHE_DIR: /tmp/ccache
          GRADLE_OPTS: -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --no-daemon \
            -Pandroid.ndkPath=$ORG_GRADLE_PROJECT_ndkPath \
            -Dorg.gradle.caching=true

      # ================== 8. 产物处理 ==================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-android
          path: |
            src/RyujinxAndroid/app/build/outputs/apk/**/*.apk
          retention-days: 7

      - name: Create GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
