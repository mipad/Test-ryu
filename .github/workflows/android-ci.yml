name: Android CI

on:
  workflow_call:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  NDK_VERSION: "25.1.8937393"
  CMAKE_VERSION: "3.22.1"
  DOTNET_VERSION: "9.0.101"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ================== [1] 智能代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          clean: true
          sparse-checkout: |
            /*
            src/RyujinxAndroid/**
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          sparse-checkout-cone-mode: false
          persist-credentials: true

      # ================== [2] 深度清理残留 ==================
      - name: Deep clean workspace
        run: |
          rm -rf src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools || true
          git reset --hard HEAD
          git clean -fdx
          git submodule deinit -f src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools 2>/dev/null || true
          git rm --cached src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools 2>/dev/null || true
          rm -rf .git/modules/src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools

      # ================== [3] 项目结构验证 ==================
      - name: Validate project structure
        run: |
          echo "===== 全量目录扫描 ====="
          tree -L 4 -I '.git'
          
          echo "===== 关键路径验证 ====="
          [ -d "src/RyujinxAndroid" ] || { echo "::error::Android项目根目录缺失"; exit 1; }
          [ -f "src/RyujinxAndroid/build.gradle" ] || { echo "::error::build.gradle文件未找到"; exit 1; }
          
          echo "===== 排除目录深度检测 ====="
          if find . -type d -path '*/adrenotools' | grep -q .; then
            echo "::error::检测到残留的子模块目录"
            exit 1
          fi

          echo "===== 依赖目录完整性检查 ====="
          [ -d "src/RyujinxAndroid/app/src/main/cpp/libraries" ] || { echo "::warning::libraries目录不存在"; }
          [ -d "src/LibRyujinx" ] || { echo "::error::原生库目录缺失"; exit 1; }

      # ================== [4] 环境配置 ================== 
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      # ================== [新增] .NET 9.0 配置 ==================
      - name: Setup .NET 9.0.101
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "8.0"
          disable-confirmation: true
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;${{ env.NDK_VERSION }}
            cmake;${{ env.CMAKE_VERSION }}

      # ================== [5] 构建加速 ==================
      - name: Configure CCache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ runner.os }}-${{ github.sha }}
          max-size: 500M

      - name: Restore Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties') }}

      # ================== [新增] NuGet缓存 ==================
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            **/packages.lock.json
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json') }}

      # ================== [6] 原生库构建 (更新) ==================
      - name: Build Native Libraries
        working-directory: src/LibRyujinx
        env:
          DOTNET_ROOT: ${{ env.HOME }}/.dotnet
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
        run: |
          dotnet restore --verbosity minimal \
            --packages ./nuget_packages \
            --configfile nuget.config

          dotnet build -c Release \
            -p:RuntimeIdentifier=linux-bionic-arm64 \
            -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
            -p:AndroidNdkDirectory=$ANDROID_NDK \
            -p:TargetFramework=net9.0-android34 \
            -p:AndroidEnableProfiledAot=true \
            -p:IlcCompilationMode=partial \
            --nologo

      # ================== [7] Android构建 (优化) ==================
      - name: Build Android APK
        working-directory: src/RyujinxAndroid
        env:
          ORG_GRADLE_PROJECT_ndkPath: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          CCACHE_DIR: /tmp/ccache
          GRADLE_OPTS: -Dorg.gradle.parallel=true
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --no-daemon \
            -Pandroid.ndkPath=$ORG_GRADLE_PROJECT_ndkPath \
            -Pandroid.enableJetifier=true

      # ================== [8] 产物处理 ==================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryujinx-android
          path: src/RyujinxAndroid/app/build/outputs/apk/**/*.apk
          retention-days: 7

      - name: Create GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          files: src/RyujinxAndroid/app/build/outputs/apk/release/*.apk
