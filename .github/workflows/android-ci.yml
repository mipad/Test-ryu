name: Android CI

on:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk  # 固定 Android SDK 路径
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"  # 禁用守护进程 + 并行构建

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许创建 Release

    steps:
      # ------------ 代码拉取 ------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # ------------ .NET 9.0 安装 ------------
      - name: Install .NET 9.0 SDK (Preview)
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "9.0.100-preview.6.24328.19"  # 指定精确版本

      # ------------ Android 命令行工具安装 ------------
      - name: Install Android Command Line Tools
        run: |
          # 创建目标目录并解压到正确路径
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip -d $ANDROID_SDK_ROOT/cmdline-tools/latest

          # 将 sdkmanager 添加到 PATH（关键路径修正）
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools/bin:$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      # ------------ Android 组件安装 ------------
      - name: Setup Android Components
        run: |
          yes | sdkmanager --licenses  # 自动接受许可证
          sdkmanager "platforms;android-34"          # 安装 API 34
          sdkmanager "build-tools;34.0.0"           # 安装构建工具
          sdkmanager "ndk;25.1.8937393" --channel=3  # 安装 NDK

      # ------------ Java 环境配置 ------------
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin  # 使用 Eclipse Temurin JDK

      # ------------ 缓存优化 ------------
      - name: Cache Android SDK
        uses: actions/cache@v3
        with:
          path: |
            ~/.android/cache
            ${{ env.ANDROID_SDK_ROOT }}
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('ryujinx/src/RyujinxAndroid/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('ryujinx/src/RyujinxAndroid/gradle/wrapper/gradle-wrapper.properties') }}

      # ------------ 项目构建 ------------
      - name: Prepare Project Directory
        run: |
          # 确保 gradlew 有执行权限
          chmod +x ryujinx/src/RyujinxAndroid/gradlew
          # 验证 NDK 路径（修正 Linux 格式）
          echo "ORG_RYUJINX_LLVM_TOOLCHAIN_PATH=$ANDROID_SDK_ROOT/ndk/25.1.8937393/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

      - name: Build Release APK
        run: ./gradlew assembleRelease
        working-directory: ryujinx/src/RyujinxAndroid  # 指定项目目录
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}          # 签名配置
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # 强制指定 LLVM 工具链路径
          ORG_RYUJINX_LLVM_TOOLCHAIN_PATH: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.1.8937393/toolchains/llvm/prebuilt/linux-x86_64/bin

      # ------------ 产物上传 ------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ryujinx/src/RyujinxAndroid/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ryujinx/src/RyujinxAndroid/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
