name: Android CI

on:
  push:
    branches: [ "test" ]
    paths-ignore:
      - 'src/RyujinxAndroid/app/src/main/cpp/libraries/**'
  pull_request:
    branches: [ "test" ]

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/src/RyujinxAndroid/.gradle
  NDK_VERSION: "25.2.9519653"
  CMAKE_VERSION: "3.22.1"
  BUILD_TOOLS_VERSION: "34.0.0"
  JAVA_VERSION: "17"
  DOTNET_VERSION: "9.0.101"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ================== [1] 代码检出 ==================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHH_PAT }}
          repository: mipad/Test-ryu
          ref: test
          submodules: false
          fetch-depth: 1
          sparse-checkout: |
            /*
            !src/RyujinxAndroid/app/src/main/cpp/libraries/adrenotools
          sparse-checkout-cone-mode: false
          clean: true

      # ================== [2] 环境初始化 ==================
      - name: Prepare workspace
        run: |
          # 设置Android环境变量
          ANDROID_HOME="${{ github.workspace }}/android-sdk"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          
          # 创建必要的目录结构
          mkdir -p $ANDROID_HOME/cmdline-tools
          
          # 配置local.properties
          echo "sdk.dir=$ANDROID_HOME" > src/RyujinxAndroid/local.properties
          echo "ndk.dir=$NDK_HOME" >> src/RyujinxAndroid/local.properties
          echo "cmake.dir=$ANDROID_HOME/cmake/${{ env.CMAKE_VERSION }}" >> src/RyujinxAndroid/local.properties

      # ================== [3] .NET环境配置 ==================
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: false

      # ================== [4] Android SDK安装 ==================
      - name: Install Android Tools
        run: |
          # 安装命令行工具
          cd $ANDROID_HOME
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-*.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest
          rm commandlinetools-linux-*.zip

          # 设置PATH
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

          # 安装必要组件
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "build-tools;${{ env.BUILD_TOOLS_VERSION }}"
          sdkmanager "ndk;${{ env.NDK_VERSION }}"
          sdkmanager "cmake;${{ env.CMAKE_VERSION }}"

      # ================== [5] 修复NativeAOT编译参数 ==================
      - name: Patch NativeAOT Settings
        working-directory: src/LibRyujinx
        run: |
          # 修改RuntimeIdentifier为Android目标
          sed -i 's/<RuntimeIdentifier>.*<\/RuntimeIdentifier>/<RuntimeIdentifier>android-arm64<\/RuntimeIdentifier>/g' LibRyujinx.csproj
          
          # 添加AOT编译参数
          echo '<PropertyGroup>' >> LibRyujinx.csproj
          echo '  <IlcGenerateMapFile>true</IlcGenerateMapFile>' >> LibRyujinx.csproj
          echo '  <IlcDisableUnhandledExceptionExperience>true</IlcDisableUnhandledExceptionExperience>' >> LibRyujinx.csproj
          echo '  <IlcGenerateCompleteTypeMetadata>false</IlcGenerateCompleteTypeMetadata>' >> LibRyujinx.csproj
          echo '  <IlcDisableReflection>true</IlcDisableReflection>' >> LibRyujinx.csproj
          echo '</PropertyGroup>' >> LibRyujinx.csproj

      # ================== [6] 构建执行 ==================
      - name: Build Android Project
        working-directory: src/RyujinxAndroid
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
        run: |
          # 清理旧构建
          ./gradlew clean
          
          # 完整构建流程
          ./gradlew assembleRelease \
            -Pandroid.debug.obsoleteApi=true \
            -Porg.gradle.parallel=true \
            -Porg.gradle.daemon=false \
            -Porg.gradle.caching=false \
            --stacktrace

      # ================== [7] 产物处理 ==================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-output
          path: |
            src/RyujinxAndroid/app/build/outputs/apk/**/*.apk
            src/RyujinxAndroid/app/build/outputs/native-debug-symbols/**/*.so
          retention-days: 3
