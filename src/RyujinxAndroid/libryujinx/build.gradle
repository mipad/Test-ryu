import org.gradle.nativeplatform.platform.internal.DefaultNativePlatform

plugins {
    id 'base'
}

// 配置属性（增加Android平台参数）
ext {
    androidAbi = providers.gradleProperty("android.abi").getOrElse("arm64-v8a")
    ndkVersion = providers.gradleProperty("android.ndk.version").getOrElse("25.2.9519653")
}

// 可配置属性
def toolchainPath = providers.gradleProperty("org.ryujinx.llvm.toolchain.path").getOrNull()
def dotnetExecutable = providers.gradleProperty("org.ryujinx.dotnet.bin").getOrElse("dotnet")
def configuration = providers.gradleProperty("org.ryujinx.config").getOrElse("debug").toLowerCase()
def publishDirectory = providers.gradleProperty("org.ryujinx.publish.path").getOrNull()
def stripSymbols = providers.gradleProperty("org.ryujinx.symbols.strip").getOrElse("")

// 符号剥离配置
stripSymbols = stripSymbols.toBoolean() ?: (configuration == "release")

configuration = configuration.capitalize()

// 发布目录设置（指向Android jniLibs目录）
if (!publishDirectory) {
    publishDirectory = "${rootProject.projectDir}/app/src/main/jniLibs/${androidAbi}"
} else {
    publishDirectory = "${rootProject.projectDir}/${publishDirectory}"
}

// 文件树配置
def outputDir = "${buildDir}/publish"
ext.outputTree = fileTree(outputDir) {
    include "**/*.so"
    builtBy 'compileLibRyujinx'
}

ext.publishTree = fileTree(publishDirectory) {
    include '*.so'
    builtBy 'compileLibRyujinx'
}

// 编译任务（关键修改点）
tasks.register('compileLibRyujinx', Exec) {
    def projectName = "LibRyujinx"
    workingDir "../../${projectName}"

    // 输入文件配置
    inputs.files(fileTree("../../") {
        include '**/*.cs', '**/*.csproj'
        exclude '**/bin/**', '**/obj/**', '**/RyujinxAndroid/**'
    }).withPropertyName('sourceFiles')
    }).withPathSensitivity(PathSensitivity.RELATIVE)

    // 输出文件配置
    outputs.file("${publishDirectory}/lib${projectName.toLowerCase()}.so")

    // 环境变量配置
    if (toolchainPath) {
        environment "PATH", "${toolchainPath}${File.pathSeparator}${System.getenv('PATH')}"
    }

    // 执行前日志
    doFirst {
        logger.lifecycle("Building ${projectName} in ${configuration} mode for ${androidAbi}")
        logger.info("""
        |Configuration:
        |  dotnet: ${dotnetExecutable}
        |  strip symbols: ${stripSymbols}
        |  NDK version: ${ndkVersion}
        |  output dir: ${publishDirectory}
        """.stripMargin())
    }

    // 执行命令（关键修改：使用android-arm64 RID）
    executable dotnetExecutable
    args 'publish',
        '-r', 'android-arm64',  // 修正RuntimeIdentifier
        '-c', configuration,
        "-p:PublishAot=true",
        "-p:StripSymbols=${stripSymbols}",
        "-p:AndroidNativeLibraryName=libryujinx.so",
        "-p:AndroidNdkDirectory=${ndk.dir}",  // 使用local.properties配置
        "--output", outputDir

    // 后处理：复制到jniLibs
    doLast {
        copy {
            from(outputDir)
            into(publishDirectory)
            include '*.so'
            rename { filename -> 
                "libryujinx.so"  // 统一命名
            }
        }
        logger.lifecycle("Native library copied to: ${publishDirectory}")
    }
}

// 清理任务
tasks.register("cleanLibRyujinx", Delete) {
    delete publishTree
    delete outputTree
}

// 任务依赖配置
assemble.dependsOn("compileLibRyujinx")
clean.dependsOn("cleanLibRyujinx")
