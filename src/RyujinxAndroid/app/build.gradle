plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.multiplatform' // 启用 Kotlin Multiplatform
    id 'org.jetbrains.compose' // 启用 Compose Multiplatform
}

android {
    namespace 'org.ryujinx.android'
    compileSdk 34
    ndkVersion "26.2.11394342"

    defaultConfig {
        applicationId "org.ryujinx.android"
        minSdk 29
        targetSdk 34
        versionCode 10044
        versionName '1.0.44'

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables {
            useSupportLibrary true
        }

        ndk {
            abiFilters 'arm64-v8a'
        }

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++11"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    buildFeatures {
        compose true // 保留 Android 官方 Jetpack Compose
        prefab true
        buildConfig true
    }
    composeOptions {
        // 同时支持 Android Compose 和 Compose Multiplatform
        kotlinCompilerExtensionVersion '1.6.0' // 与 KMP 兼容的版本
    }
    packagingOptions {
        jniLibs {
            keepDebugSymbols += '**/libryujinx.so'
            useLegacyPackaging true
        }
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }
    externalNativeBuild {
        cmake {
            path file('src/main/cpp/CMakeLists.txt')
            version '3.31.6'
        }
    }
}

kotlin {
    // 配置多平台目标
    androidTarget {
        compilations.all {
            kotlinOptions.jvmTarget = "17"
        }
    }
    

    sourceSets {
        commonMain {
            dependencies {
                // Compose Multiplatform 核心依赖
                implementation(compose.runtime)
                implementation(compose.foundation)
                implementation(compose.material3)
                // 协程支持
                implementation("org.jetbrains.kotlinx:kotlinx-coroutines-core:1.8.0")
            }
        }
        androidMain {
            dependencies {
                // Android 专用依赖
                implementation 'androidx.activity:activity-compose:1.9.0'
                implementation 'androidx.core:core-ktx:1.13.1'
                implementation 'com.google.android.material:material:1.12.0'
            }
        }
    }
}

compose {
    // 配置 Compose Multiplatform 编译器
    kotlinCompilerPlugin.set("1.6.0")
    // 指定 Compose 版本（可选）
    dependencies {
        implementation platform("org.jetbrains.compose:compose-bom:2024.04.00")
    }
}

dependencies {
    // 通用依赖（跨平台）
    implementation platform('org.jetbrains.kotlin:kotlin-bom:1.9.22')

    // Android 专用依赖（非跨平台）
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation "androidx.navigation:navigation-compose:2.7.7"
    implementation group: 'net.java.dev.jna', name: 'jna', version: '5.14.0'
    implementation 'com.github.swordfish90:radialgamepad:2.0.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation "com.anggrayudi:storage:1.5.5"
    implementation "androidx.preference:preference-ktx:1.2.1"
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation 'net.lingala.zip4j:zip4j:2.11.5'
    implementation("br.com.devsrsouza.compose.icons:css-gg:1.1.0")
    implementation 'io.coil-kt:coil-compose:2.6.0'
    implementation("com.halilibo.compose-richtext:richtext-ui:0.20.0")
    implementation("com.halilibo.compose-richtext:richtext-commonmark:0.20.0")
    implementation("com.halilibo.compose-richtext:richtext-ui-material3:0.20.0")

    // 测试依赖
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
    androidTestImplementation platform('androidx.compose:compose-bom:2024.04.00')
    androidTestImplementation 'androidx.compose.ui:ui-test-junit4'

    // 项目模块依赖
    runtimeOnly project(":libryujinx")
}

tasks.named("preBuild") {
    dependsOn ':libryujinx:assemble'
}
